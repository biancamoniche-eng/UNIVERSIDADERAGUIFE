    ${next?`<div class="next-activity" onclick="openTrailAsStudent('${next.t.id}')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openTrailAsStudent('${next.t.id}')">
      <div class="na-tag">${ic('play',13)} Próxima atividade · ${esc(nextReason)}</div>
      <div class="na-body">
        <div class="na-ic">${ic('trail',24)}</div>
        <div class="na-info"><h3>${esc(next.t.title)||'Trilha'}</h3>
          <p>${next.t.modules.length} módulo${next.t.modules.length!==1?'s':''}${trailDurationMin(next.t)?' · '+fmtDuration(trailDurationMin(next.t)):''}</p>
          <div class="rp-bar" style="margin-top:8px;"><span style="width:${next.pct}%"></span></div>
        </div>
        <div class="na-go">${ic('next',20)}</div>
      </div>
    </div>`:''}
    <div class="home-kpis">
      <div class="kpi-card"><div class="kpi-ic">${ic('trail',20)}</div><b>${my.length}</b><span>Trilhas disponíveis</span></div>
      <div class="kpi-card"><div class="kpi-ic">${ic('check',20)}</div><b>${withProg.filter(x=>x.pct===100).length}</b><span>Concluídas</span></div>
      <div class="kpi-card"><div class="kpi-ic">${ic('clock',20)}</div><b>${horas}h</b><span>Horas de treino</span></div>
      <div class="kpi-card"><div class="kpi-ic">${ic('certificate',20)}</div><b>${certs.length}</b><span>Certificados</span></div>
    </div>
    <div class="home-section">
      <div class="sec-head"><h2>Continuar aprendendo</h2></div>
      ${emAndamento.length
        ? `<div class="trail-grid">${emAndamento.map(x=>trailCardColab(x.t,x.pct)).join('')}</div>`
        : emptyBox('trail','Nada em andamento', my.length? 'Escolha uma trilha para começar.' : 'Nenhuma trilha foi publicada ainda pelo RH.', my.length?`<button class="btn btn-primary" onclick="go('trilhas')">${ic('trail',16)} Ver trilhas</button>`:'')}
    </div>`;
};
function trailCardColab(t,pct){
  const n=t.modules.length;
  const dur=fmtDuration(trailDurationMin(t));
  const dl=deadlineInfo(t);
  return `<div class="trail-card" role="button" tabindex="0" aria-label="Abrir trilha ${esc(t.title)||'sem título'}" onclick="openTrailAsStudent('${t.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openTrailAsStudent('${t.id}')}">
    ${trailCoverCard(t)}
    <div class="tc-top"><div class="tc-ic">${ic('trail',20)}</div>
      <div class="tc-badges">
        ${isTrailMandatoryForUser(t,currentUser)?`<span class="statuspill sp-mand">Obrigatória</span>`:''}
        ${pct===100?`<span class="statuspill sp-done">Concluída</span>`:pct>0?`<span class="statuspill sp-prog">${pct}%</span>`:''}
      </div>
    </div>
    ${t.category?`<div class="tc-cat">${esc(t.category)}</div>`:''}
    <h3>${esc(t.title)||'Trilha sem título'}</h3>
    <p class="tc-sub">${esc(t.subtitle)||'&nbsp;'}</p>
    <div class="tc-foot"><span>${n} módulo${n!==1?'s':''}</span>${dur?`<span class="tc-dur">${ic('clock',13)} ${dur}</span>`:''}</div>
    ${dl&&pct<100?`<div class="tc-deadline ${dl.cls}">${ic('calendar',13)} ${dl.label}</div>`:''}
    <div class="rp-bar" style="margin-top:10px;"><span style="width:${pct}%"></span></div>
  </div>`;
}
/* info de prazo: rótulo + classe (no prazo / próximo / vencido) */
function deadlineInfo(t){
  if(!t.deadline)return null;
  const hoje=new Date();hoje.setHours(0,0,0,0);
  const dl=new Date(t.deadline+'T00:00:00');
  const dias=Math.round((dl-hoje)/86400000);
  if(dias<0)return {cls:'dl-late',label:'Prazo vencido ('+formatDate(t.deadline)+')'};
  if(dias===0)return {cls:'dl-soon',label:'Prazo: hoje'};
  if(dias<=7)return {cls:'dl-soon',label:'Prazo em '+dias+' dia'+(dias>1?'s':'')};
  return {cls:'dl-ok',label:'Prazo: '+formatDate(t.deadline)};
}

/* ---------- TRILHAS (colaborador) ---------- */
// Usar window.* para que o patch LMS e este script compartilhem o mesmo estado de filtro

window.colabTrailCategory=window.colabTrailCategory||'all';
SCREENS['trilhas']=(host)=>{
  const all=trailsForUser(currentUser);
  const colabTrailQuery=window.colabTrailQuery;
  const colabTrailCategory=window.colabTrailCategory;
  // categorias disponíveis
  const cats=[...new Set(all.map(t=>t.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
  // filtragem

function syncAllTrailCompletions(){
  try{
    (db.users||[]).forEach(u=>{
      (db.trails||[]).forEach(t=>{
        const p=progressGet(u.id,t.id);
        const total=(t.modules||[]).length;
        const doneCount=(p.done||[]).filter(id=>(t.modules||[]).some(m=>m.id===id)).length;
        const pct=total?Math.round((doneCount/total)*100):0;
        p.percent=pct;
        p.completed=total>0&&pct>=100;
        p.status=p.completed?'concluido':(doneCount>0?'andamento':'pendente');
        if(p.completed)p.completedAt=p.completedAt||new Date().toISOString();
      });
    });
  }catch(e){console.warn('syncAllTrailCompletions',e);}
}

   Observação: por segurança, GitHub Pages/HTML puro não envia e-mail automático sozinho.

function appPublicUrl(){

function openMailClient(toList,subject,body,bccList){
  let to=(Array.isArray(toList)?toList:[toList]).filter(Boolean).join(';');
  let bcc=(Array.isArray(bccList)?bccList:[bccList]).filter(Boolean).join(';');

  // Outlook Web às vezes ignora destinatários enviados apenas como BCC via deeplink.
  // Para garantir que os destinatários apareçam, se não houver "Para", usamos a lista BCC no campo "Para".
  if(!to && bcc){
    to=bcc;
    bcc='';
  }

  const params=new URLSearchParams();
  if(to)params.set('to',to);
  if(bcc)params.set('bcc',bcc);
  if(subject)params.set('subject',subject);
  if(body)params.set('body',body);
  params.set('login_hint','rh@raguife.com.br');

  const url='https://outlook.office.com/mail/deeplink/compose?'+params.toString();
  window.open(url,'_blank','noopener,noreferrer');
}

/* ---------- Importação em massa de usuários (CSV compatível com Excel) ---------- */
function csvSplitLine(line){
  const out=[];let cur='',q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i],n=line[i+1];
    if(c==='"'&&q&&n==='"'){cur+='"';i++;continue;}
    if(c==='"'){q=!q;continue;}
    if((c===','||c===';')&&!q){out.push(cur.trim());cur='';continue;}
    cur+=c;
  }
  out.push(cur.trim());
  return out;
}
function parseUsersCSV(text){
  const lines=String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).filter(l=>l.trim());
  if(lines.length<2)return [];
  const header=csvSplitLine(lines[0]).map(h=>h.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim());
  const idx=(names)=>names.map(n=>header.indexOf(n)).find(i=>i>=0);
  const iNome=idx(['nome','name','colaborador']);
  const iEmail=idx(['email','e-mail','mail']);
  const iPerfil=idx(['perfil','role','tipo']);
  const iCargo=idx(['cargo','funcao']);
  const iArea=idx(['area','setor','departamento']);
  const iGestor=idx(['gestor','lider','lideranca']);
  const rows=[];
  for(let r=1;r<lines.length;r++){
    const c=csvSplitLine(lines[r]);
    const nome=iNome>=0?(c[iNome]||'').trim():'';
    const email=iEmail>=0?(c[iEmail]||'').trim().toLowerCase():'';
    if(!nome||!email)continue;
    const perfil=((iPerfil>=0?c[iPerfil]:'')||'colaborador').toLowerCase();
    let role='collaborator';
    if(perfil.includes('rh'))role='rh';
    else if(perfil.includes('gest'))role='manager';
    rows.push({
      name:nome,
      email,
      role,
      cargo:iCargo>=0?(c[iCargo]||'').trim():'',
      sector:iArea>=0?(c[iArea]||'').trim():'',
      manager:iGestor>=0?(c[iGestor]||'').trim():''
    });
  }
  return rows;
}
function rhImportUsersCSV(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='.csv,text/csv';
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0];if(!file)return;
    const text=await file.text();
    const rows=parseUsersCSV(text);
    if(!rows.length){toast('Arquivo sem usuários válidos. Use as colunas: nome,email,perfil,cargo,area,gestor',true);return;}
    let created=0, skipped=0;
    rows.forEach(r=>{
      const exists=(db.users||[]).some(u=>(u.email||'').toLowerCase()===r.email);
      if(exists){skipped++;return;}
      userCreate({name:r.name,email:r.email,role:r.role,cargo:r.cargo,sector:r.sector,managerId:((db.users||[]).find(u=>(u.name||'').trim().toLowerCase()===(r.manager||'').trim().toLowerCase()||(u.email||'').trim().toLowerCase()===(r.manager||'').trim().toLowerCase())||{}).id||null});
      created++;
    });
    dbSave();
    toast(`Importação concluída: ${created} criado(s), ${skipped} duplicado(s).`);
    if(typeof renderUsers==='function')renderUsers();
  };
  inp.click();
}

function rhTogglePublish(id){
  const t=trailById(id);if(!t)return;
  if(t.status!=='published'){
    const probs=validateTrail(t);
    if(probs.length){
      openModal(`<h3>Não dá para publicar ainda</h3>
        <p style="color:var(--gray-600);font-size:14px;margin-bottom:12px;">Corrija os pontos abaixo antes de publicar:</p>
        <ul class="val-list">${probs.map(p=>`<li>${ic('warn',14)} ${esc(p)}</li>`).join('')}</ul>
        <div class="modal-actions">
          <button class="btn btn-ghost btn-sm" onclick="closeModal()">Fechar</button>
          <button class="btn btn-primary btn-sm" onclick="closeModal();rhEditTrail('${t.id}')">${ic('edit',14)} Editar trilha</button>
        </div>`);
      return;
    }
    t.status='published';trailUpsert(t);toast('Trilha publicada');
  }else{t.status='draft';trailUpsert(t);toast('Trilha despublicada (rascunho)');}
  go('rh-trilhas');
}

function rhAssignMode(mode){window._assignDraft.mode=mode;
  document.getElementById('amAll').classList.toggle('on',mode==='all');
  document.getElementById('amRes').classList.toggle('on',mode==='restricted');
  document.getElementById('assignDetail').style.display=mode==='restricted'?'block':'none';
}
function rhAssignToggle(kind,value,checked){
  const d=window._assignDraft;
  const arr=kind==='sector'?d.sectors:(kind==='cargo'?d.cargos:(kind==='mandatoryCargo'?d.mandatoryCargos:d.userIds));
  const i=arr.indexOf(value);
  if(checked&&i<0)arr.push(value);else if(!checked&&i>=0)arr.splice(i,1);
}
function rhAssignSave(id){
  const t=trailById(id);if(!t)return;
  t.assignment={mode:window._assignDraft.mode,sectors:window._assignDraft.sectors,cargos:window._assignDraft.cargos,userIds:window._assignDraft.userIds};
  trilhaObrigatoriaParaCargoSet(id,window._assignDraft.mandatoryCargos||[]);
  const mEl=document.getElementById('tMandatory'),dEl=document.getElementById('tDeadline');
  t.mandatory=mEl?mEl.checked:false;
  t.deadline=dEl?dEl.value:'';
  trailUpsert(t);closeModal();go('rh-trilhas');toast('Atribuição salva');
}

function rhEditTrail(id){

/* sugere a senha padrão a partir do nome, enquanto o RH não editar manualmente */
function rhSuggestPass(){
  if(window._userPassEdited)return;
  const name=val('uName');const p=document.getElementById('uPassword');
  if(p)p.value=defaultPassword(name);
}
function copyPass(){
  const p=document.getElementById('uPassword');if(!p)return;
  const v=p.value||'';
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(v).then(()=>toast('Senha copiada')).catch(()=>fallbackCopy(p));}
  else fallbackCopy(p);
}
function fallbackCopy(input){input.select();try{document.execCommand('copy');toast('Senha copiada');}catch(e){toast('Copie manualmente',true);}}
function rhUserSave(id){
  const name=val('uName');if(!name.trim()){toast('Digite o nome',true);return;}
  const email=val('uEmail').trim();
  if(!email){toast('Informe o e-mail (usado no login)',true);return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){toast('E-mail inválido',true);return;}
  // e-mail único
  const clash=usersAll().find(x=>x.id!==id&&(x.email||'').toLowerCase()===email.toLowerCase());
  if(clash){toast('Já existe um usuário com esse e-mail',true);return;}
  const role=val('uRole');
  let password=val('uPassword').trim();
  if(!password)password=defaultPassword(name);
  const data={name,email,role,sector:val('uSector'),cargo:val('uCargo'),password,login:'',
    managerId:role==='collaborator'?(val('uManager')||null):null};
  if(id)userUpdate(id,data);else userCreate(data);
  closeModal();go('rh-usuarios');toast('Usuário salvo');
}

}

      </div>
      <div class="fld"><label>Pessoas específicas</label>
        ${colabs.length?`<div class="chk-list">${colabs.map(u=>`<label class="chk"><input type="checkbox" value="${u.id}" ${(a.userIds||[]).includes(u.id)?'checked':''} onchange="evAssignToggle('user',this.value,this.checked)"> ${esc(u.name)} <span class="muted">(${roleLabel(u.role)})</span></label>`).join('')}</div>`:'<p class="muted" style="font-size:13px;">Nenhum colaborador.</p>'}

function evAssignMode(mode){
  window._evAssign.mode=mode;
  document.getElementById('evmAll').classList.toggle('on',mode==='all');
  document.getElementById('evmRes').classList.toggle('on',mode==='restricted');
  document.getElementById('evDetail').style.display=mode==='restricted'?'block':'none';
}
function evAssignToggle(kind,value,checked){
  const d=window._evAssign;
  const arr=kind==='sector'?d.sectors:(kind==='cargo'?d.cargos:d.userIds);
  const i=arr.indexOf(value);
  if(checked&&i<0)arr.push(value);else if(!checked&&i>=0)arr.splice(i,1);
}
function rhEventSave(){
  const title=val('eTitle');if(!title.trim()){toast('Digite o título',true);return;}
  const data={title,date:val('eDate'),local:val('eLocal'),desc:val('eDesc'),
    hours:parseFloat(val('eHours'))||0,vagas:parseInt(val('eVagas'))||0,
    assignment:window._evAssign||{mode:'all',sectors:[],cargos:[],userIds:[]}};
  if(window._evEditId){eventUpdate(window._evEditId,data);toast('Evento atualizado');}
  else{eventCreate(data);toast('Evento criado');}
  closeModal();go('rh-eventos');
}

      <div class="rank-box"><div class="rank-title">${ic('chart',15)} Ranking por área</div>
        ${st.rankingArea.length?st.rankingArea.map((r,i)=>`<div class="rank-row"><span class="rank-pos">${i+1}</span><span class="rank-name">${esc(r.nome)}</span><div class="rp-bar"><span style="width:${r.pct}%"></span></div><span class="rank-pct">${r.pct}%</span></div>`).join(''):'<p class="muted" style="font-size:13px;padding:8px;">Sem dados.</p>'}
      </div>
      <div class="rank-box"><div class="rank-title">${ic('team',15)} Ranking por gestor</div>
        ${st.rankingGestor.length?st.rankingGestor.map((r,i)=>`<div class="rank-row"><span class="rank-pos">${i+1}</span><span class="rank-name">${esc(r.nome)}</span><div class="rp-bar"><span style="width:${r.pct}%"></span></div><span class="rank-pct">${r.pct}%</span></div>`).join(''):'<p class="muted" style="font-size:13px;padding:8px;">Sem dados.</p>'}

function fdate(d){return d?formatDate((''+d).slice(0,10)):'';}
function relTrilhas(){
  const rows=[['Colaborador','Setor','Cargo','Trilha','Categoria','Obrigatória','Progresso (%)','Status']];
  collaboratorsAll().forEach(u=>trailsForUser(u).forEach(t=>{
    const pct=trailPct(u.id,t);
    rows.push([u.name,u.sector||'',u.cargo||'',t.title||'',t.category||'',t.mandatory?'Sim':'Não',pct,pct===100?'Concluída':pct>0?'Em andamento':'Não iniciada']);
  }));
  downloadXlsx('participacao-trilhas.xlsx',[{name:'Trilhas',rows}]);
}
function relEventos(){
  const rows=[['Evento','Data','Local','Carga (h)','Colaborador','Setor','Status','Confirmado em','Confirmado por']];
  eventsAll().forEach(e=>(e.participants||[]).forEach(p=>{
    const u=userById(p.userId);if(!u)return;
    rows.push([e.title||'',fdate(e.date),e.local||'',e.hours||0,u.name,u.sector||'',(EV_STATUS[p.status]||{}).label||p.status,p.confirmedAt?fdate(p.confirmedAt):'',p.confirmedBy?(userById(p.confirmedBy)||{}).name||'':'']);
  }));
  downloadXlsx('participacao-eventos.xlsx',[{name:'Eventos',rows}]);
}
function relCertificados(){

  db.certificates.forEach(c=>rows.push([c.userName||'',c.trailTitle||'',c.durationMin||0,c.code||'',fdate(c.issuedAt)]));

function relHoras(){

  collaboratorsAll().forEach(u=>{
    const h=learningHistory(u.id);
    rows.push([u.name,u.sector||'',u.cargo||'',trainingHoursOf(u.id),h.concluidas.length,h.eventos.filter(x=>x.part.status==='presente').length]);

function relAtivos(){

}
function relPendentes(){
  const rows=[['Colaborador','Setor','Cargo','Trilha obrigatória pendente','Progresso (%)','Prazo']];
  collaboratorsAll().forEach(u=>pendingMandatoryForUser(u).forEach(t=>{
    rows.push([u.name,u.sector||'',u.cargo||'',t.title||'',trailPct(u.id,t),t.deadline?fdate(t.deadline):'']);
  }));

function relConsolidado(){
  const st=dashboardStats();
  const resumo=[['Indicador','Valor'],
    ['Mês de referência',st.mes],
    ['Total de colaboradores',st.totalColabs],
    ['Colaboradores treinados',st.treinados],
    ['Horas treinadas no mês',st.horasMes],
    ['Eventos no mês',st.eventosRealizados],
    ['Taxa de presença (%)',st.taxaPresenca==null?'—':st.taxaPresenca],
    ['Taxa de conclusão de trilhas (%)',st.taxaConclusao],
    ['Obrigatórias pendentes',st.obrigatoriasPendentes],
    ['Certificados no mês',st.certificadosMes],
    ['Nunca acessaram',st.semAcesso]];
  const trilhas=[['Colaborador','Setor','Cargo','Trilha','Obrigatória','Progresso (%)','Status']];
  collaboratorsAll().forEach(u=>trailsForUser(u).forEach(t=>{const pct=trailPct(u.id,t);trilhas.push([u.name,u.sector||'',u.cargo||'',t.title||'',t.mandatory?'Sim':'Não',pct,pct===100?'Concluída':pct>0?'Em andamento':'Não iniciada']);}));
  const eventos=[['Evento','Data','Colaborador','Status','Confirmado por']];
  eventsAll().forEach(e=>(e.participants||[]).forEach(p=>{const u=userById(p.userId);if(u)eventos.push([e.title||'',fdate(e.date),u.name,(EV_STATUS[p.status]||{}).label||p.status,p.confirmedBy?(userById(p.confirmedBy)||{}).name||'':'']);}));
  const certs=[['Colaborador','Trilha','Carga (min)','Código','Emissão']];
  db.certificates.forEach(c=>certs.push([c.userName||'',c.trailTitle||'',c.durationMin||0,c.code||'',fdate(c.issuedAt)]));
  const horas=[['Colaborador','Setor','Horas','Último acesso']];
  collaboratorsAll().forEach(u=>{const la=lastAccessOf(u.id);horas.push([u.name,u.sector||'',trainingHoursOf(u.id),la?fdate(la):'Nunca']);});
  downloadXlsx('relatorio-universidade-raguife.xlsx',[
    {name:'Resumo',rows:resumo},{name:'Trilhas',rows:trilhas},{name:'Eventos',rows:eventos},{name:'Certificados',rows:certs},{name:'Horas',rows:horas}]);
}

/* confirmação estilizada (substitui o confirm() nativo) */
let _confirmCb=null;
function confirmModal(title,message,onYes,opts){
  opts=opts||{};
  _confirmCb=onYes;
  openModal(`
    <h3>${esc(title)}</h3>
    <p style="color:var(--gray-600);font-size:14px;margin-bottom:4px;">${esc(message)}</p>

/* ---- sobrescreve save() do módulo de trilha ----
   No editor (RH): grava a trilha no store.
   No aluno: grava o progresso do usuário e emite certificado a 100%. */
function save(){
  try{
    if(mode==='editor'){
      const clone=JSON.parse(JSON.stringify(trail));
      clone.modules.forEach(m=>{if(m.contentType==='mp4'){moduleVideos(m).forEach(v=>{if(v.mp4Blob){v.src='';v.mp4Missing=true;}});if(m.mp4Blob){m.src='';m.mp4Missing=true;}}});
      trailUpsert(clone);
      currentTrailId=clone.id;
    }
    if(currentUser&&currentTrailId){
      progressSet(currentUser.id,currentTrailId,progress);
      // certificado automático a 100%
      const t=trailById(currentTrailId);
      if(t&&t.modules.length){
        const done=(progress.done||[]).filter(id=>t.modules.some(m=>m.id===id)).length;
        if(done>=t.modules.length && (!t.certificate || t.certificate.enabled!==false)){certIssue(currentUser.id,currentTrailId);}
      }
    }
  }catch(e){console.warn('save bridge',e);}
}

/* ---- sobrescreve saveTrail() do editor: salva no store e volta ---- */
function saveTrail(){
  if(!trail.title.trim()){toast('Dê um título à trilha',true);return;}
  const btn=document.querySelector('.editor-foot .btn-primary');
  if(btn){btn.disabled=true;btn.dataset._html=btn.innerHTML;btn.innerHTML='Salvando...';}
  setTimeout(()=>{
    const clone=JSON.parse(JSON.stringify(trail));
    clone.modules.forEach(m=>{if(m.contentType==='mp4'){moduleVideos(m).forEach(v=>{if(v.mp4Blob){v.src='';v.mp4Missing=true;}});if(m.mp4Blob){m.src='';m.mp4Missing=true;}}});
    trailUpsert(clone);
    _trailDirty=false;
    // PROTEÇÃO: baixa um JSON de backup automaticamente ao salvar
    // Garante que o RH sempre tem uma cópia local mesmo se o cache do navegador apagar tudo
    try{
      const backup=JSON.parse(JSON.stringify(clone));
      const blobB=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
      const urlB=URL.createObjectURL(blobB);
      const aB=document.createElement('a');
      const safeName=(clone.title||'trilha').replace(/[^a-zA-Z0-9À-ÿ\s-]/g,'').trim().replace(/\s+/g,'_').slice(0,40);
      const dateStr=new Date().toISOString().slice(0,10);
      aB.href=urlB;aB.download=`backup_${safeName}_${dateStr}.json`;
      document.body.appendChild(aB);aB.click();aB.remove();
      setTimeout(()=>URL.revokeObjectURL(urlB),2000);
    }catch(e){console.warn('backup auto',e);}
    if(btn){btn.innerHTML=ic('check',15)+' Salvo';}
    setTimeout(()=>{
      toast('Trilha salva — backup JSON baixado automaticamente');
      closeEditor();
      buildSidebar();
      go('rh-trilhas');
      if(btn){btn.disabled=false;btn.innerHTML=btn.dataset._html||'Salvar trilha';}
    },450);
  },250);
}

/* ===== PATCH CRÍTICO: conclusão de módulo/trilha sem tela em branco ===== */
(function(){
  function safeToast(msg,warn){try{ if(typeof toast==='function') toast(msg,warn); }catch(e){}}
  window.__raguifeSafeAfterComplete=function(){
    try{
      const role=(window.currentUser&&window.currentUser.role)||'';
      if(typeof go==='function'){
        if(role==='rh') go('rh-trilhas');
        else go('trilhas');
        return true;
      }
    }catch(e){}
    return false;
  };

  window.__raguifeShowCompleteSafe=function(){
    try{
      const host=document.getElementById('screenHost') || document.querySelector('.screen-host') || document.body;
      const title=(window.trail&&window.trail.title)||'Trilha';
      host.innerHTML = `
        <div class="empty" style="max-width:640px;margin:60px auto;text-align:center">
          <div class="e-ic" style="margin:0 auto 18px">🏆</div>
          <h3>Trilha concluída!</h3>
          <p>Parabéns! Você concluiu a trilha <b>${title}</b>.</p>
          <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">
            <button class="btn btn-primary" onclick="try{openCertificate()}catch(e){}">Visualizar certificado</button>
            <button class="btn btn-ghost" onclick="__raguifeSafeAfterComplete()">Voltar para trilhas</button>
          </div>
        </div>`;
      setTimeout(function(){try{openCertificate()}catch(e){}},250);
      return true;
    }catch(e){
      console.error('show complete safe',e);
      __raguifeSafeAfterComplete();
      return false;
    }
  };

  window.__raguifeCompleteCurrentModule=function(){
    try{
      // usa variáveis globais do runtime da trilha, se existirem
      if(typeof trail==='undefined' || !trail || !Array.isArray(trail.modules) || !trail.modules.length){
        safeToast('Trilha sem módulos encontrados',true);
        return __raguifeSafeAfterComplete();
      }
      if(typeof currentIdx==='undefined' || currentIdx<0 || currentIdx>=trail.modules.length) currentIdx=0;
      const m=trail.modules[currentIdx];
      if(!m){
        safeToast('Módulo não encontrado',true);
        return __raguifeSafeAfterComplete();
      }
      if(typeof progress==='undefined' || !progress) progress={done:[],quiz:{},poll:{}};
      if(!Array.isArray(progress.done)) progress.done=[];

      // respeita gate do quiz, mas não deixa tela quebrar
      if(!progress.done.includes(m.id) && typeof canComplete==='function' && !canComplete(m)){
        try{lessonTab='quiz'; if(typeof render==='function')render();}catch(e){}
        safeToast('Conclua os requisitos do módulo para avançar',true);
        return false;
      }

      if(!progress.done.includes(m.id)) progress.done.push(m.id);

      try{ if(typeof syncTrailCompletion==='function') syncTrailCompletion(currentUser&&currentUser.id,currentTrailId); }catch(e){}
      try{ if(typeof save==='function') save(); else if(typeof dbSave==='function') dbSave(); }catch(e){console.warn('save complete',e);}

      const total=trail.modules.length;
      const done=progress.done.filter(function(id){return trail.modules.some(function(mm){return mm.id===id;});}).length;
      const complete=total>0 && done>=total;

      if(complete){
        try{ if(currentUser&&currentTrailId&&typeof certIssue==='function') certIssue(currentUser.id,currentTrailId); }catch(e){}
        safeToast('🎉 Trilha concluída! Certificado emitido.');
        return __raguifeShowCompleteSafe();
      }

      // próximo módulo pendente
      let next=-1;
      for(let i=currentIdx+1;i<trail.modules.length;i++){
        if(!progress.done.includes(trail.modules[i].id)){next=i;break;}
      }
      if(next<0){
        for(let i=0;i<trail.modules.length;i++){
          if(!progress.done.includes(trail.modules[i].id)){next=i;break;}
        }
      }
      if(next>=0){
        currentIdx=next;
        try{lessonTab='conteudo'; quizState={answers:{},submitted:false};}catch(e){}
        try{ if(typeof render==='function') render(); }catch(e){
          console.error('render next module',e);
          __raguifeSafeAfterComplete();
        }
        try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}
        safeToast('Módulo concluído. Próximo módulo carregado.');
        return true;
      }

      try{ if(typeof render==='function') render(); }catch(e){}
      safeToast('Módulo concluído.');
      return true;
    }catch(e){
      console.error('Erro crítico na conclusão',e);
      safeToast('Conclusão salva. Retornando para trilhas.',true);
      try{ if(typeof dbSave==='function') dbSave(); }catch(_){}
      return __raguifeSafeAfterComplete();
    }
  };
})();

<script>

(function(){

  window.__raguifeAfterQuizSubmit=function(){

      if(typeof trail==='undefined'||!trail||!Array.isArray(trail.modules)||!trail.modules.length)return false;
      if(typeof currentIdx==='undefined'||currentIdx<0||currentIdx>=trail.modules.length)currentIdx=0;

      setTimeout(function(){

          const nav=document.querySelector('.lesson-nav');
          if(nav)nav.scrollIntoView({behavior:'smooth',block:'end'});
        }catch(e){}
      },250);

      const total=trail.modules.length;

      const complete=total>0 && done>=total;

      if(complete){
        try{ if(currentUser&&currentTrailId&&typeof certIssue==='function') certIssue(currentUser.id,currentTrailId); }catch(e){}
        safeToast('🎉 Trilha concluída! Certificado emitido.');
        if(typeof __raguifeShowCompleteSafe==='function'){
          setTimeout(function(){__raguifeShowCompleteSafe();},80);
        }else{
          setTimeout(function(){try{openCertificate();}catch(e){}},120);
        }
        return true;
      }

      // Se não concluiu a trilha, avança para próximo módulo.
      if(typeof __raguifeCompleteCurrentModule==='function'){
        setTimeout(function(){__raguifeCompleteCurrentModule();},80);
        return true;
      }

      return false;
    }catch(e){
      console.error('__raguifeAfterQuizSubmit',e);
      try{ if(typeof __raguifeSafeAfterComplete==='function')__raguifeSafeAfterComplete(); }catch(_){}
      return false;
    }
  };

  // Envolve funções prováveis de envio/finalização de quiz sem depender do nome exato.
  function wrap(name){
    try{
      if(typeof window[name]==='function' && !window[name].__raguifeWrapped){
        const old=window[name];
        const wrapped=function(){
          const r=old.apply(this,arguments);
          setTimeout(function(){try{window.__raguifeAfterQuizSubmit();}catch(e){}},120);
          return r;
        };
        wrapped.__raguifeWrapped=true;
        window[name]=wrapped;
      }
    }catch(e){}
  }

  setTimeout(function(){
    ['submitQuiz','finishQuiz','quizSubmit','sendQuiz','submitPoll','finishPoll','answerQuiz','doQuizSubmit'].forEach(wrap);
  },300);

  // Captura clique em botões comuns de finalizar quiz mesmo quando usam handlers inline internos.
  document.addEventListener('click',function(ev){
    const btn=ev.target&&ev.target.closest?ev.target.closest('button'):null;
    if(!btn)return;
    const txt=(btn.textContent||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    if(txt.includes('finalizar quiz')||txt.includes('concluir quiz')||txt.includes('enviar respostas')||txt.includes('responder')||txt.includes('finalizar')){
      setTimeout(function(){try{window.__raguifeAfterQuizSubmit();}catch(e){}},180);
    }
  },true);
})();
</script>


<script>
/* ===== PATCH: avaliação obrigatória ao final do treinamento ===== */
(function(){
  function safeToast(msg,warn){try{ if(typeof toast==='function') toast(msg,warn); }catch(e){}}
  function getCurrentProgressSafe(){
    try{
      if(typeof progressGet==='function' && window.currentUser && window.currentTrailId){
        return progressGet(window.currentUser.id, window.currentTrailId);
      }
    }catch(e){}
    return null;
  }
  function currentTrailCompleteSafe(){
    try{
      if(!window.trail || !Array.isArray(window.trail.modules) || !window.trail.modules.length)return false;
      const p=getCurrentProgressSafe();
      if(!p || !Array.isArray(p.done))return false;
      const total=window.trail.modules.length;
      const done=p.done.filter(function(id){return window.trail.modules.some(function(m){return m.id===id;});}).length;
      return total>0 && done>=total;
    }catch(e){return false;}
  }
  window.__raguifeTrainingEvaluationDone=function(){
    const p=getCurrentProgressSafe();
    return !!(p && p.evaluation && typeof p.evaluation.stars==='number');
  };
  window.__raguifeShowTrainingEvaluation=function(){
    try{
      const host=document.getElementById('screenHost') || document.querySelector('.screen-host') || document.body;
      const title=(window.trail&&window.trail.title)||'Treinamento';
      host.innerHTML = `
        <div class="empty" style="max-width:720px;margin:40px auto;text-align:center">
          <div class="e-ic" style="margin:0 auto 18px">⭐</div>
          <h3>Avalie este treinamento</h3>
          <p>Antes de emitir o certificado, avalie a trilha <b>${title}</b>.</p>

          <div style="background:#fff;border:1px solid var(--gray-100);border-radius:18px;padding:22px;margin-top:18px;text-align:left;box-shadow:var(--shadow-sm)">
            <label style="display:block;font-weight:800;color:var(--green-900);margin-bottom:10px;text-align:center">
              Nota obrigatória
            </label>
            <div id="trainingStars" style="display:flex;justify-content:center;gap:8px;margin-bottom:14px">
              ${[0,1,2,3,4,5].map(n=>`
                <button type="button" class="btn btn-ghost btn-sm" data-star="${n}" onclick="__raguifePickTrainingStar(${n})" style="min-width:46px">
                  ${n}★
                </button>
              `).join('')}
            </div>
            <input type="hidden" id="trainingRatingValue" value="">

            <label style="display:block;font-weight:800;color:var(--green-900);margin:12px 0 6px">
              Comentários opcionais
            </label>
            <textarea id="trainingRatingComment" class="inp" rows="4" placeholder="Escreva aqui sugestões, elogios ou pontos de melhoria do treinamento..."></textarea>

            <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px">
              <button class="btn btn-primary" onclick="__raguifeSubmitTrainingEvaluation()">Enviar avaliação e emitir certificado</button>
              <button class="btn btn-ghost" onclick="__raguifeSafeAfterComplete&&__raguifeSafeAfterComplete()">Voltar</button>
            </div>
          </div>
        </div>`;
      return true;
    }catch(e){
      console.error('show training evaluation',e);
      return false;
    }
  };
  window.__raguifePickTrainingStar=function(n){
    try{
      const v=document.getElementById('trainingRatingValue');
      if(v)v.value=String(n);
      document.querySelectorAll('#trainingStars button').forEach(function(btn){
        const s=Number(btn.getAttribute('data-star'));
        if(s===n){
          btn.classList.remove('btn-ghost');
          btn.classList.add('btn-primary');
        }else{
          btn.classList.remove('btn-primary');
          btn.classList.add('btn-ghost');
        }
      });
    }catch(e){}
  };
  window.__raguifeSubmitTrainingEvaluation=function(){
    try{
      const v=document.getElementById('trainingRatingValue');
      const raw=v?v.value:'';
      if(raw===''){
        safeToast('Selecione uma nota de 0 a 5 estrelas para continuar.',true);
        return;
      }
      const stars=Number(raw);
      if(Number.isNaN(stars) || stars<0 || stars>5){
        safeToast('Nota inválida. Selecione de 0 a 5 estrelas.',true);
        return;
      }
      const commentEl=document.getElementById('trainingRatingComment');
      const comments=commentEl?(commentEl.value||'').trim():'';
      const p=getCurrentProgressSafe();
      if(p){
        p.evaluation={
          stars:stars,
          comments:comments,
          evaluatedAt:new Date().toISOString(),
          userId:window.currentUser&&window.currentUser.id,
          trailId:window.currentTrailId,
          trailTitle:window.trail&&window.trail.title
        };
      }
      try{
        if(window.db){
          if(!Array.isArray(window.db.trainingEvaluations))window.db.trainingEvaluations=[];
          window.db.trainingEvaluations.push({
            id:(typeof uid==='function'?uid():String(Date.now())),
            userId:window.currentUser&&window.currentUser.id,
            userName:window.currentUser&&window.currentUser.name,
            trailId:window.currentTrailId,
            trailTitle:window.trail&&window.trail.title,
            stars:stars,
            comments:comments,
            createdAt:new Date().toISOString()
          });
        }
      }catch(e){}
      try{ if(typeof dbSave==='function')dbSave(); }catch(e){}
      try{ if(window.currentUser&&window.currentTrailId&&typeof certIssue==='function')certIssue(window.currentUser.id,window.currentTrailId); }catch(e){}
      safeToast('Avaliação registrada. Certificado emitido.');
      if(typeof window.__raguifeOriginalShowCompleteSafe==='function'){
        window.__raguifeOriginalShowCompleteSafe();
      }else{
        try{openCertificate();}catch(e){}
      }
    }catch(e){
      console.error('submit training evaluation',e);
      safeToast('Não foi possível salvar a avaliação.',true);
    }
  };

  // Guarda função original e passa a exigir avaliação antes do certificado.
  setTimeout(function(){
    try{
      if(typeof window.__raguifeShowCompleteSafe==='function' && !window.__raguifeOriginalShowCompleteSafe){
        window.__raguifeOriginalShowCompleteSafe=window.__raguifeShowCompleteSafe;
        window.__raguifeShowCompleteSafe=function(){
          if(currentTrailCompleteSafe() && !window.__raguifeTrainingEvaluationDone()){
            return window.__raguifeShowTrainingEvaluation();
          }
          return window.__raguifeOriginalShowCompleteSafe();
        };
      }
    }catch(e){}
  },50);

  // Também protege clique direto em "Visualizar certificado" antes da avaliação.
  setTimeout(function(){
    try{
      if(typeof window.openCertificate==='function' && !window.__raguifeOriginalOpenCertificate){
        window.__raguifeOriginalOpenCertificate=window.openCertificate;
        window.openCertificate=function(){
          if(currentTrailCompleteSafe() && !window.__raguifeTrainingEvaluationDone()){
            return window.__raguifeShowTrainingEvaluation();
          }
          return window.__raguifeOriginalOpenCertificate.apply(this,arguments);
        };
      }
    }catch(e){}
  },80);
})();
</script>

<script>
/* Patch aplicado: Prioridade 1 (quiz/nota/prazo), Prioridade 2 (Minhas Trilhas), Prioridade 4 (Dashboard RH) + Ranking */
(function(){
  const _oldValidateTrail = typeof validateTrail==='function' ? validateTrail : null;
  const _oldRenderEditor = typeof renderEditor==='function' ? renderEditor : null;
  const _oldRhTrailCard = typeof rhTrailCard==='function' ? rhTrailCard : null;

  function today0(){const d=new Date();d.setHours(0,0,0,0);return d;}
  function dateDiffDays(dateStr){if(!dateStr)return null;const d=new Date(dateStr+'T00:00:00');return Math.round((d-today0())/86400000);}
  function trailFinalQuizOk(t){const mods=(t&&t.modules)||[];if(!mods.length)return false;const last=mods[mods.length-1];return !!(last&&last.quiz&&(last.quiz.kind==='quiz'||last.quiz.kind==='truefalse'));}
  function bestTrailScore(userId,t){
    const p=progressGet(userId,t.id);let best=0;
    (t.modules||[]).forEach(m=>{if(m.quiz&&(m.quiz.kind==='quiz'||m.quiz.kind==='truefalse'))best=Math.max(best,Number((p.scores||{})[m.id]||0));});
    return best;
  }
  function trailCompletedAt(userId,t){const p=progressGet(userId,t.id);return p.completedAt||p.updatedAt||'';}
  function isTrailLateForUser(userId,t){return !!(t&&t.deadline&&trailPct(userId,t)<100&&dateDiffDays(t.deadline)<0);}
  function lmsTrailStatus(userId,t){
    const pct=trailPct(userId,t);const late=isTrailLateForUser(userId,t);
    if(pct>=100)return {key:'done',label:'Concluída',pill:'sp-done'};
    if(late)return {key:'late',label:'Atrasada',pill:'sp-late'};
    if(pct>0)return {key:'progress',label:'Em andamento',pill:'sp-prog'};
    return {key:'pending',label:'Não iniciada',pill:'sp-pend'};
  }
  function lmsPointsForUser(u){
    if(!u)return {points:0,done:0,high:0,early:0,late:0};
    let points=0,done=0,high=0,early=0,late=0;
    trailsForUser(u).forEach(t=>{
      const pct=trailPct(u.id,t);
      if(pct>=100){
        done++;points+=50;
        const best=bestTrailScore(u.id,t);if(best>=90){high++;points+=20;}
        if(t.deadline){
          const ca=trailCompletedAt(u.id,t);
          if(ca && ca.slice(0,10)<=t.deadline){early++;points+=30;}
        }
      }else if(isTrailLateForUser(u.id,t)){late++;}
    });
    return {points,done,high,early,late};
  }
  window.lmsPointsForUser=lmsPointsForUser;

  function lmsRankings(){
    const users=collaboratorsAll();
    const individual=users.map(u=>({u,...lmsPointsForUser(u)})).sort((a,b)=>b.points-a.points).slice(0,10);
    const sectors={};
    users.forEach(u=>{const k=u.sector||'Sem setor';const p=lmsPointsForUser(u);if(!sectors[k])sectors[k]={name:k,points:0,users:0,done:0,late:0};sectors[k].points+=p.points;sectors[k].users++;sectors[k].done+=p.done;sectors[k].late+=p.late;});
    const bySector=Object.values(sectors).sort((a,b)=>b.points-a.points).slice(0,10);
    return {individual,bySector};
  }
  function rankBox(title,rows,type){
    return `<div class="rank-box"><div class="rank-title">${ic(type==='sector'?'team':'award',15)} ${title}</div>${rows.length?rows.map((r,i)=>{
      const name=type==='sector'?r.name:r.u.name;
      const sub=type==='sector'?`${r.users} colaborador(es) · ${r.done} conclusão(ões)`: `${r.done} conclusão(ões) · ${r.high} nota(s) 90%+`;
      return `<div class="lms-rank-row"><span class="lms-rank-medal">${i+1}</span><span class="lms-rank-info"><b>${esc(name)}</b><span>${esc(sub)}</span></span><span class="lms-rank-points">${r.points} pts</span></div>`;
    }).join(''):'<p class="muted" style="font-size:13px;padding:8px;">Sem dados para ranking.</p>'}</div>`;
  }

  window.syncTrailCompletion=function(userId,trailId){
    try{
      if(!userId||!trailId)return;
      const t=trailById(trailId);if(!t)return;
      const p=(currentUser&&currentUser.id===userId&&currentTrailId===trailId&&typeof progress!=='undefined')?progress:progressGet(userId,trailId);
      p.done=p.done||[];p.passed=p.passed||{};p.scores=p.scores||{};p.attempts=p.attempts||{};
      const total=(t.modules||[]).length;
      const done=p.done.filter(id=>(t.modules||[]).some(m=>m.id===id)).length;
      const pct=total?Math.round(done/total*100):0;
      p.percent=pct;p.completed=total>0&&pct>=100;p.status=p.completed?'concluida':(pct>0?'andamento':'pendente');
      if(p.completed&&!p.completedAt)p.completedAt=new Date().toISOString();
      p.updatedAt=new Date().toISOString();
      db.progressByUser[progKey(userId,trailId)]=JSON.parse(JSON.stringify(p));
    }catch(e){console.warn('syncTrailCompletion LMS patch',e);}
  };

  if(typeof progressSet==='function'){
    window.progressSet=function(userId,trailId,prog){
      prog=prog||{};
      db.progressByUser[progKey(userId,trailId)]={
        done:prog.done||[],polls:prog.polls||{},passed:prog.passed||{},scores:prog.scores||{},attempts:prog.attempts||{},
        percent:prog.percent||0,completed:!!prog.completed,status:prog.status||'pendente',completedAt:prog.completedAt||'',evaluation:prog.evaluation||null,updatedAt:new Date().toISOString()
      };
      try{syncTrailCompletion(userId,trailId);}catch(e){}
      dbSave();
    };
  }

  window.validateTrail=function(t){
    const probs=_oldValidateTrail?_oldValidateTrail(t):[];
    if(t&&t.mandatory&&!t.deadline)probs.push('Trilha obrigatória precisa ter prazo de conclusão.');
    if(t&&t.status==='published'&&!trailFinalQuizOk(t))probs.push('O último módulo da trilha precisa ter quiz/prova obrigatório como critério de aprovação.');
    return probs;
  };

  window.lmsAddFinalQuiz=function(){
    try{
      if(typeof trail==='undefined'||!trail)return;
      trail.modules=trail.modules||[];
      trail.modules.push({id:uid(),name:'Quiz final obrigatório',contentType:'text',src:'',fileName:'',text:'Responda ao quiz final para concluir esta trilha.',durationMin:5,materials:[],_open:true,quiz:normalizeQuiz({kind:'quiz',passThreshold:Number(trail.passThreshold||70),questions:[{q:'Pergunta final de validação',options:['Alternativa correta','Alternativa incorreta'],correct:0}]})});
      if(typeof markDirty==='function')markDirty();
      if(_oldRenderEditor)renderEditor();
      if(typeof render==='function')render();
      toast('Quiz final obrigatório adicionado. Edite as perguntas antes de publicar.');
    }catch(e){console.warn(e);}
  };

  window.renderEditor=function(){
    if(_oldRenderEditor)_oldRenderEditor();
    try{
      const body=document.getElementById('editorBody');if(!body||document.getElementById('lmsRulesBox'))return;
      trail.mandatory=!!trail.mandatory;trail.deadline=trail.deadline||'';trail.passThreshold=Number(trail.passThreshold||70);
      const finalOk=trailFinalQuizOk(trail);
      const box=document.createElement('div');box.className='ed-group';box.id='lmsRulesBox';
      box.innerHTML=`<div class="ed-group-title">${ic('lock',16)} Regras de aprovação e obrigatoriedade</div>
        <div class="lms-config-grid">
          <label class="cert-switch"><input type="checkbox" ${trail.mandatory?'checked':''} onchange="trail.mandatory=this.checked;markDirty&&markDirty();renderEditor()"> <span>Trilha obrigatória</span></label>
          <div class="fld" style="margin:0"><label>Prazo de conclusão</label><input class="inp" type="date" value="${esc(trail.deadline||'')}" onchange="trail.deadline=this.value;markDirty&&markDirty()"><div class="lms-help">Usado para status Atrasada e alertas do RH.</div></div>
          <div class="fld" style="margin:0"><label>Nota mínima padrão do quiz</label><input class="inp" type="number" min="0" max="100" step="5" value="${Number(trail.passThreshold||70)}" onchange="trail.passThreshold=Math.max(0,Math.min(100,Number(this.value)||70));markDirty&&markDirty()"><div class="lms-help">Sugestão para novos quizzes. Cada quiz pode ter nota própria.</div></div>
          <div class="callout ${finalOk?'callout-info':'callout-warn'}" style="margin:0">${ic(finalOk?'check':'warn',18)}<div>${finalOk?'Quiz final obrigatório configurado.':'Falta quiz/prova obrigatório no último módulo da trilha.'}<br><button type="button" class="btn btn-ghost btn-sm" style="margin-top:8px" onclick="lmsAddFinalQuiz()">${ic('plus',14)} Adicionar quiz final</button></div></div>
        </div>`;
      const groups=body.querySelectorAll('.ed-group');
      if(groups.length>=1)groups[0].after(box);else body.prepend(box);
    }catch(e){console.warn('renderEditor LMS patch',e);}
  };

  window.trailCardColab=function(t,pct){
    const n=t.modules.length,dur=fmtDuration(trailDurationMin(t)),dl=deadlineInfo(t),st=lmsTrailStatus(currentUser.id,t),best=bestTrailScore(currentUser.id,t);
    return `<div class="trail-card" role="button" tabindex="0" aria-label="Abrir trilha ${esc(t.title)||'sem título'}" onclick="openTrailAsStudent('${t.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openTrailAsStudent('${t.id}')}" >
      ${trailCoverCard(t)}
      <div class="tc-top"><div class="tc-ic">${ic('trail',20)}</div><div class="tc-badges">
        ${t.mandatory?`<span class="statuspill sp-mand">Obrigatória</span>`:''}<span class="statuspill ${st.pill}">${st.label}</span>${best?`<span class="statuspill sp-score">Melhor nota ${best}%</span>`:''}
      </div></div>
      ${t.category?`<div class="tc-cat">${esc(t.category)}</div>`:''}
      <h3>${esc(t.title)||'Trilha sem título'}</h3><p class="tc-sub">${esc(t.subtitle)||'&nbsp;'}</p>
      <div class="tc-foot"><span>${n} módulo${n!==1?'s':''}</span>${dur?`<span class="tc-dur">${ic('clock',13)} ${dur}</span>`:''}</div>
      ${dl&&pct<100?`<div class="tc-deadline ${dl.cls}">${ic('calendar',13)} ${dl.label}</div>`:''}
      <div class="rp-bar" style="margin-top:10px;"><span style="width:${pct}%"></span></div>
    </div>`;
  };

  window.rhTrailCard=function(t){
    const base=_oldRhTrailCard?_oldRhTrailCard(t):'';
    if(!base||!base.includes('tc-rh-actions'))return base||'';
    const lastOk=trailFinalQuizOk(t);
    const extra=`<div class="tc-badges" style="justify-content:flex-start;margin-top:10px;">
      ${t.mandatory?`<span class="statuspill sp-mand">Obrigatória</span>`:`<span class="statuspill sp-pend">Não obrigatória</span>`}
      ${t.deadline?`<span class="statuspill sp-score">Prazo ${formatDate(t.deadline)}</span>`:`<span class="statuspill sp-late">Sem prazo</span>`}
      <span class="statuspill ${lastOk?'sp-done':'sp-late'}">${lastOk?'Quiz final OK':'Sem quiz final'}</span>
    </div>`;
    return base.replace('<div class="tc-rh-actions">',extra+'<div class="tc-rh-actions">');
  };

  // Garantir que variáveis de filtro existam independente de qual script carregou primeiro
  if(typeof window.colabTrailQuery==='undefined')window.colabTrailQuery='';
  if(typeof window.colabTrailCategory==='undefined')window.colabTrailCategory='all';
  window.setColabTrailCategory=function(cat){
    window.colabTrailCategory=cat||'all';
    if(typeof go==='function')go('trilhas');
  };
  window.setColabTrailQuery=function(v){
    window.colabTrailQuery=v||'';
    if(typeof go==='function')go('trilhas');
    setTimeout(()=>{const e=document.getElementById('colabTrailSearch');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}},0);
  };
  window.clearColabTrailQuery=function(){window.setColabTrailQuery('');};

  SCREENS['trilhas']=function(host){
    const all=trailsForUser(currentUser);
    const cats=[...new Set(all.map(t=>t.category).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    let list=all.slice();
    if(window.colabTrailCategory&&window.colabTrailCategory!=='all')list=list.filter(t=>(t.category||'')===window.colabTrailCategory);
    if(window.colabTrailQuery){const q=window.colabTrailQuery.toLowerCase();list=list.filter(t=>(t.title||'').toLowerCase().includes(q)||(t.subtitle||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q));}
    const tools=all.length?`<div class="toolbar-sticky"><div class="toolbar-row"><div class="search-bar">${ic('search',16)}<input id="colabTrailSearch" placeholder="Buscar por nome da trilha..." value="${esc(window.colabTrailQuery||'')}" oninput="setColabTrailQuery(this.value)">${window.colabTrailQuery?`<button type="button" class="search-clear" onclick="clearColabTrailQuery()" title="Limpar">${ic('x',14)}</button>`:''}</div>${cats.length?`<div class="filter-pills"><button type="button" class="type-pill cat-pill ${window.colabTrailCategory==='all'?'on':''}" onclick="setColabTrailCategory('all')">Todas <span class="cat-pill-count">${all.length}</span></button>${cats.map(c=>`<button type="button" class="type-pill cat-pill ${window.colabTrailCategory===c?'on':''}" onclick='setColabTrailCategory(${JSON.stringify(c)})'>${esc(c)} <span class="cat-pill-count">${all.filter(t=>t.category===c).length}</span></button>`).join('')}</div>`:''}<span class="results-count">${list.length} de ${all.length}</span></div></div>`:'';
    if(!all.length){host.innerHTML=pageHead('Minhas Trilhas','Trilhas atribuídas para você.')+emptyBox('trail','Nenhuma trilha publicada','O RH ainda não publicou trilhas.','');return;}
    if(!list.length){host.innerHTML=pageHead('Minhas Trilhas','Trilhas atribuídas para você.')+tools+`<div class="filter-empty">${ic('search',32)}<b>Nenhuma trilha encontrada</b><p>Tente outros termos ou remova o filtro.</p></div>`;return;}
    const mandatory=list.filter(t=>t.mandatory&&trailPct(currentUser.id,t)<100);
    const late=list.filter(t=>isTrailLateForUser(currentUser.id,t));
    const soon=list.filter(t=>t.deadline&&trailPct(currentUser.id,t)<100&&!isTrailLateForUser(currentUser.id,t)&&dateDiffDays(t.deadline)<=7);
    const progressList=list.filter(t=>trailPct(currentUser.id,t)>0&&trailPct(currentUser.id,t)<100&&!late.includes(t));
    const done=list.filter(t=>trailPct(currentUser.id,t)>=100);
    const recommended=list.filter(t=>!t.mandatory&&trailPct(currentUser.id,t)===0);
    const points=lmsPointsForUser(currentUser);
    function sec(title,arr,empty){return `<div class="lms-section"><div class="lms-section-head"><h2>${title}</h2><span>${arr.length}</span></div>${arr.length?`<div class="trail-grid">${arr.map(t=>trailCardColab(t,trailPct(currentUser.id,t))).join('')}</div>`:`<div class="lms-empty-section">${empty}</div>`}</div>`;}
    host.innerHTML=pageHead('Minhas Trilhas','Obrigatórias, pendentes, atrasadas e concluídas.')+tools+`
      <div class="lms-status-row"><div class="lms-status-card"><b>${all.length}</b><span>atribuídas</span></div><div class="lms-status-card"><b>${done.length}</b><span>concluídas</span></div><div class="lms-status-card"><b>${mandatory.length}</b><span>obrigatórias pendentes</span></div><div class="lms-status-card late"><b>${late.length}</b><span>atrasadas</span></div><div class="lms-status-card"><b>${points.points}</b><span>pontos</span></div></div>
      ${sec('Atrasadas',late,'Nenhuma trilha atrasada.')}
      ${sec('Obrigatórias pendentes',mandatory.filter(t=>!late.includes(t)),'Nenhuma obrigatória pendente.')}
      ${sec('Vencendo esta semana',soon,'Nenhuma trilha vencendo nos próximos 7 dias.')}
      ${sec('Em andamento',progressList,'Nenhuma trilha em andamento.')}
      ${sec('Recomendadas',recommended,'Nenhuma recomendada disponível.')}
      ${sec('Concluídas',done,'Nenhuma trilha concluída ainda.')}`;
  };

  SCREENS['rh-dashboard']=function(host){
    const users=collaboratorsAll(),pubTrails=trailsPublished(),rank=lmsRankings();
    let atrib=0,nao=0,and=0,done=0,late=0,mandatoryPend=0,soon=0,quizBlock=0;
    const byTrail=[];
    pubTrails.forEach(t=>{
      const elig=users.filter(u=>trailsForUser(u).some(x=>x.id===t.id));let s=0,d=0,l=0;
      elig.forEach(u=>{const pct=trailPct(u.id,t),st=lmsTrailStatus(u.id,t);atrib++;s+=pct;if(pct===0)nao++;else if(pct>=100){done++;d++;}else and++;if(st.key==='late'){late++;l++;}if(t.mandatory&&pct<100)mandatoryPend++;if(t.deadline&&pct<100&&!isTrailLateForUser(u.id,t)&&dateDiffDays(t.deadline)<=7)soon++;const p=progressGet(u.id,t.id);if((t.modules||[]).some(m=>m.quiz&&moduleHasGate(m)&&!p.passed[m.id]&&p.attempts&&p.attempts[m.id]))quizBlock++;});
      byTrail.push({t,elig:elig.length,avg:elig.length?Math.round(s/elig.length):0,done:d,late:l});
    });
    const avg=atrib?Math.round((done/atrib)*100):0;
    host.innerHTML=pageHead('Dashboard RH','Controle de obrigatoriedade, prazos, conclusão e gamificação.')+`
      <div class="dash-grid"><div class="dash-card"><div class="dash-ic">${ic('team',18)}</div><b>${users.length}</b><span>Colaboradores</span></div><div class="dash-card"><div class="dash-ic">${ic('trail',18)}</div><b>${pubTrails.length}</b><span>Trilhas publicadas</span></div><div class="dash-card"><div class="dash-ic">${ic('chart',18)}</div><b>${avg}%</b><span>Conclusão geral</span></div><div class="dash-card ${mandatoryPend?'dash-warn':''}"><div class="dash-ic">${ic('lock',18)}</div><b>${mandatoryPend}</b><span>Obrigatórias pendentes</span></div><div class="dash-card ${late?'dash-warn':''}"><div class="dash-ic">${ic('warn',18)}</div><b>${late}</b><span>Atrasadas</span></div><div class="dash-card ${soon?'dash-warn':''}"><div class="dash-ic">${ic('calendar',18)}</div><b>${soon}</b><span>Vencem em 7 dias</span></div><div class="dash-card"><div class="dash-ic">${ic('certificate',18)}</div><b>${db.certificates.length}</b><span>Certificados</span></div><div class="dash-card ${quizBlock?'dash-warn':''}"><div class="dash-ic">${ic('quiz',18)}</div><b>${quizBlock}</b><span>Reprovas em quiz</span></div></div>
      <div class="home-section"><div class="sec-head"><h2>Status das atribuições</h2></div><div class="status-cards"><div class="status-card sc-pend"><b>${nao}</b><span>Não iniciadas</span></div><div class="status-card sc-prog"><b>${and}</b><span>Em andamento</span></div><div class="status-card sc-done"><b>${done}</b><span>Concluídas</span></div><div class="status-card sc-pend" style="background:#fdeceb"><b style="color:#c4564b">${late}</b><span style="color:#c4564b">Atrasadas</span></div></div></div>
      <div class="home-section"><div class="sec-head"><h2>Ranking de gamificação</h2></div><div class="lms-rank-grid">${rankBox('Individual',rank.individual,'user')}${rankBox('Por setor',rank.bySector,'sector')}</div></div>
      <div class="home-section"><div class="sec-head"><h2>Conclusão e atraso por trilha</h2></div><div class="ind-list">${byTrail.length?byTrail.map(x=>`<div class="ind-row"><div class="ind-name">${esc(x.t.title)||'Sem título'}<span class="muted" style="display:block;font-size:11.5px;font-weight:600;">${x.done}/${x.elig} concluíram · ${x.late} atrasado(s)</span></div><div class="rp-bar"><span style="width:${x.avg}%"></span></div><div class="ind-pct">${x.avg}%</div></div>`).join(''):'<div class="lms-empty-section">Publique trilhas e cadastre usuários para gerar indicadores.</div>'}</div></div>`;
  };

  try{ if(Array.isArray(db.trails))db.trails=db.trails.map(normalizeTrail); }catch(e){}
})();
</script>

</body>
</html>

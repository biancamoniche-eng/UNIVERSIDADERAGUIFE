function mediaStage(m){
  if(m.contentType==='youtube'){
    const av=getActiveVideo(m);
    const v=ytId(av.video&&av.video.src);
    const modIdx=trail.modules.indexOf(m);
    const done=isVideoWatched(m,av.index);
    const player=v?`<div class="media-stage"><iframe src="https://www.youtube.com/embed/${v}" allowfullscreen allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture"></iframe></div>`
      :mediaEmpty('Nenhum vídeo inserido','Adicione um ou mais links do YouTube neste módulo pelo editor.');
    const action=v?`<div class="video-seq-action"><button class="btn btn-primary btn-sm" onclick="markVideoWatched(${modIdx},${av.index},false)">${done?ic('next',15):ic('check',15)} ${av.index<av.videos.length-1?(done?'Ir para o próximo vídeo':'Concluir vídeo e avançar'):'Concluir último vídeo'}</button><span>${av.index+1}/${av.videos.length} vídeo(s) do módulo</span></div>`:'';
    return player+videoPlaylistHtml(m)+action;
  }
  if(m.contentType==='mp4'){
    const av=getActiveVideo(m);
    const modIdx=trail.modules.indexOf(m);
    if(!av.video||av.video.mp4Missing||!av.video.src)return mediaEmpty('Vídeo MP4 indisponível','Reenvie o MP4 pelo editor ou use YouTube para conteúdo permanente.')+videoPlaylistHtml(m);
    const done=isVideoWatched(m,av.index);
    return `<div class="media-stage"><video src="${av.video.src}" controls onended="markVideoWatched(${modIdx},${av.index},true)"></video></div>`+videoPlaylistHtml(m)+`<div class="video-seq-action"><button class="btn btn-primary btn-sm" onclick="markVideoWatched(${modIdx},${av.index},false)">${done?ic('next',15):ic('check',15)} ${av.index<av.videos.length-1?(done?'Ir para o próximo vídeo':'Concluir vídeo e avançar'):'Concluir último vídeo'}</button><span>${av.index+1}/${av.videos.length} vídeo(s) do módulo</span></div>`;
  }
  if(m.contentType==='pdf'){
    if(!m.src)return mediaEmpty('Nenhum PDF inserido','Adicione o link do PDF neste módulo pelo editor.');
    const pn=normalizeMatUrl(m.src);
    if(pn.embed){
      return `<div class="media-stage" style="aspect-ratio:auto;"><iframe src="${pn.url}" style="height:560px;width:100%;border:none;" allow="autoplay"></iframe></div>`;
    }
    // link não embeddable: mostra botão para abrir em nova aba
    return `<div class="media-stage" style="aspect-ratio:21/6;background:linear-gradient(120deg,var(--green-900),var(--green-700));"><div class="media-empty"><div class="me-ic">${ic('doc',30)}</div><b>Documento PDF</b><a class="btn btn-primary" href="${esc(m.src)}" target="_blank" rel="noopener" style="margin-top:12px;">${ic('link',15)} Abrir documento</a></div></div>`;
  }
  // text module → no media stage, show a quiet placeholder banner
  return `<div class="media-stage" style="aspect-ratio:21/6;background:linear-gradient(120deg,var(--green-900),var(--green-700));"><div class="media-empty"><div class="me-ic">${ic('text',30)}</div><b>Módulo de leitura</b><span>O conteúdo está abaixo, na aba Conteúdo.</span></div></div>`;
}

/* ---------- normaliza URL de material para embed ---------- */
function normalizeMatUrl(url){
  if(!url)return {url:'',embed:false,icon:'link'};
  const u=url.trim();

  // base64 local (PDF subido diretamente)
  if(u.startsWith('data:application/pdf')||u.startsWith('data:application/octet')){
    return {url:u,embed:true,icon:'doc',isBase64:true};
  }

  // Google Drive: /file/d/ID/view ou /file/d/ID/edit → /preview
  // também aceita: drive.google.com/open?id=ID
  const gdrive1=u.match(/drive\.google\.com\/file\/d\/([^/?#]+)/);
  if(gdrive1){
    return {url:`https://drive.google.com/file/d/${gdrive1[1]}/preview`,embed:true,icon:'doc',label:'Google Drive'};
  }
  const gdrive2=u.match(/drive\.google\.com\/open\?id=([^&]+)/);
  if(gdrive2){
    return {url:`https://drive.google.com/file/d/${gdrive2[1]}/preview`,embed:true,icon:'doc',label:'Google Drive'};
  }
  // Google Docs/Sheets/Slides → embed
  const gdocs=u.match(/docs\.google\.com\/(document|spreadsheets|presentation)\/d\/([^/?#]+)/);
  if(gdocs){
    const base=`https://docs.google.com/${gdocs[1]}/d/${gdocs[2]}/preview`;
    return {url:base,embed:true,icon:'doc',label:'Google Docs'};
  }

  // SharePoint embed: já tem /_layouts/15/embed.aspx → usa como está
  if(u.includes('sharepoint.com')&&u.includes('embed.aspx')){
    return {url:u,embed:true,icon:'doc',label:'SharePoint'};
  }
  // SharePoint genérico → tenta converter para embed
  if(u.includes('sharepoint.com')||u.includes('.sharepoint.')){
    // link de compartilhamento: adiciona parâmetro de embed
    const spEmbed=u.includes('?')
      ? u+'&action=embedview'
      : u+'?action=embedview';
    return {url:spEmbed,embed:true,icon:'doc',label:'SharePoint'};
  }
  // OneDrive share link → embed
  const onedrive=u.match(/1drv\.ms\/[a-z]\/([^?#]+)/i)||u.match(/onedrive\.live\.com\/embed/i);
  if(onedrive||u.includes('onedrive.live.com')){
    const odEmbed=u.replace('redir?','embed?').replace('view.aspx','embed.aspx');
    return {url:odEmbed,embed:true,icon:'doc',label:'OneDrive'};
  }

  // URL termina em .pdf → tenta embed direto
  if(/\.pdf(\?.*)?$/i.test(u)){
    return {url:u,embed:true,icon:'doc'};
  }

  // qualquer outro link → abre em nova aba
  return {url:u,embed:false,icon:'link'};
}

function lessonBody(m){
  if(isVideoModule(m) && !allVideosWatched(m)){
    const pend=firstPendingVideoIndex(m)+1;
    return `<div class="gate-note">${ic('lock',14)} Assista os vídeos em sequência antes de acessar materiais, textos ou quiz. Próximo: vídeo ${pend}.</div>`;
  }
  // aba materiais: exibe apenas os materiais
  if(lessonTab==='materiais'){
    const mats=m.materials||[];
    if(mats.length===0)return `<p class="lesson-text" style="color:var(--gray-400);">Nenhum material complementar neste módulo.</p>`;
    return mats.map((mat,j)=>{
      const norm=normalizeMatUrl(mat.url||'');
      const name=esc(mat.name)||'Material';
      if(norm.embed){
        // embeddable: Google Drive, SharePoint, OneDrive, base64, .pdf direto
        const label=norm.label?` <span style="font-size:10.5px;font-weight:700;opacity:.6;">${norm.label}</span>`:'';
        return `<div class="mat-card">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <span class="material-chip" style="cursor:default;margin:0;">${ic('doc',16)} ${name}${label}</span>
            <button class="btn btn-text btn-sm" onclick="toggleMatPdf(${j})">${ic(openMatPdf===j?'eyeOff':'eye',15)} ${openMatPdf===j?'Ocultar':'Abrir aqui'}</button>
            ${norm.isBase64?`<a class="btn btn-ghost btn-sm" href="${norm.url}" download="${esc(mat.name)||'material'}.pdf">${ic('download',15)} Baixar</a>`:`<a class="btn btn-ghost btn-sm" href="${esc(mat.url)}" target="_blank" rel="noopener">${ic('link',15)} Abrir original</a>`}
          </div>
          ${openMatPdf===j?`<iframe class="mat-pdf-frame" src="${norm.url}" allow="autoplay"></iframe>`:''}
        </div>`;
      }
      // link externo simples → abre em nova aba
      return `<a class="material-chip" href="${esc(mat.url)}" target="_blank" rel="noopener">${ic('link',16)} ${name}</a>`;
    }).join('');
  }

  // aba conteudo (padrão): texto/descrição + quiz INLINE logo abaixo, sem precisar trocar de aba
  const textBlock = m.contentType==='text'
    ? (m.text?`<div class="lesson-text">${esc(m.text)}</div>`:`<p class="lesson-text" style="color:var(--gray-400);">Sem texto neste módulo.</p>`)
    : (m.text?`<div class="lesson-text">${esc(m.text)}</div>`:``);

  // se não tem quiz, retorna só o texto
  if(!m.quiz) return textBlock||`<p class="lesson-text" style="color:var(--gray-400);">Sem descrição de conteúdo para este módulo.</p>`;

  // verifica se o quiz/enquete já foi respondido/aprovado
  const quizDone = m.quiz.kind==='poll'
    ? !!(progress.polls[m.id] && Object.keys(progress.polls[m.id]).length)
    : isQuizPassed(m);

  if(quizDone){
    // quiz já ok: mostra badge de conclusão leve, sem repetir o quiz
    const doneLabel = m.quiz.kind==='poll'
      ? 'Enquete respondida — obrigado!'
      : 'Quiz aprovado — pode avançar para o próximo módulo.';
    return textBlock+`<div class="quiz-inline-done">${ic('check',18)} ${doneLabel}</div>`;
  }

  // quiz ainda pendente: renderiza inline completo logo abaixo do conteúdo
  const kindLabel = m.quiz.kind==='poll' ? 'Enquete'
    : m.quiz.kind==='truefalse' ? 'Verdadeiro ou Falso' : 'Quiz';
  const subLabel  = m.quiz.kind==='poll'
    ? 'Responda para concluir este módulo'
    : `Nota mínima: ${quizThreshold(m)}% — responda para liberar o próximo módulo`;

  return textBlock+`
    <div class="quiz-inline-block">
      <div class="quiz-inline-header">

      </div>
      ${quizRuntime(m)}
    </div>`;
}

/* ---------- quiz runtime: quiz / poll / truefalse ---------- */
function quizRuntime(m){
  const q=m.quiz;
  const configured = q && q.questions && q.questions.some(qq=>qq.q && qq.q.trim() && (qq.options||[]).some(o=>o&&o.trim()));
  if(!configured){
    return `<p class="lesson-text" style="color:var(--gray-400);">A avaliação deste módulo ainda não foi configurada.</p>`;
  }
  const kindCls=QKIND[q.kind].cls;
  const kindLabel=q.kind==='poll'?'Enquete':(q.kind==='truefalse'?'Verdadeiro ou falso':'Prova');
  const sub = q.kind==='poll' ? `${q.questions.length} pergunta${q.questions.length!==1?'s':''}`
            : `${q.questions.length} pergunta${q.questions.length!==1?'s':''} · nota mínima ${quizThreshold(m)}%`;

  // bloco de cada pergunta
  const blocks = q.questions.map((qq,qi)=>{
    let opts;
    if(q.kind==='poll'){
      if(quizState.submitted){
        const votes=(progress.polls[m.id]&&progress.polls[m.id][qi])||{};
        const total=Object.values(votes).reduce((a,b)=>a+b,0)||1;
        opts=qq.options.map((o,i)=>{const c=votes[i]||0;const pc=Math.round(c/total*100);
          return `<div class="poll-bar"><span style="width:${pc}%"></span><div class="poll-label"><span>${esc(o)}</span><span>${pc}%</span></div></div>`;}).join('');
      }else{
        opts=qq.options.map((o,i)=>`<div class="opt ${quizState.answers[qi]===i?'sel':''}" onclick="pickOpt(${qi},${i})"><span class="bullet"></span>${esc(o)}</div>`).join('');
      }
    }else{
      opts=qq.options.map((o,i)=>{
        let cls='opt';
        if(quizState.submitted){if(i===qq.correct)cls+=' correct';else if(quizState.answers[qi]===i)cls+=' wrong';}
        else if(quizState.answers[qi]===i)cls+=' sel';
        return `<div class="${cls}" onclick="${quizState.submitted?'':`pickOpt(${qi},${i})`}"><span class="bullet">${quizState.submitted&&i===qq.correct?ic('check',13):(quizState.submitted&&quizState.answers[qi]===i?ic('x',13):'')}</span>${esc(o)}</div>`;
      }).join('');
    }
    const numTag = q.questions.length>1 ? `<div class="q-num">Pergunta ${qi+1} de ${q.questions.length}</div>` : '';
    return `<div class="quiz-question">${numTag}<div class="quiz-q-text">${esc(qq.q)||'(sem texto)'}</div>${opts}</div>`;
  }).join('');

  // rodapé: ação ou resultado
  let foot='';
  if(quizState.submitted){
    if(q.kind==='poll'){
      foot=`<div class="quiz-feedback qf-poll">${ic('poll',18)} Respostas registradas. Veja como o time respondeu.</div>`;
    }else{
      const pct=quizScorePct(m,quizState.answers);
      const min=quizThreshold(m);
      const acertos=quizCorrectCount(m,quizState.answers);
      const att=(progress.attempts&&progress.attempts[m.id])||{best:pct,count:1};
      const scoreCard=`<div class="quiz-result ${pct>=min?'qr-pass':'qr-fail'}">
        <div class="qr-score"><b>${pct}%</b><span>sua nota</span></div>
        <div class="qr-meta">
          <div>${acertos} de ${q.questions.length} corretas</div>
          <div class="muted">Mínimo p/ aprovar: ${min}% · Tentativa ${att.count}${att.best>pct?` · melhor: ${att.best}%`:''}</div>
        </div>
        <div class="qr-badge">${pct>=min?ic('check',20):ic('x',20)}</div>
      </div>`;
      if(pct>=min){
        foot=scoreCard+`<div class="quiz-feedback qf-pass" style="margin-top:10px;">${ic('check',18)} Aprovado! Módulo liberado para conclusão.</div>`;
      }else{
        foot=scoreCard+`<div class="quiz-feedback qf-fail" style="margin-top:10px;">${ic('x',18)} Não atingiu a nota mínima. As corretas estão destacadas — revise e tente de novo.</div>
          <button class="btn btn-primary btn-sm" style="margin-top:12px;" onclick="retryQuiz()">${ic('prev',15)} Refazer o quiz</button>`;
      }
    }
  }else{
    const isGate = q.kind!=='poll';
    const ready = quizAllAnswered(m,quizState.answers);
    foot=`${isGate?`<div class="gate-note">${ic('lock',14)} Atinja ${quizThreshold(m)}% de acerto para concluir o módulo.</div>`:''}
      <button class="btn btn-primary btn-sm" onclick="submitQuiz()" ${ready?'':'disabled'}>${q.kind==='poll'?'Enviar respostas':'Enviar respostas'}</button>
      ${!ready?`<span class="muted" style="font-size:12px;margin-left:10px;">Responda todas as perguntas</span>`:''}`;
  }

  return `<div class="quiz-card">
    <div class="quiz-card-head">
      <span class="quiz-kind ${kindCls}">${ic(QKIND[q.kind].icon,13)} ${kindLabel}</span>
      <span class="quiz-sub">${sub}</span>
    </div>
    ${blocks}
    <div class="quiz-foot">${foot}</div>
  </div>`;
}
let openMatPdf=null;
function toggleMatPdf(j){openMatPdf=openMatPdf===j?null:j;document.getElementById('lessonBody').innerHTML=lessonBody(trail.modules[currentIdx]);}
function pickOpt(qi,i){quizState.answers[qi]=i;document.getElementById('lessonBody').innerHTML=lessonBody(trail.modules[currentIdx]);}
function retryQuiz(){quizState={answers:{},submitted:false};document.getElementById('lessonBody').innerHTML=lessonBody(trail.modules[currentIdx]);}
function submitQuiz(){
  const m=trail.modules[currentIdx];const q=m.quiz;
  if(!quizAllAnswered(m,quizState.answers))return;
  if(q.kind==='poll'){
    // registra votos por pergunta
    progress.polls[m.id]=progress.polls[m.id]||{};
    q.questions.forEach((qq,qi)=>{
      progress.polls[m.id][qi]=progress.polls[m.id][qi]||{};
      const sel=quizState.answers[qi];
      progress.polls[m.id][qi][sel]=(progress.polls[m.id][qi][sel]||0)+1;
    });
  }else{
    // prova / V-F: aprova se atingiu a nota mínima; guarda MELHOR nota + nº de tentativas
    const pct=quizScorePct(m,quizState.answers);
    progress.attempts=progress.attempts||{};
    const a=progress.attempts[m.id]||{best:0,count:0};
    a.count+=1;
    a.best=Math.max(a.best||0,pct);
    progress.attempts[m.id]=a;
    progress.scores[m.id]=a.best; // mantém compat: scores = melhor nota
    if(pct>=quizThreshold(m))progress.passed[m.id]=true;
  }
  quizState.submitted=true;
  lessonTab='conteudo'; // mantém na aba conteúdo (quiz é inline)
  save();
  try{
    if(typeof __raguifeAfterQuizSubmit==='function'){
      setTimeout(()=>{try{__raguifeAfterQuizSubmit()}catch(e){console.warn(e)}},80);
    }else{
      render();
      // após render, scroll suave para a nav (botão próximo/concluir)
      setTimeout(()=>{
        const nav=document.querySelector('.lesson-nav');
        if(nav)nav.scrollIntoView({behavior:'smooth',block:'end'});
      },200);
    }
  }catch(e){
    console.warn('submitQuiz pós-envio',e);
    try{render();}catch(_){}
  }
}

/* ---------- navigation + completion ---------- */
function navModule(d){
  // ao avançar (d>0): verifica sequência de vídeos e quiz obrigatório
  if(d>0){
    const cur=trail.modules[currentIdx];
    if(cur && isVideoModule(cur) && !allVideosWatched(cur)){
      cur.activeVideoIndex=firstPendingVideoIndex(cur);
      render();
      setTimeout(()=>{try{document.getElementById('mediaStage')?.scrollIntoView({behavior:'smooth',block:'start'});}catch(e){}},120);
      toast('Assista todos os vídeos deste módulo antes de avançar',true);
      return;
    }
    if(cur && cur.quiz && !progress.done.includes(cur.id)){
      const done = cur.quiz.kind==='poll'
        ? !!(progress.polls[cur.id] && Object.keys(progress.polls[cur.id]).length)
        : isQuizPassed(cur);
      if(!done){
        // scroll suave até o bloco de quiz inline
        const quizBlock=document.querySelector('.quiz-inline-block');
        if(quizBlock){quizBlock.scrollIntoView({behavior:'smooth',block:'center'});}
        // pulsa o bloco visualmente para chamar atenção
        if(quizBlock){quizBlock.style.outline='2.5px solid var(--lime-500)';setTimeout(()=>{quizBlock.style.outline='';},1800);}
        toast(cur.quiz.kind==='poll'?'Responda a enquete antes de avançar':'Responda o quiz antes de avançar para o próximo módulo',true);
        return;
      }
    }
  }
  currentIdx=Math.max(0,Math.min(totalModules()-1,currentIdx+d));
  lessonTab='conteudo';quizState={answers:{},submitted:false};render();window.scrollTo({top:0,behavior:'smooth'});
}
function openModule(i){currentIdx=i;lessonTab='conteudo';quizState={answers:{},submitted:false};render();window.scrollTo({top:0,behavior:'smooth'});}
function nextIncompleteModuleIndex(fromIdx){
  if(!trail || !Array.isArray(trail.modules) || !trail.modules.length)return -1;
  for(let i=(fromIdx||0); i<trail.modules.length; i++){
    if(!progress.done.includes(trail.modules[i].id))return i;
  }
  for(let i=0; i<trail.modules.length; i++){
    if(!progress.done.includes(trail.modules[i].id))return i;
  }
  return -1;
}

function safeGoAfterCompletion(target){
  try{
    if(typeof go==='function'){
      if(target) go(target);
      else if(currentUser && currentUser.role==='rh') go('rh-trilhas');
      else go('trilhas');
      return;
    }
  }catch(e){console.warn('safeGoAfterCompletion/go',e);}
  try{ renderHome && renderHome(); }catch(e){}
}

function showTrailCompletedScreen(){
  try{
    const cert = currentUser && currentTrailId ? certIssue(currentUser.id,currentTrailId) : null;
    const host=document.getElementById('screenHost');
    if(host){

            <button class="btn btn-ghost" onclick="safeGoAfterCompletion()">${ic('prev',16)} Voltar para trilhas</button>
          </div>

function toggleComplete(){
  try{
    if(!trail || !Array.isArray(trail.modules) || !trail.modules.length){
      toast('Nenhum módulo encontrado nesta trilha',true);
      safeGoAfterCompletion();
      return;
    }

    if(currentIdx<0 || currentIdx>=trail.modules.length) currentIdx=0;
    const m=trail.modules[currentIdx];
    if(!m){
      toast('Módulo não encontrado',true);
      safeGoAfterCompletion();
      return;
    }

    const already=progress.done.includes(m.id);
    if(!already && typeof canComplete==='function' && !canComplete(m)){
      lessonTab='quiz';
      if(typeof render==='function') render();
      toast(m.quiz && m.quiz.kind==='poll' ? 'Responda a enquete para concluir' : 'Atinja a nota mínima para concluir', true);
      return;
    }

    const idx=progress.done.indexOf(m.id);

    // Reabrir módulo
    if(idx>=0){
      progress.done.splice(idx,1);
      if(typeof save==='function') save(); else dbSave();
      if(typeof render==='function') render();
      toast('Módulo reaberto');
      return;
    }

    // Concluir módulo atual
    progress.done.push(m.id);
    if(typeof syncTrailCompletion==='function') syncTrailCompletion(currentUser&&currentUser.id,currentTrailId);
    if(typeof save==='function') save(); else dbSave();

    const total = typeof totalModules==='function' ? totalModules() : trail.modules.length;
    const pct = typeof pctDone==='function' ? pctDone() : Math.round((progress.done.length/Math.max(total,1))*100);
    const trilhaCompleta = total>0 && pct>=100;

    if(trilhaCompleta){
      if(typeof syncTrailCompletion==='function') syncTrailCompletion(currentUser&&currentUser.id,currentTrailId);
      dbSave();
      toast('🎉 Trilha concluída! Certificado emitido.');
      showTrailCompletedScreen();
      return;
    }

    // Avançar para próximo módulo pendente
    const nextIdx=nextIncompleteModuleIndex(currentIdx+1);
    if(nextIdx>=0){
      currentIdx=nextIdx;
      lessonTab='conteudo';
      quizState={answers:{},submitted:false};
      if(typeof render==='function') render();
      try{window.scrollTo({top:0,behavior:'smooth'});}catch(e){}
      toast('Módulo concluído. Próximo módulo carregado.');
      return;
    }

    if(typeof render==='function') render();
    toast('Módulo concluído');
  }catch(e){
    console.error('Erro ao concluir módulo',e);
    toast('Módulo salvo. Recarregando tela...',true);
    try{dbSave();}catch(_){}
    safeGoAfterCompletion();
  }
}

function trailCover(t){
  return (t&&(t.coverImage||t.coverUrl||t.coverDataUrl))||'';
}
function trailCoverCard(t){
  const src=trailCover(t);
  if(src)return `<div class="tc-cover"><img src="${esc(src)}" alt="Capa da trilha ${esc(t.title||'')}"></div>`;
  return '';
}
function trailCoverPreview(t){
  const src=trailCover(t);
  return `<div class="cover-preview">${src?`<img src="${esc(src)}" alt="Prévia da capa">`:'Sem imagem de capa'}</div>`;
}
function pickTrailCover(){
  const inp=document.createElement('input');
  inp.type='file';
  inp.accept='image/png,image/jpeg,image/webp';
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0];if(!file)return;
    if(!/^image\/(png|jpeg|webp)$/.test(file.type)){
      toast('Use imagem JPG, PNG ou WEBP',true);return;
    }
    if(file.size>4*1024*1024){
      toast('Imagem muito grande. Use até 4 MB.',true);return;
    }
    try{
      const data=await imageFileToDataUrl(file,1100,.82);
      trail.coverImage=data;
      trail.coverFileName=file.name;
      markDirty();
      renderEditor();
      render();
      toast('Capa adicionada à trilha');
    }catch(e){
      console.error(e);
      toast('Não foi possível carregar a imagem',true);
    }
  };
  inp.click();
}
function imageFileToDataUrl(file,maxSize=1100,quality=.82){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=reject;
    reader.onload=()=>{
      const img=new Image();
      img.onerror=reject;
      img.onload=()=>{
        let w=img.width,h=img.height;
        const scale=Math.min(1,maxSize/Math.max(w,h));
        w=Math.round(w*scale);h=Math.round(h*scale);
        const canvas=document.createElement('canvas');
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext('2d');
        ctx.drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}
function removeTrailCover(){
  if(!trail)return;
  trail.coverImage='';

function edQuestion(m,i,qq,qi){

    </div>
    <div class="fld" style="margin-bottom:10px;"><input class="inp" placeholder="Digite a pergunta" value="${esc(qq.q)}" oninput="trail.modules[${i}].quiz.questions[${qi}].q=this.value;refreshIfCurrent(${i})"></div>
    <label style="font-size:11.5px;font-weight:800;color:var(--gray-600);">Alternativas${q.kind!=='poll'?' (marque a correta)':''}</label>
    <div style="margin-top:6px;">
    ${qq.options.map((o,oi)=>`<div class="ed-opt-row">
      ${q.kind!=='poll'?`<input type="radio" name="ed_correct_${i}_${qi}" ${qq.correct===oi?'checked':''} onclick="trail.modules[${i}].quiz.questions[${qi}].correct=${oi}" title="Correta" aria-label="Correta">`:`<span style="width:17px;flex-shrink:0;"></span>`}
      <input class="inp" placeholder="Alternativa ${oi+1}" value="${esc(o)}" oninput="trail.modules[${i}].quiz.questions[${qi}].options[${oi}]=this.value;refreshIfCurrent(${i})" ${q.kind==='truefalse'?'readonly style="background:var(--gray-050);"':''}>

function addQuiz(i){markDirty();trail.modules[i].quiz=normalizeQuiz({kind:'quiz',passThreshold:DEFAULT_THRESHOLD,questions:[{q:'',options:['',''],correct:0}]});renderEditor();render();}
function delQuiz(i){markDirty();trail.modules[i].quiz=null;renderEditor();render();}
function setQuizKind(i,k){
  const q=trail.modules[i].quiz;q.kind=k;
  if(k==='poll')q.passThreshold=null; else if(typeof q.passThreshold!=='number')q.passThreshold=DEFAULT_THRESHOLD;
  q.questions.forEach(qq=>{
    if(k==='truefalse'){qq.options=['Verdadeiro','Falso'];if(qq.correct>1)qq.correct=0;}
    else if(k==='poll'){qq.correct=null;if(qq.options.length<2)qq.options=['',''];}
    else{if(qq.correct===null||qq.correct===undefined)qq.correct=0;if(qq.options.length<2)qq.options=['',''];}
  });
  renderEditor();render();
}
function addQuestion(i){markDirty();trail.modules[i].quiz.questions.push(blankQuestion(trail.modules[i].quiz.kind));renderEditor();render();}
function delQuestion(i,qi){markDirty();const q=trail.modules[i].quiz;q.questions.splice(qi,1);if(q.questions.length===0)q.questions.push(blankQuestion(q.kind));renderEditor();render();}
function blankQuestion(kind){
  if(kind==='truefalse')return {q:'',options:['Verdadeiro','Falso'],correct:0};
  if(kind==='poll')return {q:'',options:['',''],correct:null};
  return {q:'',options:['',''],correct:0};
}
function addOption(i,qi){markDirty();trail.modules[i].quiz.questions[qi].options.push('');renderEditor();}
function delOption(i,qi,oi){markDirty();const qq=trail.modules[i].quiz.questions[qi];qq.options.splice(oi,1);if(qq.correct!==null&&qq.correct>=qq.options.length)qq.correct=0;renderEditor();render();}

/* ---------- file upload ---------- */
function pickFile(i,kind,videoIndex){
  const inp=document.getElementById('filePick');
  inp.accept=kind==='mp4'?'video/mp4':'application/pdf';
  inp.onchange=e=>{const f=e.target.files[0];if(!f){return;}const m=trail.modules[i];const v=(kind==='mp4'?moduleVideos(m)[(videoIndex==null?0:videoIndex)]:null);if(kind==='mp4'&&v){v.fileName=f.name;v.title=v.title||f.name.replace(/\.mp4$/i,'');m.activeVideoIndex=(videoIndex==null?0:videoIndex);}m.fileName=f.name;
    // PRODUÇÃO: sobe para o Firebase Storage e guarda só a URL/metadados
    if(window.RAGUIFE_CLOUD&&window.RAGUIFE_CLOUD.enabled&&typeof cloudUpload==='function'){
      toast('Enviando '+(kind==='mp4'?'vídeo':'PDF')+'...');
      cloudUpload(f,{folder:kind==='mp4'?'videos':'pdfs'},pct=>{
        const hint=document.getElementById('uplHint'+i);if(hint)hint.textContent='Enviando... '+pct+'%';
      }).then(res=>{
        if(kind==='mp4'&&v){v.src=res.url;v.fileSize=res.size;v.origem='upload';v.storagePath=res.path||'';v.mp4Blob=false;v.mp4Missing=false;if((videoIndex||0)===0){m.src=v.src;m.fileName=v.fileName;m.storagePath=v.storagePath;m.mp4Blob=false;m.mp4Missing=false;}}else{m.src=res.url;m.fileSize=res.size;m.origem='upload';m.storagePath=res.path||'';m.mp4Blob=false;m.mp4Missing=false;}
        if(typeof cloudSaveFileMeta==='function')cloudSaveFileMeta({url:res.url,tipo:kind,nomeArquivo:res.name,tamanho:res.size,trilhaId:trail.id,moduloId:m.id,criadoPor:(window._cu&&window._cu.email)||'',origem:'upload'});
        renderEditor();render();toast((kind==='mp4'?'Vídeo':'PDF')+' enviado e salvo na nuvem');
      }).catch(err=>{console.warn(err);toast('Falha no envio. Verifique a conexão.',true);});
      inp.value='';return;
    }
    // DEMO/local
    if(kind==='mp4'){const url=URL.createObjectURL(f);if(v){v.src=url;v.mp4Blob=true;v.mp4Missing=false;v.origem='upload';if((videoIndex||0)===0){m.src=url;m.mp4Blob=true;m.mp4Missing=false;m.origem='upload';}}else{m.src=url;m.mp4Blob=true;m.mp4Missing=false;m.origem='upload';}renderEditor();render();toast('Vídeo carregado na sessão atual. Para salvar permanentemente, publique com Firebase habilitado ou use YouTube.',true);}
    else{
      // PDF como conteúdo de módulo em modo demo: base64 pesado destrói o localStorage
      if(!window.RAGUIFE_CLOUD||!window.RAGUIFE_CLOUD.enabled){
        toast('PDFs como conteúdo de módulo só funcionam com Firebase ativo. Em modo demo, use YouTube ou texto.',true);
        inp.value='';return;
      }
      // Firebase ativo: envia para Storage
      if(f.size>20*1024*1024){toast('PDF muito grande (máx 20MB)',true);inp.value='';return;}
      toast('Enviando PDF para a nuvem...');
      cloudUpload(f,{folder:'pdfs'},pct=>{
        const hint=document.getElementById('uplHint'+i);if(hint)hint.textContent='Enviando... '+pct+'%';
      }).then(res=>{
        m.src=res.url;m.fileSize=res.size;m.origem='upload';m.storagePath=res.path||'';
        if(typeof cloudSaveFileMeta==='function')cloudSaveFileMeta({url:res.url,tipo:'pdf',nomeArquivo:res.name,tamanho:res.size,trilhaId:trail.id,moduloId:m.id,origem:'upload'});
        renderEditor();render();toast('PDF enviado e salvo na nuvem');
      }).catch(err=>{console.warn(err);toast('Falha no envio do PDF.',true);});
      inp.value='';
    }
    inp.value='';};
  inp.click();
}
function refreshIfCurrent(i){if(i===currentIdx){document.getElementById('mediaStage')&&(document.getElementById('mediaStage').innerHTML=mediaStage(trail.modules[i]));renderRail();}}

function saveTrail(){
  if(!trail.title.trim()){toast('Dê um título à trilha',true);return;}
  // Avisa sobre vídeos MP4 locais que não persistirão na nuvem
  const mp4Pendentes=(trail.modules||[]).flatMap(m=>m.contentType==='mp4'?moduleVideos(m).filter(v=>v.mp4Blob&&!v.storagePath):[]);
  if(mp4Pendentes.length&&window.RAGUIFE_CLOUD&&window.RAGUIFE_CLOUD.enabled){
    toast('Atenção: '+mp4Pendentes.length+' vídeo(s) MP4 local(is) não foram enviados ao Storage. Use YouTube ou reenvie os vídeos.',true);
  }
  save();render();toast('Trilha salva');closeEditor();
}

/* ---------- exportar / importar trilha em JSON ---------- */
function exportTrail(){
  if(!trail.title.trim()){toast('Dê um título antes de exportar',true);return;}
  const clone=JSON.parse(JSON.stringify(trail));
  clone.modules.forEach(m=>{if(m.contentType==='mp4'){moduleVideos(m).forEach(v=>{if(v.mp4Blob){v.src='';v.mp4Missing=true;}});if(m.mp4Blob){m.src='';m.mp4Missing=true;}}});
  const blob=new Blob([JSON.stringify(clone,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download=(trail.title.replace(/[^a-zA-Z0-9-_ ]/g,'').trim()||'trilha')+'.json';
  document.body.appendChild(a);a.click();a.remove();
  URL.revokeObjectURL(url);
  toast('Trilha exportada');
}
function importTrailPick(){
  const inp=document.getElementById('filePick');
  inp.accept='application/json,.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;
    const r=new FileReader();

          toast('Arquivo não parece uma trilha válida',true);return;

        trail=normalizeTrail(Object.assign({

/* ---------- Estrutura avançada compatível: módulo pode ter múltiplos conteúdos ---------- */
function normalizeAdvancedModuleContent(module){
  if(!module)return module;
  if(!Array.isArray(module.contents)){
    const arr=[];
    if(module.video||module.videoUrl||module.youtube){
      arr.push({id:uid(),type:'video',title:'Vídeo',url:module.video||module.videoUrl||module.youtube,required:true,hidden:false});
    }
    if(module.pdf||module.pdfUrl){
      arr.push({id:uid(),type:'pdf',title:'PDF de apoio',url:module.pdf||module.pdfUrl,required:false,hidden:false});
    }
    if(module.text||module.body||module.description){
      arr.push({id:uid(),type:'text',title:'Texto de apoio',text:module.text||module.body||module.description,required:false,hidden:false});
    }
    if(module.quiz){
      arr.push({id:uid(),type:'quiz',title:'Quiz',quiz:module.quiz,required:true,hidden:false});
    }
    module.contents=arr;
  }
  if(!Array.isArray(module.checklist)) module.checklist=[];
  if(!Array.isArray(module.challenges)) module.challenges=[];
  return module;
}
function normalizeAllAdvancedContent(){
  try{(db.trails||[]).forEach(t=>(t.modules||[]).forEach(m=>normalizeAdvancedModuleContent(m)));}catch(e){}
}


function persistLearningStateToDb(){
  try{
    if(typeof currentUser==='undefined'||!currentUser||typeof currentTrailId==='undefined'||!currentTrailId)return;
    if(typeof progress!=='undefined'&&progress&&typeof progKey==='function'){
      db.progressByUser[progKey(currentUser.id,currentTrailId)]=JSON.parse(JSON.stringify(progress));
    }
    if(typeof trail!=='undefined'&&trail&&Array.isArray(db.trails)){
      const idx=db.trails.findIndex(t=>t.id===currentTrailId);
      if(idx>=0){
        const old=db.trails[idx]||{};
        db.trails[idx]=Object.assign({},old,JSON.parse(JSON.stringify(trail)),{id:currentTrailId});
      }
    }
  }catch(e){console.warn('persistLearningStateToDb',e);}
}

function dbSave(){try{persistLearningStateToDb();}catch(e){}try{normalizeAllAdvancedContent();}catch(e){}
  try{
    const clone=JSON.parse(JSON.stringify(db));
    // blobs de mp4 não persistem entre sessões
    clone.trails.forEach(t=>(t.modules||[]).forEach(m=>{if(m.contentType==='mp4'&&m.mp4Blob){m.src='';m.mp4Missing=true;}}));
    let json=JSON.stringify(clone);
    // se payload > 4MB, tenta compactar removendo PDFs/capas base64 do localStorage
    // (eles ficam disponíveis na sessão em memória, mas não são persistidos offline)
    if(json.length>4*1024*1024){
      clone.trails.forEach(t=>{
        if(t.coverDataUrl&&t.coverDataUrl.length>500)t.coverDataUrl='';
        (t.modules||[]).forEach(m=>{
          if(m.contentType==='pdf'&&m.src&&m.src.startsWith('data:')){
            // guarda flag mas remove o blob base64 do localStorage
            m._pdfCachedLocally=false;
            m.src='';
            m.mp4Missing=true; // flag genérica de "conteúdo ausente no cache"
          }
        });
      });
      json=JSON.stringify(clone);
    }
    localStorage.setItem(DB_KEY,json);
  }catch(e){
    if(e.name==='QuotaExceededError'){
      toast('Armazenamento local cheio. PDFs/capas grandes podem não persistir offline — use Firebase em produção.',true);
    }else{console.warn('store save',e);}
  }
  // sincroniza com a nuvem (Firebase) quando habilitado — debounced
  if(typeof window.cloudPushDebounced==='function')window.cloudPushDebounced();
}
/* aplica um estado vindo da nuvem no db em memória (chamado pelo firebase-sync) */
window.cloudApplyState=function(state){
  if(!state||typeof state!=='object')return;

  const wasLearning = (typeof activeScreen!=='undefined' && activeScreen==='learning');
  const keepTrailId = (typeof currentTrailId!=='undefined') ? currentTrailId : null;
  const keepUserId = (typeof currentUser!=='undefined' && currentUser) ? currentUser.id : null;
  const keepIdx = (typeof currentIdx!=='undefined') ? currentIdx : 0;
  const keepLessonTab = (typeof lessonTab!=='undefined') ? lessonTab : 'conteudo';

  // Preservar senhas locais: o Firestore não armazena passwords (por segurança).
  // Ao aplicar estado remoto, re-injetamos as senhas do db local para não perder autenticação demo.
  const localPasswords={};
  (db.users||[]).forEach(u=>{if(u.id&&u.password)localPasswords[u.id]=u.password;});

  db.users=Array.isArray(state.users)?state.users:[];
  // re-injetar senhas que não vieram da nuvem
  db.users.forEach(u=>{if(u.id&&!u.password&&localPasswords[u.id])u.password=localPasswords[u.id];});
  db.trails=(Array.isArray(state.trails)?state.trails:[]).map(normalizeTrail);
  db.progressByUser=state.progressByUser||{};
  db.events=(state.events||[]).map(e=>{e.assignment=e.assignment||{mode:'all',sectors:[],cargos:[],userIds:[]};e.participants=e.participants||[];e.attendees=e.attendees||[];return e;});
  db.certificates=Array.isArray(state.certificates)?state.certificates:[];
  db.cargoTrails=state.cargoTrails||{};
  db.lastAccess=state.lastAccess||{};
  seedDefaults();
  try{localStorage.setItem(DB_KEY,JSON.stringify(db));}catch(e){}

  // Correção crítica:
  // Durante a trilha, activeScreen='learning', mas 'learning' não é uma tela em SCREENS.
  // Antes o sistema chamava go('learning') e caía em "Tela não encontrada".
  if(wasLearning && keepTrailId){
    try{
      const fresh=trailById(keepTrailId);
      if(fresh){
        trail=JSON.parse(JSON.stringify(fresh));
        currentTrailId=keepTrailId;
        if(keepUserId)progress=progressGet(keepUserId,keepTrailId);
        currentIdx=Math.min(Math.max(0,keepIdx||0),Math.max(0,(trail.modules||[]).length-1));
        lessonTab=keepLessonTab||'conteudo';
        if(document.getElementById('colMain')&&document.getElementById('colRail')){
          render();
        }else if(typeof enterLearningShell==='function'){
          enterLearningShell();
        }
        return;
      }
    }catch(e){console.warn('cloudApplyState learning render',e);}
    return;
  }

  // re-renderiza a tela atual se o app já estiver montado
  if(typeof activeScreen!=='undefined'&&activeScreen&&activeScreen!=='login'&&typeof go==='function')go(activeScreen);
};

/* senha padrão = primeira letra do primeiro nome + último sobrenome (minúsculo)
   Ex.: "Carlos Silva" -> "csilva" */
function defaultPassword(name){
  const parts=String(name||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').split(/\s+/).filter(Boolean);
  let pass='';
  if(parts.length>=2){
    pass=(parts[0][0]||'')+parts[parts.length-1];
  }else{
    pass=(parts[0]||'raguife');
  }
  pass=pass.replace(/[^a-z0-9]/g,'');
  if(pass.length<6) pass=(pass+'123456').slice(0,6);
  return pass;
}
function userByEmail(email){
  const e=(email||'').trim().toLowerCase();
  return db.users.find(u=>(u.email||'').toLowerCase()===e)||null;
}
/* autentica por e-mail + senha (todos os perfis) */
function authenticate(email,password){
  const u=userByEmail(email);
  if(!u)return {ok:false,error:'E-mail não encontrado'};
  const senha=u.password||defaultPassword(u.name); // se não tiver senha definida, usa a padrão
  if(senha!==password)return {ok:false,error:'Senha incorreta'};
  return {ok:true,user:u};
}

/* ---------- trilhas ---------- */
function trailsAll(){return db.trails;}

/* trilhas visíveis para um colaborador, respeitando a atribuição */
function trailsForUser(u){
  if(!u)return [];
  const base=trailsPublished().filter(t=>{
    const a=t.assignment||{mode:'all'};
    if(a.mode==='all')return true;
    const bySector=(a.sectors||[]).includes(u.sector);
    const byCargo=(a.cargos||[]).includes(u.cargo);
    const byUser=(a.userIds||[]).includes(u.id);
    return bySector||byCargo||byUser;
  });
  // Trilhas marcadas como obrigatórias por cargo também ficam visíveis ao colaborador,
  // mesmo quando a atribuição geral da trilha está restrita a outro público.
  const cargoIds=cargoTrailsGet(u.cargo);
  cargoIds.forEach(id=>{
    const t=trailById(id);
    if(t&&t.status==='published'&&!base.some(x=>x.id===id))base.push(t);
  });
  return base;
}
function trailById(id){return db.trails.find(t=>t.id===id)||null;}
function trailUpsert(t){
  t=normalizeTrail(t);
  const i=db.trails.findIndex(x=>x.id===t.id);
  if(i>=0)db.trails[i]=t;else db.trails.push(t);
  dbSave();return t;
}
function trailDelete(id){

/* ---------- backup geral (exportar/importar todo o sistema) ---------- */

function importBackup(payload){

/* ---------- progresso por usuário ---------- */
function progKey(userId,trailId){return userId+'__'+trailId;}
function progressGet(userId,trailId){
  const p=db.progressByUser[progKey(userId,trailId)];
  if(p){const cp=JSON.parse(JSON.stringify(p));cp.done=cp.done||[];cp.polls=cp.polls||{};cp.passed=cp.passed||{};cp.scores=cp.scores||{};cp.attempts=cp.attempts||{};cp.videos=cp.videos||{};cp.materials=cp.materials||{};return cp;}
  return {done:[],polls:{},passed:{},scores:{},attempts:{},videos:{},materials:{}};
}
function progressSet(userId,trailId,prog){
  db.progressByUser[progKey(userId,trailId)]={
    done:prog.done||[],polls:prog.polls||{},passed:prog.passed||{},scores:prog.scores||{},attempts:prog.attempts||{},videos:prog.videos||{},materials:prog.materials||{},
    updatedAt:new Date().toISOString()
  };
  dbSave();
}
function trailPct(userId,t){
  if(!t||!t.modules.length)return 0;
  const p=progressGet(userId,t.id);
  const done=(p.done||[]).filter(id=>t.modules.some(m=>m.id===id)).length;
  return Math.round(done/t.modules.length*100);
}

function certFind(userId,trailId){return db.certificates.find(c=>c.userId===userId&&c.trailId===trailId)||null;}
function certIssue(userId,trailId){
  const existing=certFind(userId,trailId);if(existing)return existing;
  const t=trailById(trailId),u=userById(userId);
  const code='RAG-'+Date.now().toString(36).toUpperCase().slice(-6)+'-'+Math.random().toString(36).toUpperCase().slice(2,5);
  const c={id:newId('cert'),userId,trailId,trailTitle:t?t.title:'',userName:u?u.name:'',
    durationMin:t?trailDurationMin(t):0,moduleCount:t?t.modules.length:0,
    signature:(t&&t.certificate&&t.certificate.signature)||'Recursos Humanos',
    code, issuedAt:new Date().toISOString()};
  db.certificates.push(c);dbSave();return c;
}

/* ---- participação em eventos (ciclo: inscrito → presente/ausente/cancelado) ---- */
function eventParticipant(e,userId){return (e.participants||[]).find(p=>p.userId===userId)||null;}
function eventEnrolledCount(e){return (e.participants||[]).filter(p=>p.status!=='cancelado').length;}
function eventHasVaga(e){return !e.vagas || eventEnrolledCount(e)<e.vagas;}
function eventEnroll(eventId,userId){
  const e=db.events.find(x=>x.id===eventId);if(!e)return {ok:false,error:'Evento não encontrado'};
  e.participants=e.participants||[];
  let p=eventParticipant(e,userId);
  if(p&&p.status!=='cancelado')return {ok:false,error:'Você já está inscrito'};
  if(!eventHasVaga(e))return {ok:false,error:'Vagas esgotadas'};
  if(p){p.status='inscrito';p.enrolledAt=new Date().toISOString();}
  else{e.participants.push({userId,status:'inscrito',enrolledAt:new Date().toISOString(),confirmedAt:null,confirmedBy:null});}
  dbSave();return {ok:true};
}
function eventCancelEnroll(eventId,userId){
  const e=db.events.find(x=>x.id===eventId);if(!e)return;
  const p=eventParticipant(e,userId);if(!p)return;
  p.status='cancelado';dbSave();
}
/* RH confirma presença/ausência; registra data e responsável */
function eventSetStatus(eventId,userId,status,byUserId){
  const e=db.events.find(x=>x.id===eventId);if(!e)return;
  e.participants=e.participants||[];
  let p=eventParticipant(e,userId);
  if(!p){p={userId,status:'inscrito',enrolledAt:new Date().toISOString(),confirmedAt:null,confirmedBy:null};e.participants.push(p);}
  p.status=status;
  if(status==='presente'||status==='ausente'){p.confirmedAt=new Date().toISOString();p.confirmedBy=byUserId||null;}
  dbSave();
}
/* histórico de eventos de um colaborador (todos em que tem participação) */
function eventsOfUser(userId){
  return eventsAll().filter(e=>eventParticipant(e,userId)).map(e=>({event:e,part:eventParticipant(e,userId)}));
}
function eventPresenceRate(e){
  const conf=(e.participants||[]).filter(p=>p.status==='presente'||p.status==='ausente');
  if(!conf.length)return null;
  return Math.round(conf.filter(p=>p.status==='presente').length/conf.length*100);
}

/* ===================== FASE 2: agregações e vínculos ===================== */

/* ---- trilhas obrigatórias por cargo ---- */
function cargoTrailsGet(cargo){return (db.cargoTrails[cargo]||[]).slice();}
function cargoTrailsSet(cargo,trailIds){db.cargoTrails[cargo]=trailIds||[];dbSave();}
function cargosAll(){return [...new Set(usersAll().map(u=>u.cargo).filter(Boolean))];}
function cargosObrigatoriosDaTrilha(trailId){
  return cargosAll().filter(c=>cargoTrailsGet(c).includes(trailId));
}
function trilhaObrigatoriaParaCargoSet(trailId,cargosSelecionados){
  const sel=new Set(cargosSelecionados||[]);
  cargosAll().forEach(c=>{
    const ids=cargoTrailsGet(c);
    const has=ids.includes(trailId);
    if(sel.has(c)&&!has)ids.push(trailId);
    if(!sel.has(c)&&has)ids.splice(ids.indexOf(trailId),1);
    cargoTrailsSet(c,ids);
  });
}
function isTrailMandatoryForUser(t,u){
  if(!t||!u)return false;
  return !!t.mandatory || cargoTrailsGet(u.cargo).includes(t.id);
}
/* trilhas obrigatórias para um usuário = trilhas marcadas mandatory + trilhas do cargo dele,
   limitado às que ele tem direito de ver (atribuição) */
function mandatoryTrailsForUser(u){
  if(!u)return [];
  const visibles=trailsForUser(u);
  const cargoIds=cargoTrailsGet(u.cargo);
  const set=new Set();
  visibles.forEach(t=>{ if(t.mandatory||cargoIds.includes(t.id))set.add(t.id); });
  // trilhas do cargo mesmo que não estejam na atribuição "all/restricted" — garante obrigatoriedade
  cargoIds.forEach(id=>set.add(id));
  return [...set].map(id=>trailById(id)).filter(Boolean).filter(t=>t.status==='published');
}
/* pendências obrigatórias (não concluídas) de um usuário */
function pendingMandatoryForUser(u){
  return mandatoryTrailsForUser(u).filter(t=>trailPct(u.id,t)<100);
}

/* ---- último acesso ---- */
function markAccess(userId){if(userId){db.lastAccess[userId]=new Date().toISOString();dbSave();}}
function lastAccessOf(userId){return db.lastAccess[userId]||null;}

/* ---- horas de treinamento de um usuário ---- */
function trainingHoursOf(userId){
  let min=0;
  // horas de trilhas concluídas (carga horária dos módulos)
  trailsAll().forEach(t=>{ if(trailPct(userId,t)===100)min+=trailDurationMin(t); });
  let hours=min/60;
  // horas de eventos com presença confirmada
  eventsOfUser(userId).forEach(({event,part})=>{ if(part.status==='presente')hours+=(event.hours||0); });
  return Math.round(hours*10)/10;
}

/* ---- histórico de aprendizagem consolidado de um colaborador ---- */
function learningHistory(userId){
  const u=userById(userId);if(!u)return null;
  const all=trailsForUser(u);
  const concluidas=[],andamento=[];
  all.forEach(t=>{const pct=trailPct(userId,t);if(pct===100)concluidas.push(t);else if(pct>0)andamento.push({t,pct});});
  const certs=certsOf(userId);
  const eventos=eventsOfUser(userId);
  // percentual geral de conclusão (sobre trilhas atribuídas)
  let soma=0;all.forEach(t=>soma+=trailPct(userId,t));
  const geral=all.length?Math.round(soma/all.length):0;
  return {
    user:u,
    concluidas, andamento,
    certificados:certs,
    eventos,
    horas:trainingHoursOf(userId),
    ultimoAcesso:lastAccessOf(userId),
    percentualGeral:geral,
    pendentesObrigatorias:pendingMandatoryForUser(u)
  };
}

/* ---- agregações para dashboard/relatórios ---- */
function collaboratorsAll(){return usersAll().filter(u=>u.role!=='rh');}
function monthKey(d){return (d||'').slice(0,7);} // YYYY-MM
function dashboardStats(refMonth){
  const colabs=collaboratorsAll();
  const mes=refMonth||new Date().toISOString().slice(0,7);
  const treinados=colabs.filter(u=>trailsForUser(u).some(t=>trailPct(u.id,t)>0)||eventsOfUser(u.id).some(x=>x.part.status==='presente')).length;
  let horasMes=0;
  // horas no mês: eventos presentes com data no mês + certificados emitidos no mês
  db.events.forEach(e=>{ if(monthKey(e.date)===mes){(e.participants||[]).forEach(p=>{if(p.status==='presente')horasMes+=(e.hours||0);});} });
  db.certificates.forEach(c=>{ if(monthKey(c.issuedAt)===mes)horasMes+=(c.durationMin||0)/60; });
  const eventosMes=db.events.filter(e=>monthKey(e.date)===mes);
  // taxa de presença média
  const rates=db.events.map(eventPresenceRate).filter(r=>r!=null);
  const taxaPresenca=rates.length?Math.round(rates.reduce((a,b)=>a+b,0)/rates.length):null;
  // taxa de conclusão de trilhas (média geral)
  let s=0,n=0;colabs.forEach(u=>trailsForUser(u).forEach(t=>{s+=trailPct(u.id,t);n++;}));
  const taxaConclusao=n?Math.round(s/n):0;
  // obrigatórias pendentes (total de pares colaborador×trilha)
  let pend=0;colabs.forEach(u=>{pend+=pendingMandatoryForUser(u).length;});
  // ranking por área (setor) e por gestor
  const porArea={};colabs.forEach(u=>{const k=u.sector||'—';(porArea[k]=porArea[k]||{soma:0,n:0});let ps=0,pn=0;trailsForUser(u).forEach(t=>{ps+=trailPct(u.id,t);pn++;});porArea[k].soma+=pn?ps/pn:0;porArea[k].n++;});
  const rankingArea=Object.keys(porArea).map(k=>({nome:k,pct:Math.round(porArea[k].soma/porArea[k].n)})).sort((a,b)=>b.pct-a.pct);
  const porGestor={};colabs.forEach(u=>{const mg=u.managerId?(userById(u.managerId)||{}).name||'—':'Sem gestor';(porGestor[mg]=porGestor[mg]||{soma:0,n:0});let ps=0,pn=0;trailsForUser(u).forEach(t=>{ps+=trailPct(u.id,t);pn++;});porGestor[mg].soma+=pn?ps/pn:0;porGestor[mg].n++;});
  const rankingGestor=Object.keys(porGestor).map(k=>({nome:k,pct:Math.round(porGestor[k].soma/porGestor[k].n)})).sort((a,b)=>b.pct-a.pct);
  return {
    mes,
    totalColabs:colabs.length,
    treinados,
    horasMes:Math.round(horasMes*10)/10,
    eventosRealizados:eventosMes.length,
    taxaPresenca,
    taxaConclusao,
    obrigatoriasPendentes:pend,
    certificadosMes:db.certificates.filter(c=>monthKey(c.issuedAt)===mes).length,
    semAcesso:colabs.filter(u=>!lastAccessOf(u.id)).length,
    rankingArea, rankingGestor
  };
}


/* ===== src/js/firebase-sync.js ===== */
/* ============================================================
   firebase-sync.js — camada de produção (Rota B)
   ------------------------------------------------------------
   Integra Firebase Auth + Firestore + Storage SEM reescrever o app.
   - Se o Firebase não estiver configurado -> MODO DEMO (offline, localStorage).
   - Se estiver -> Firebase vira a base oficial; localStorage é só cache/fallback.

   Estratégia de sincronização:
   - O app continua usando o objeto `db` em memória + dbSave()/dbLoad() locais.
   - Esta camada espelha `db` em um documento Firestore (autosave debounced),
     com controle de versão (updatedAt/updatedBy/version) e merge ao reconectar.
   - Uploads de vídeo/PDF/imagem vão para o Storage; o Firestore guarda só metadados.

   Carrega os SDKs do Firebase via CDN (compat) dinamicamente, só quando há config.
============================================================ */
(function(){
  const CFG=window.FIREBASE_CONFIG||{};
  function isCfgValid(){
    const c=window.FIREBASE_CONFIG||{};
    const isPlaceholder=v=>!v||/^(COLE_AQUI|PREENCHER)/.test(v);
    return !window.FORCE_DEMO_MODE && !isPlaceholder(c.apiKey) && !isPlaceholder(c.projectId);
  }
  const cfgValid = isCfgValid();

  // estado global exposto
  window.RAGUIFE_CLOUD = {
    enabled:false,        // Firebase ativo?
    ready:false,          // SDK carregado e inicializado?
    online:navigator.onLine,
    user:null,            // usuário do Firebase Auth
    status:'demo',        // 'demo' | 'connecting' | 'online' | 'offline' | 'error'
    lastSync:null,
    version:0
  };

  const SDK_VERSION='10.12.2';
  const SDKS=[
    `https://www.gstatic.com/firebasejs/${SDK_VERSION}/firebase-app-compat.js`,
    `https://www.gstatic.com/firebasejs/${SDK_VERSION}/firebase-auth-compat.js`,
    `https://www.gstatic.com/firebasejs/${SDK_VERSION}/firebase-firestore-compat.js`,
    `https://www.gstatic.com/firebasejs/${SDK_VERSION}/firebase-storage-compat.js`
  ];
  function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.async=true;s.onload=res;s.onerror=()=>rej(new Error('Falha ao carregar '+src));document.head.appendChild(s);});}

  let fb=null, auth=null, fs=null, storage=null, secondaryAuth=null;
  const DOC_PATH={collection:'configuracoes',doc:'estado_sistema'}; // documento-espelho do db

  /* ---------- inicialização ---------- */
  async function init(){
    if(!isCfgValid()){ setStatus('demo'); return; }
    const CFG=window.FIREBASE_CONFIG||{};
    setStatus('connecting');
    try{
      if(!window.firebase){
        for(const url of SDKS){ await loadScript(url); }
      }
      fb=window.firebase;
      fb.initializeApp(CFG);
      auth=fb.auth();
      fs=fb.firestore();
      storage=fb.storage();
      // Auth secundário: cria usuários no Firebase Auth sem trocar/deslogar a sessão atual do RH
      try{
        const secondaryApp = fb.apps.some(a=>a.name==='raguifeUserCreator')
          ? fb.app('raguifeUserCreator')
          : fb.initializeApp(CFG,'raguifeUserCreator');
        secondaryAuth = secondaryApp.auth();
        try{ await secondaryAuth.setPersistence(fb.auth.Auth.Persistence.NONE); }catch(e){}
      }catch(e){ console.warn('[Firebase] auth secundário indisponível', e); }
      // cache offline do Firestore (persistência local nativa)
      try{ await fs.enablePersistence({synchronizeTabs:true}); }catch(e){ /* multi-aba pode falhar; ok */ }
      window.RAGUIFE_CLOUD.enabled=true;
      window.RAGUIFE_CLOUD.ready=true;
      setStatus(navigator.onLine?'online':'offline');
      bindConnectivity();
      bindAuthState();
    }catch(e){
      console.warn('[Firebase] init falhou, modo demo:',e);
      setStatus('error');
      window.RAGUIFE_CLOUD.enabled=false;
    }
  }

  function setStatus(s){
    window.RAGUIFE_CLOUD.status=s;
    if(typeof window.onCloudStatus==='function')window.onCloudStatus(s);
    const el=document.getElementById('cloudBadge');
    if(el)renderCloudBadge(el);
  }
  function bindConnectivity(){
    window.addEventListener('online',()=>{window.RAGUIFE_CLOUD.online=true;setStatus('online');pushNow();});
    window.addEventListener('offline',()=>{window.RAGUIFE_CLOUD.online=false;setStatus('offline');});
  }

  /* ---------- AUTH ---------- */
  function bindAuthState(){
    auth.onAuthStateChanged(async (u)=>{
      window.RAGUIFE_CLOUD.user=u||null;
      if(u){
        // garante doc de usuário e carrega o estado do sistema
        await ensureUserDoc(u);
        await pullState();
        // se o app ainda não entrou, deixa o app.js decidir via cloudResolveSession
        if(typeof window.cloudResolveSession==='function')window.cloudResolveSession(u);
      }
    });
  }
  // login por email/senha (produção). Retorna {ok,user|error}
  window.cloudLogin=async function(email,password){
    if(!window.RAGUIFE_CLOUD.enabled){ return {ok:false,demo:true}; }
    try{
      const cred=await auth.signInWithEmailAndPassword(email,password);
      return {ok:true,user:cred.user};
    }catch(e){
      // se o usuário existe no Firestore mas não no Auth, tenta criar (primeiro acesso)
      return {ok:false,error:mapAuthError(e)};
    }
  };
  window.cloudCreateAuthUser=async function(email,password){
    if(!window.RAGUIFE_CLOUD.enabled)return {ok:false,demo:true};
    try{const cred=await auth.createUserWithEmailAndPassword(email,password);return {ok:true,user:cred.user};}
    catch(e){return {ok:false,error:mapAuthError(e)};}
  };

  // Cria usuário do cadastro RH no Firebase Auth sem deslogar o RH.
  // Usado quando o RH cadastra novo colaborador/gestor no sistema.
  window.cloudEnsureAuthUserForSystemUser=async function(sysUser){
    if(!window.RAGUIFE_CLOUD.enabled||!sysUser||!sysUser.email)return {ok:false,demo:true};
    const email=(sysUser.email||'').trim();
    let password=(sysUser.password||defaultPassword(sysUser.name)||'').trim();
    try{
      const a=secondaryAuth||auth;
      const cred=await a.createUserWithEmailAndPassword(email,password);
      try{ if(a!==auth) await a.signOut(); }catch(e){}
      const uid=cred.user.uid;
      try{
        await fs.collection('usuarios').doc(uid).set({
          uid,
          email,
          role:sysUser.role||'collaborator',
          name:sysUser.name||'',
          sistemaUserId:sysUser.id||'',
          authCreated:true,
          updatedAt:now()
        },{merge:true});
      }catch(e){ console.warn('[Firebase] doc usuario auth',e); }
      return {ok:true,uid};
    }catch(e){
      const code=(e&&e.code)||'';
      if(code.includes('email-already-in-use')){
        return {ok:true,exists:true,error:'E-mail já existe no Firebase Auth'};
      }
      return {ok:false,error:mapAuthError(e),code};
    }
  };
  window.cloudLogout=async function(){ if(auth)try{await auth.signOut();}catch(e){} };
  function mapAuthError(e){
    const c=(e&&e.code)||'';
    if(c.includes('user-not-found'))return 'E-mail não cadastrado';
    if(c.includes('email-already-in-use'))return 'E-mail já existe no Firebase Auth';
    if(c.includes('wrong-password')||c.includes('invalid-credential'))return 'Senha incorreta';
    if(c.includes('too-many-requests'))return 'Muitas tentativas. Aguarde um momento.';
    if(c.includes('network'))return 'Sem conexão com o servidor';
    return 'Não foi possível entrar';
  }
  async function ensureUserDoc(u){
    try{
      const ref=fs.collection('usuarios').doc(u.uid);
      // descobre o papel do usuário no cadastro do sistema (estado local/nuvem)
      let role='collaborator';
      try{
        const sys=(window.db&&window.db.users||[]).find(x=>(x.email||'').toLowerCase()===(u.email||'').toLowerCase());
        if(sys&&sys.role)role=sys.role;
      }catch(e){}
      await ref.set({email:u.email,role:role,uid:u.uid,updatedAt:now()},{merge:true});
    }catch(e){console.warn('ensureUserDoc',e);}
  }

  /* ---------- SYNC do estado (db) ---------- */
  function now(){return (fb&&fb.firestore&&fb.firestore.FieldValue)?fb.firestore.FieldValue.serverTimestamp():new Date().toISOString();}
  let pushTimer=null, lastPushedJSON='';
  // chamado pelo app sempre que dbSave() roda
  window.cloudPushDebounced=function(){
    if(!window.RAGUIFE_CLOUD.enabled)return;
    if(pushTimer)clearTimeout(pushTimer);
    setSaving(true);
    pushTimer=setTimeout(pushNow,1200);
  };
  async function pushNow(force){
    if(!window.RAGUIFE_CLOUD.enabled||!window.db)return;
    try{
      const payload=JSON.parse(JSON.stringify(window.db));
      // omitir senhas dos usuários no payload do Firestore (segurança)
      (payload.users||[]).forEach(u=>{delete u.password;});
      // não enviar blobs locais de mp4
      (payload.trails||[]).forEach(t=>{
        // strip mp4 blobs
        (t.modules||[]).forEach(m=>{if(m.mp4Blob){m.mp4Blob=null;}});
        // strip coverDataUrl (base64 pesado) — Firestore tem limite de 1MB por documento
        // em produção a capa já deve estar no Storage como coverUrl
        if(t.coverDataUrl&&t.coverDataUrl.length>2000){
          // mantém coverUrl se existir, zera apenas o base64
          if(!t.coverUrl&&t.coverDataUrl)t.coverUrl=t.coverImage||'';
          t.coverDataUrl='';
        }
      });
      const json=JSON.stringify(payload);
      if(!force&&json===lastPushedJSON){ setSaving(false); return; }
      const ver=(window.RAGUIFE_CLOUD.version||0)+1;
      await fs.collection(DOC_PATH.collection).doc(DOC_PATH.doc).set({
        estado:payload,
        version:ver,
        updatedAt:now(),
        updatedBy:(window._cu&&window._cu.email)||(window.RAGUIFE_CLOUD.user&&window.RAGUIFE_CLOUD.user.email)||'sistema'
      },{merge:true});
      window.RAGUIFE_CLOUD.version=ver;
      window.RAGUIFE_CLOUD.lastSync=new Date();
      lastPushedJSON=json;
      await logAction('sync_push',{version:ver});
      setSaving(false,true);
    }catch(e){
      console.warn('[Firebase] push falhou:',e);
      setSaving(false);
      setStatus(navigator.onLine?'error':'offline');
    }
  }
  async function pullState(){
    if(!window.RAGUIFE_CLOUD.enabled)return;
    try{
      const ref=fs.collection(DOC_PATH.collection).doc(DOC_PATH.doc);
      const snap=await ref.get();
      if(snap.exists){
        const data=snap.data();
        if(data&&data.estado){
          window.RAGUIFE_CLOUD.version=data.version||0;
          // MIGRAÇÃO: se a nuvem tem poucos dados mas o local tem cadastro, mescla local→nuvem
          await migrateIfNeeded(data.estado);
          if(typeof window.cloudApplyState==='function')window.cloudApplyState(data.estado);
          lastPushedJSON=JSON.stringify(data.estado);
        }
      }else{
        // primeira vez no projeto: sobe o estado local atual como base (migração inicial)
        await pushNow(true);
      }
      window.RAGUIFE_CLOUD.lastSync=new Date();
      startRealtime(); // passa a ouvir mudanças em tempo real
    }catch(e){console.warn('[Firebase] pull falhou:',e);}
  }

  /* MIGRAÇÃO: se há dados locais (demo) que não estão na nuvem, mescla sem apagar nada */
  async function migrateIfNeeded(cloudState){
    try{
      const local=window.db;
      if(!local)return;
      const cloudUsers=(cloudState.users||[]).length;
      const localUsers=(local.users||[]).length;
      // se a nuvem está praticamente vazia e o local tem mais dados, sobe o local
      const cloudTrails=(cloudState.trails||[]).length, localTrails=(local.trails||[]).length;
      if((localUsers>cloudUsers)||(localTrails>cloudTrails)){
        const merged=mergeStates(cloudState,JSON.parse(JSON.stringify(local)));
        Object.assign(cloudState,merged);
        // marca para subir a versão mesclada
        setTimeout(()=>pushNow(true),500);
        if(typeof toast==='function')toast('Dados locais migrados para a nuvem');
      }
    }catch(e){console.warn('migrate',e);}
  }
  // merge simples por id (nuvem como base, adiciona itens locais ausentes)
  function mergeStates(cloud,local){
    const byId=(arr)=>{const m={};(arr||[]).forEach(x=>{if(x&&x.id)m[x.id]=x;});return m;};
    const merge=(c,l)=>{const m=byId(c);(l||[]).forEach(x=>{if(x&&x.id&&!m[x.id])m[x.id]=x;});return Object.values(m);};
    return {
      users:merge(cloud.users,local.users),
      trails:merge(cloud.trails,local.trails),
      events:merge(cloud.events,local.events),
      certificates:merge(cloud.certificates,local.certificates),
      progressByUser:Object.assign({},local.progressByUser||{},cloud.progressByUser||{}),
      cargoTrails:Object.assign({},local.cargoTrails||{},cloud.cargoTrails||{}),
      lastAccess:Object.assign({},local.lastAccess||{},cloud.lastAccess||{})
    };
  }

  /* REALTIME: ouve mudanças e atualiza todos os usuários conectados */
  let unsub=null;
  function startRealtime(){
    if(unsub||!window.RAGUIFE_CLOUD.enabled)return;
    try{
      unsub=fs.collection(DOC_PATH.collection).doc(DOC_PATH.doc)
        .onSnapshot({includeMetadataChanges:false},snap=>{
          if(!snap.exists)return;
          const data=snap.data();if(!data||!data.estado)return;
          // ignora o próprio push (evita loop)
          const incoming=JSON.stringify(data.estado);
          if(incoming===lastPushedJSON)return;
          if((data.version||0)<window.RAGUIFE_CLOUD.version)return; // versão antiga
          window.RAGUIFE_CLOUD.version=data.version||0;
          lastPushedJSON=incoming;
          if(typeof window.cloudApplyState==='function')window.cloudApplyState(data.estado);
          if(typeof toast==='function'&&window._cu)toast('Dados atualizados');
        },err=>console.warn('[Firebase] realtime erro:',err));
    }catch(e){console.warn('startRealtime',e);}
  }

  /* ---------- STORAGE (uploads) ---------- */
  // sobe um arquivo e retorna {url,path,size,type,name}. onProgress(0..100) opcional.
  window.cloudUpload=async function(file,opts,onProgress){
    opts=opts||{};
    if(!window.RAGUIFE_CLOUD.enabled){
      // modo demo: devolve objectURL temporário (não persiste entre sessões)
      return {url:URL.createObjectURL(file),path:null,size:file.size,type:file.type,name:file.name,demo:true};
    }
    const folder=opts.folder||'arquivos';
    const path=`${folder}/${Date.now()}_${(file.name||'arquivo').replace(/[^\w.\-]/g,'_')}`;
    const ref=storage.ref().child(path);
    return await new Promise((resolve,reject)=>{
      const task=ref.put(file,{contentType:file.type});
      task.on('state_changed',
        s=>{ if(onProgress)onProgress(Math.round(s.bytesTransferred/s.totalBytes*100)); },
        err=>reject(err),
        async ()=>{ const url=await task.snapshot.ref.getDownloadURL();
          resolve({url,path,size:file.size,type:file.type,name:file.name}); }
      );
    });
  };
  // registra metadados do arquivo no Firestore (coleção arquivos)
  window.cloudSaveFileMeta=async function(meta){
    if(!window.RAGUIFE_CLOUD.enabled)return null;
    try{const ref=await fs.collection('arquivos').add(Object.assign({criadoEm:now()},meta));return ref.id;}
    catch(e){console.warn('saveFileMeta',e);return null;}
  };

  /* ---------- LOGS / auditoria ---------- */
  window.cloudLog=logAction;
  async function logAction(acao,detalhe){
    if(!window.RAGUIFE_CLOUD.enabled)return;
    try{await fs.collection('logs').add({acao,detalhe:detalhe||{},por:(window._cu&&window._cu.email)||'sistema',em:now()});}
    catch(e){/* logs não devem quebrar o app */}
  }

  /* ---------- indicador salvando/salvo ---------- */
  function setSaving(saving,done){
    if(typeof window.onCloudSaving==='function')window.onCloudSaving(saving,done);
    const el=document.getElementById('cloudBadge');
    if(el)renderCloudBadge(el,saving,done);
  }
  window.renderCloudBadge=renderCloudBadge;
  function renderCloudBadge(el,saving,done){
    const C=window.RAGUIFE_CLOUD;
    let txt,cls;
    if(!C.enabled){txt='Demo (local)';cls='cb-demo';}
    else if(saving){txt='Salvando...';cls='cb-saving';}
    else if(done){txt='Salvo ✓';cls='cb-ok';}
    else if(C.status==='online'){txt='Sincronizado';cls='cb-ok';}
    else if(C.status==='offline'){txt='Offline';cls='cb-off';}
    else if(C.status==='connecting'){txt='Conectando...';cls='cb-saving';}
    else if(C.status==='error'){txt='Erro de conexão';cls='cb-off';}
    else {txt='Demo (local)';cls='cb-demo';}
    el.className='cloud-badge '+cls;
    el.textContent=txt;
  }

  // expõe init para o app chamar após carregar o resto
  window.cloudInit=init;
  window.cloudPullState=pullState;
})();


/* ===== src/js/xlsx.js ===== */
/* ============================================================
   xlsx.js — gerador de planilhas .xlsx em JavaScript puro.
   Sem dependências. Monta o pacote OOXML (Open XML) e compacta
   num ZIP (com CRC32 e armazenamento STORE) — abre no Excel/Sheets.

   Uso:
     downloadXlsx('relatorio.xlsx', [
       { name:'Trilhas', rows:[['Col A','Col B'],['x',1]] },
       { name:'Eventos', rows:[[...]] }
     ]);
============================================================ */
(function(){
  // ---- CRC32 ----
  const crcTable=(function(){const t=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
  function crc32(bytes){let c=0xFFFFFFFF;for(let i=0;i<bytes.length;i++)c=crcTable[(c^bytes[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}

  const enc=new TextEncoder();
  function strBytes(s){return enc.encode(s);}

  // ---- ZIP (STORE, sem compressão) ----
  function buildZip(files){ // files: [{name, data(Uint8Array)}]
    const chunks=[];const central=[];let offset=0;
    const u16=v=>[v&0xFF,(v>>8)&0xFF];
    const u32=v=>[v&0xFF,(v>>8)&0xFF,(v>>16)&0xFF,(v>>24)&0xFF];
    files.forEach(f=>{
      const nameB=strBytes(f.name);const data=f.data;const crc=crc32(data);
      const local=[].concat([0x50,0x4b,0x03,0x04],u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0));
      const localHeader=new Uint8Array(local);
      chunks.push(localHeader,nameB,data);
      const cen=[].concat([0x50,0x4b,0x01,0x02],u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(nameB.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
      central.push({head:new Uint8Array(cen),name:nameB});
      offset+=localHeader.length+nameB.length+data.length;
    });
    const cenChunks=[];let cenSize=0;
    central.forEach(c=>{cenChunks.push(c.head,c.name);cenSize+=c.head.length+c.name.length;});
    const end=[].concat([0x50,0x4b,0x05,0x06],u16(0),u16(0),u16(files.length),u16(files.length),u32(cenSize),u32(offset),u16(0));
    const all=[...chunks,...cenChunks,new Uint8Array(end)];
    let total=0;all.forEach(a=>total+=a.length);
    const out=new Uint8Array(total);let p=0;all.forEach(a=>{out.set(a,p);p+=a.length;});
    return out;
  }

  function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function colRef(n){let s='';n++;while(n>0){const m=(n-1)%26;s=String.fromCharCode(65+m)+s;n=Math.floor((n-1)/26);}return s;}

  function sheetXml(rows){
    let body='';
    rows.forEach((row,ri)=>{
      let cells='';
      row.forEach((val,ci)=>{
        const ref=colRef(ci)+(ri+1);
        if(typeof val==='number'&&isFinite(val)){
          cells+=`<c r="${ref}"><v>${val}</v></c>`;
        }else{
          cells+=`<c r="${ref}" t="inlineStr"><is><t xml:space="preserve">${esc(val)}</t></is></c>`;
        }
      });
      body+=`<row r="${ri+1}">${cells}</row>`;
    });
    return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>${body}</sheetData></worksheet>`;
  }

  function buildXlsx(sheets){
    // sheets: [{name, rows}]
    const files=[];
    files.push({name:'[Content_Types].xml',data:strBytes(
      `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>${sheets.map((s,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')}</Types>`)});
    files.push({name:'_rels/.rels',data:strBytes(
      `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>`)});
    const sheetTabs=sheets.map((s,i)=>`<sheet name="${esc((s.name||('Planilha'+(i+1))).slice(0,31))}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('');
    files.push({name:'xl/workbook.xml',data:strBytes(
      `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>${sheetTabs}</sheets></workbook>`)});
    files.push({name:'xl/_rels/workbook.xml.rels',data:strBytes(
      `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">${sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')}</Relationships>`)});
    sheets.forEach((s,i)=>{files.push({name:`xl/worksheets/sheet${i+1}.xml`,data:strBytes(sheetXml(s.rows||[]))});});
    return buildZip(files);
  }

  window.downloadXlsx=function(filename,sheets){
    try{
      const bytes=buildXlsx(sheets);
      const blob=new Blob([bytes],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),1000);
      if(typeof toast==='function')toast('Relatório exportado');
    }catch(e){console.error(e);if(typeof toast==='function')toast('Falha ao gerar planilha',true);}
  };
})();

/* ---------- boot ---------- */

  const logoEl=document.getElementById('brandLogo');

/* ---------- login ---------- */
function goLogin(){
  activeScreen='login';
  currentUser=null;sessionClear();
  document.getElementById('appShell').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
  renderLogin();
}
function renderLogin(){
  const host=document.getElementById('loginBody');
  host.innerHTML=`
    <div class="login-card">
      <div class="login-logo"><img src="${window.UNI_LOGO||''}" alt=""></div>
      <h1>Universidade Raguife</h1>
      <p class="login-sub">Entre com seu e-mail e senha.</p>
      <div class="login-pane">
        <div class="fld"><label>E-mail</label><input class="inp" id="loginEmail" type="email" placeholder="seu.email@raguife.com.br" autocomplete="username" onkeydown="if(event.key==='Enter')doLoginByEmail()"></div>
        <div class="fld"><label>Senha</label><input class="inp" id="loginPass" type="password" placeholder="Sua senha" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLoginByEmail()"></div>
        <button class="btn btn-primary btn-block" onclick="doLoginByEmail()">${ic('logout',16)} Entrar</button>
        <p id="loginErr" class="login-err"></p>
      </div>
    </div>`;
}
async function doLoginByEmail(){
  const email=val('loginEmail'),pass=val('loginPass');
  const err=document.getElementById('loginErr');
  if(err)err.textContent='';
  // PRODUÇÃO: Firebase Auth, se habilitado
  if(window.RAGUIFE_CLOUD&&window.RAGUIFE_CLOUD.enabled){
    if(err)err.textContent='Entrando...';
    try{
      let r=await window.cloudLogin(email,pass);
      // primeiro acesso: usuário existe no cadastro local/Firestore mas ainda não no Auth → cria
      if(!r.ok&&r.error==='E-mail não cadastrado'){
        const localU=userByEmail(email);
        if(localU&&(localU.password||defaultPassword(localU.name))===pass){
          const c=await window.cloudCreateAuthUser(email,pass);
          if(c.ok)r={ok:true,user:c.user};
        }
      }
      if(!r.ok){if(err)err.textContent=r.error||'Não foi possível entrar';return;}
      // garante que a lista de usuários da nuvem foi carregada antes de resolver o perfil
      if(typeof window.cloudPullState==='function'){try{await window.cloudPullState();}catch(e){}}
      // resolve o usuário local correspondente (perfil/role vêm do cadastro)
      const localU=userByEmail(email);
      if(!localU){
        if(err)err.textContent='Usuário autenticado, mas sem cadastro no sistema. Procure o RH.';
        if(window.cloudLogout)window.cloudLogout(); // não permite acesso de não cadastrado
        return;
      }
      currentUser=localU;session={userId:localU.id};sessionSave();
      if(window.cloudLog)window.cloudLog('login',{email});
      enterApp();
      return;
    }catch(e){ if(err)err.textContent='Falha ao entrar. Tente novamente.'; return; }
  }
  // DEMO/local
  const r=authenticate(email,pass);
  if(!r.ok){if(err)err.textContent=r.error;return;}
  currentUser=r.user;session={userId:r.user.id};sessionSave();enterApp();
}
/* chamado pela camada Firebase quando o Auth restaura a sessão automaticamente */
window.cloudResolveSession=function(fbUser){
  if(currentUser)return; // já logado
  const localU=userByEmail(fbUser.email);
  if(localU){currentUser=localU;session={userId:localU.id};sessionSave();
    if(activeScreen==='login')enterApp();}
};
function logout(){ if(window.cloudLogout)window.cloudLogout(); goLogin(); }

/* ---------- shell ---------- */
function enterApp(){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appShell').style.display='flex';
  if(currentUser&&typeof markAccess==='function')markAccess(currentUser.id);
  buildSidebar();
  const nav=navFor();
  go(nav[0]?nav[0].id:'home');
}
function buildSidebar(){
  const nav=navFor();
  document.getElementById('sidebar').innerHTML=`
    <div class="side-logo"><img src="${window.UNI_LOGO||''}" alt=""><span>Universidade<br>Raguife</span></div>
    <div class="side-role">${roleLabel(currentUser.role)}</div>
    ${nav.map(n=>`<div class="side-link" data-nav="${n.id}" onclick="go('${n.id}')">${ic(n.icon,18)}<span>${n.label}</span></div>`).join('')}
    <div style="flex:1"></div>
    <div class="side-user">
      <span class="su-av">${esc((currentUser.name[0]||'?').toUpperCase())}</span>
      <span class="su-nm">${esc(currentUser.name)}</span>
    </div>
    <div id="cloudBadge" class="cloud-badge cb-demo">Demo (local)</div>
    <div class="side-link side-logout" onclick="logout()">${ic('logout',17)}<span>Sair</span></div>`;
  if(typeof renderCloudBadge==='function'){const cb=document.getElementById('cloudBadge');if(cb)renderCloudBadge(cb);}
  document.getElementById('bottomTabs').innerHTML=nav.map(n=>
    `<div class="bottom-tab" data-tab="${n.id}" onclick="go('${n.id}')">${ic(n.icon,20)}<span>${n.label}</span></div>`).join('');
}

const SCREENS={};   // id -> render function
function go(id){
  if(id==='learning'){
    activeScreen='learning';
    try{
      if(typeof enterLearningShell==='function'){enterLearningShell();return;}
      if(typeof render==='function'&&document.getElementById('colMain')){render();return;}
    }catch(e){console.warn('go learning',e);}
    id=(currentUser&&currentUser.role==='rh')?'rh-trilhas':'trilhas';
  }
  activeScreen=id;
  document.querySelectorAll('[data-nav]').forEach(el=>el.classList.toggle('active',el.dataset.nav===id));
  document.querySelectorAll('[data-tab]').forEach(el=>el.classList.toggle('active',el.dataset.tab===id));
  const main=document.getElementById('screenHost');
  const fn=SCREENS[id];
  if(fn){fn(main);}else{
    const fallback=(currentUser&&currentUser.role==='rh')?'rh-trilhas':'trilhas';
    if(id!==fallback&&SCREENS[fallback]){activeScreen=fallback;SCREENS[fallback](main);}
    else{main.innerHTML='<div class="empty"><p>Tela não encontrada.</p></div>';}
  }
  window.scrollTo(0,0);
}

/* ---------- HOME ---------- */

  // próxima atividade recomendada: 1) obrigatória pendente mais urgente, 2) em andamento, 3) nova

  if(pendentes.length){const t=pendentes.slice().sort((a,b)=>(a.deadline||'9999').localeCompare(b.deadline||'9999'))[0];next={t,pct:trailPct(currentUser.id,t)};nextReason='Obrigatória'+(t.deadline?' · prazo '+formatDate(t.deadline):'');}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10341a">
<title>Universidade Raguife — Sistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* === src/css/styles.css === */
:root{
  --green-900:#10341a;--green-800:#154a1c;--green-700:#1B5E20;--green-600:#2c7a31;--green-500:#3f8f44;
  --lime-600:#6fa436;--lime-500:#8BC34A;--lime-400:#a3d169;--lime-100:#eef7e2;--lime-050:#f6fbef;
  --white:#fff;--gray-050:#F7F8F6;--gray-100:#ECEEEA;--gray-200:#DCE0D8;--gray-300:#BCC2B6;--gray-400:#9AA193;--gray-600:#5d6356;--gray-700:#3c4136;--gray-900:#1c1f18;
  --done:#3f8f44;--done-bg:#e7f5e8;--prog:#E8932B;--prog-bg:#fdf0dd;--pend:#9AA193;--pend-bg:#eef0ec;
  --shadow-sm:0 1px 2px rgba(16,52,26,.06);--shadow-md:0 8px 24px rgba(16,52,26,.10);--shadow-lg:0 20px 50px rgba(16,52,26,.18);
  --r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:26px;--r-pill:999px;
  --font-display:'Baloo 2',system-ui,sans-serif;--font-body:'Nunito Sans',system-ui,sans-serif;
  --rail:380px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;min-height:100%;overflow-x:hidden;max-width:100%;}
body{font-family:var(--font-body);color:var(--gray-700);background:var(--gray-050);-webkit-font-smoothing:antialiased;line-height:1.55;}
img{max-width:100%;display:block;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
input,select,textarea{font-family:inherit;font-size:14px;}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;color:var(--green-900);line-height:1.18;}
p{margin:0;}
a{color:inherit;}
::selection{background:var(--lime-400);}
:focus-visible{outline:2px solid var(--lime-500);outline-offset:2px;border-radius:5px;}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--r-pill);font-weight:800;font-size:14.5px;padding:11px 20px;min-height:44px;transition:transform .12s,box-shadow .15s,background .15s,border-color .15s;white-space:nowrap;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--lime-500);color:var(--green-900);box-shadow:var(--shadow-sm);}
.btn-primary:hover:not(:disabled){background:var(--lime-400);box-shadow:var(--shadow-md);}
.btn-dark{background:var(--green-700);color:#fff;}
.btn-dark:hover:not(:disabled){background:var(--green-600);}
.btn-ghost{background:transparent;color:var(--green-700);border:1.5px solid var(--gray-200);}
.btn-ghost:hover:not(:disabled){border-color:var(--lime-500);background:var(--lime-050);}
.btn-text{background:none;color:var(--green-700);padding:8px 8px;min-height:auto;}
.btn-text:hover{color:var(--lime-600);}
.btn-sm{padding:8px 15px;min-height:36px;font-size:13px;}
.btn-block{width:100%;}
.btn-danger{background:transparent;color:var(--pend);border:1.5px solid var(--gray-200);}
.btn-danger:hover{border-color:#d9685c;color:#d9685c;background:#fdeceb;}
.iconbtn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--gray-200);color:var(--green-700);display:inline-flex;align-items:center;justify-content:center;background:#fff;flex-shrink:0;transition:.15s;}
.iconbtn:hover{border-color:var(--lime-500);background:var(--lime-050);}
.iconbtn.sm{width:34px;height:34px;}

/* ---------- top bar ---------- */
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:64px;background:var(--green-900);color:#fff;position:sticky;top:0;z-index:50;}
.topbar .brand{display:flex;align-items:center;gap:10px;}
.topbar .brand img{width:30px;height:30px;border-radius:7px;}
.topbar .brand b{font-family:var(--font-display);font-size:15px;font-weight:700;line-height:1;}
.topbar .brand span{font-size:10.5px;color:rgba(255,255,255,.5);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.topbar .tb-divider{width:1px;height:28px;background:rgba(255,255,255,.16);}
.topbar .tb-trail{font-size:13.5px;color:rgba(255,255,255,.85);font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar .tb-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.tb-progress{display:flex;align-items:center;gap:10px;font-size:12.5px;font-weight:800;color:rgba(255,255,255,.9);}
.tb-progress .mini-bar{width:90px;height:6px;border-radius:var(--r-pill);background:rgba(255,255,255,.18);overflow:hidden;}
.tb-progress .mini-bar>span{display:block;height:100%;background:var(--lime-500);border-radius:var(--r-pill);transition:width .4s;}
.mode-toggle{display:flex;background:rgba(255,255,255,.1);border-radius:var(--r-pill);padding:3px;}
.mode-toggle button{font-size:12px;font-weight:800;padding:6px 13px;border-radius:var(--r-pill);color:rgba(255,255,255,.65);}
.mode-toggle button.on{background:var(--lime-500);color:var(--green-900);}

/* ---------- layout ---------- */
.stage{display:grid;grid-template-columns:1fr var(--rail);align-items:start;max-width:1440px;margin:0 auto;}
.col-main{min-width:0;padding:26px 28px 80px;}
.col-rail{position:sticky;top:64px;height:calc(100vh - 64px);overflow-y:auto;border-left:1px solid var(--gray-100);background:#fff;}

/* ---------- header ---------- */
.trail-header{margin-bottom:20px;}
.trail-eyebrow{font-size:11.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--lime-600);margin-bottom:8px;}
.trail-title{font-size:27px;letter-spacing:-.01em;}
.trail-sub{font-size:15px;color:var(--gray-600);margin-top:7px;max-width:680px;}
.trail-meta{display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;font-size:13px;font-weight:700;color:var(--gray-400);}
.trail-meta .tm{display:flex;align-items:center;gap:7px;}
.trail-meta .tm svg{color:var(--lime-600);}

/* ---------- media stage ---------- */
.media-stage{background:#0d0f0c;border-radius:var(--r-xl);overflow:hidden;position:relative;aspect-ratio:16/9;box-shadow:var(--shadow-md);}
.media-stage iframe,.media-stage video{width:100%;height:100%;border:none;display:block;background:#000;}
.media-empty{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:rgba(255,255,255,.5);text-align:center;padding:30px;}
.media-empty .me-ic{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);}
.media-empty b{color:rgba(255,255,255,.82);font-family:var(--font-display);font-size:17px;}
.media-empty span{font-size:13px;max-width:300px;}

/* current module title row */
.now-playing{display:flex;align-items:flex-start;gap:14px;margin:22px 0 6px;}
.now-idx{width:38px;height:38px;border-radius:11px;background:var(--lime-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;flex-shrink:0;}
.now-playing h2{font-size:19px;}
.now-playing .np-type{font-size:12.5px;color:var(--gray-400);font-weight:700;margin-top:3px;display:flex;align-items:center;gap:6px;}

/* tabs under video */
.lesson-tabs{display:flex;gap:26px;border-bottom:1.5px solid var(--gray-100);margin:18px 0 0;}
.lesson-tab{padding:12px 2px;font-weight:800;font-size:14px;color:var(--gray-400);border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:.15s;}
.lesson-tab:hover{color:var(--green-600);}
.lesson-tab.on{color:var(--green-700);border-color:var(--lime-500);}
.lesson-body{padding:22px 2px;}
.lesson-text{font-size:15px;line-height:1.75;color:var(--gray-700);white-space:pre-wrap;}

/* ---------- quiz inline (aparece automaticamente após o conteúdo) ---------- */
.quiz-inline-block{margin-top:28px;padding-top:24px;border-top:2px solid var(--lime-100);}
.quiz-inline-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.quiz-inline-header .qih-icon{width:36px;height:36px;border-radius:10px;background:var(--lime-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.quiz-inline-header h3{font-size:16px;color:var(--green-900);margin:0;}
.quiz-inline-header .qih-sub{font-size:12.5px;color:var(--gray-400);font-weight:700;margin-top:2px;}
.quiz-inline-done{display:flex;align-items:center;gap:10px;background:var(--done-bg);border-radius:var(--r-md);padding:14px 16px;font-weight:800;color:var(--done);font-size:14.5px;margin-top:28px;border-top:2px solid var(--lime-100);}

/* materials */
.material-chip{display:inline-flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--gray-200);border-radius:var(--r-md);padding:11px 15px;font-size:13.5px;font-weight:700;color:var(--gray-700);margin:0 10px 10px 0;transition:.15s;cursor:pointer;text-decoration:none;}
.material-chip:hover{border-color:var(--lime-500);background:var(--lime-050);color:var(--green-700);}
.material-chip svg{color:var(--lime-600);flex-shrink:0;}

/* lesson nav */
.lesson-nav{display:flex;justify-content:space-between;gap:12px;margin-top:30px;padding-top:22px;border-top:1px solid var(--gray-100);}

/* ---------- rail: progress ---------- */
.rail-progress{padding:22px 22px 18px;border-bottom:1px solid var(--gray-100);}
.rail-progress h3{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);margin-bottom:14px;}
.rp-row{display:flex;align-items:center;gap:14px;}
.rp-ring{flex-shrink:0;}
.rp-meta b{font-family:var(--font-display);font-size:22px;color:var(--green-900);display:block;line-height:1;}
.rp-meta span{font-size:12.5px;color:var(--gray-400);font-weight:700;}
.rp-bar{height:8px;border-radius:var(--r-pill);background:var(--gray-100);overflow:hidden;margin-top:14px;}
.rp-bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--lime-600),var(--lime-500));border-radius:var(--r-pill);transition:width .45s;}
.rp-empty{font-size:13px;color:var(--gray-400);font-weight:600;}

/* ---------- rail: module list ---------- */
.rail-list{padding:8px 12px 30px;}
.rail-list .rl-head{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--gray-400);padding:14px 10px 8px;font-weight:800;}
.mod-item{display:flex;gap:13px;padding:13px 12px;border-radius:var(--r-md);cursor:pointer;transition:.13s;position:relative;}
.mod-item:hover{background:var(--lime-050);}
.mod-item.active{background:var(--lime-100);}
.mod-status{width:26px;height:26px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border:2px solid var(--gray-300);color:var(--gray-400);background:#fff;margin-top:1px;}
.mod-item.done .mod-status{background:var(--done);border-color:var(--done);color:#fff;}
.mod-item.current .mod-status{border-color:var(--prog);color:var(--prog);box-shadow:0 0 0 3px var(--prog-bg);}
.mod-info{min-width:0;flex:1;}
.mod-name{font-size:13.5px;font-weight:700;color:var(--gray-900);}
.mod-item.active .mod-name{color:var(--green-700);}
.mod-tags{display:flex;gap:8px;margin-top:4px;font-size:11.5px;color:var(--gray-400);font-weight:700;flex-wrap:wrap;align-items:center;}
.mod-tags .mt{display:flex;align-items:center;gap:4px;}
.statuspill{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:var(--r-pill);}
.sp-done{background:var(--done-bg);color:var(--done);}
.sp-prog{background:var(--prog-bg);color:#9a6406;}
.sp-pend{background:var(--pend-bg);color:var(--gray-600);}

/* ---------- quiz runtime ---------- */
.quiz-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:22px;margin-bottom:16px;box-shadow:var(--shadow-sm);}
.quiz-kind{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:4px 10px;border-radius:var(--r-pill);margin-bottom:12px;}
.qk-quiz{background:var(--lime-100);color:var(--green-700);}
.qk-poll{background:#e9eef7;color:#3a5a92;}
.qk-tf{background:#f1ebf7;color:#6b46a8;}
.quiz-q-text{font-size:16px;font-weight:800;color:var(--green-900);margin-bottom:16px;font-family:var(--font-display);}
.opt{display:flex;align-items:center;gap:12px;padding:13px 16px;border:1.5px solid var(--gray-200);border-radius:var(--r-md);margin-bottom:10px;cursor:pointer;font-size:14.5px;font-weight:600;transition:.13s;}
.opt:hover{border-color:var(--lime-500);background:var(--lime-050);}
.opt.sel{border-color:var(--lime-500);background:var(--lime-050);color:var(--green-700);font-weight:800;}
.opt.correct{border-color:var(--done);background:var(--done-bg);color:var(--done);font-weight:800;}
.opt.wrong{border-color:#d9685c;background:#fdeceb;color:#d9685c;font-weight:800;}
.opt .bullet{width:20px;height:20px;border-radius:50%;border:2px solid var(--gray-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.opt.sel .bullet{border-color:var(--lime-500);background:var(--lime-500);box-shadow:inset 0 0 0 3px #fff;}
.opt.correct .bullet,.opt.wrong .bullet{border:none;}
.poll-bar{height:30px;border-radius:var(--r-sm);background:var(--gray-100);overflow:hidden;position:relative;margin-bottom:9px;}
.poll-bar>span{display:block;height:100%;background:var(--lime-100);transition:width .5s;}
.poll-bar .poll-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:space-between;padding:0 12px;font-size:13px;font-weight:700;color:var(--gray-700);}
.quiz-feedback{border-radius:var(--r-md);padding:14px 16px;font-weight:800;font-size:14.5px;display:flex;align-items:center;gap:9px;margin-top:6px;}
.qf-pass{background:var(--done-bg);color:var(--done);}
.qf-fail{background:#fdeceb;color:#d9685c;}
.qf-poll{background:#e9eef7;color:#3a5a92;}

/* ---------- empty states ---------- */
.empty{max-width:440px;margin:30px auto;text-align:center;padding:30px 20px;}
.empty .e-ic{width:76px;height:76px;border-radius:22px;background:var(--lime-100);color:var(--green-700);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.empty h3{font-size:19px;margin-bottom:8px;}
.empty p{color:var(--gray-400);font-size:14px;margin-bottom:20px;}
.rail-empty{padding:30px 20px;text-align:center;color:var(--gray-400);}
.rail-empty .re-ic{width:54px;height:54px;border-radius:16px;background:var(--gray-100);color:var(--gray-400);display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.rail-empty p{font-size:13px;font-weight:700;}

/* ---------- editor panel (RH) ---------- */
.editor-back{display:none;position:fixed;inset:0;background:rgba(16,52,26,.5);z-index:80;}
.editor-back.open{display:block;}
.editor{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:94vw;background:var(--gray-050);z-index:90;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:var(--shadow-lg);}
.editor.open{transform:translateX(0);}
.editor-head{display:flex;align-items:center;gap:12px;padding:18px 22px;background:#fff;border-bottom:1px solid var(--gray-100);}
.editor-head h2{font-size:18px;flex:1;}
.editor-body{flex:1;overflow-y:auto;padding:22px;}
.editor-foot{padding:16px 22px;background:#fff;border-top:1px solid var(--gray-100);display:flex;gap:10px;justify-content:flex-end;}
.fld{margin-bottom:16px;}
.fld label{display:block;font-size:12px;font-weight:800;color:var(--gray-700);margin-bottom:6px;}
.inp{width:100%;border:1.5px solid var(--gray-200);border-radius:var(--r-md);padding:11px 13px;font-size:14px;background:#fff;color:var(--gray-900);}
.inp:focus{outline:none;border-color:var(--lime-500);}
textarea.inp{resize:vertical;min-height:74px;line-height:1.5;}
.ed-section-title{font-family:var(--font-display);font-size:15px;color:var(--green-900);margin:22px 0 10px;display:flex;align-items:center;justify-content:space-between;}
.type-pills{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:6px;}
.type-pill{font-size:12px;font-weight:800;padding:7px 13px;border-radius:var(--r-pill);border:1.5px solid var(--gray-200);color:var(--gray-400);background:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
.type-pill.on{border-color:var(--lime-500);background:var(--lime-050);color:var(--green-700);}
.ed-module{background:#fff;border:1px solid var(--gray-200);border-radius:var(--r-md);margin-bottom:12px;overflow:hidden;}
.ed-mod-head{display:flex;align-items:center;gap:11px;padding:13px 14px;cursor:pointer;background:#fff;}
.ed-mod-head .emh-grip{color:var(--gray-300);}
.ed-mod-head .emh-name{flex:1;font-weight:800;font-size:14px;color:var(--green-900);}
.ed-mod-body{padding:0 14px 16px;display:none;border-top:1px solid var(--gray-100);}
.ed-module.open .ed-mod-body{display:block;padding-top:14px;}
.ed-quiz-q{background:var(--gray-050);border:1px solid var(--gray-100);border-radius:var(--r-md);padding:13px;margin-bottom:11px;}
.ed-opt-row{display:flex;align-items:center;gap:9px;margin-bottom:7px;}
.ed-opt-row input[type=radio]{width:17px;height:17px;accent-color:var(--lime-500);flex-shrink:0;}
.ed-opt-row .inp{flex:1;}
.hint{font-size:12px;color:var(--gray-400);font-weight:600;margin-top:4px;}
.callout{display:flex;gap:10px;align-items:flex-start;border-radius:var(--r-md);padding:12px 14px;font-size:13px;margin:12px 0;}
.callout svg{flex-shrink:0;margin-top:1px;}
.callout-info{background:#e9eef7;color:#3a5a92;}.callout-info svg{color:#3a5a92;}
.callout-warn{background:var(--prog-bg);color:#8a5a06;}.callout-warn svg{color:var(--prog);}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--green-900);color:#fff;padding:13px 22px;border-radius:var(--r-pill);font-weight:800;font-size:14px;box-shadow:var(--shadow-lg);z-index:200;display:flex;align-items:center;gap:9px;transition:transform .3s;max-width:90vw;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast svg{color:var(--lime-400);flex-shrink:0;}
.toast.warn svg{color:var(--prog);}

.pring{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.pring svg{transform:rotate(-90deg);}
.pring .pl{position:absolute;font-family:var(--font-display);font-weight:700;}

/* ---------- responsive ---------- */
@media (max-width:1080px){
  :root{--rail:340px;}
}
@media (max-width:880px){
  .stage{grid-template-columns:1fr;}
  .col-rail{position:static;height:auto;border-left:none;border-top:1px solid var(--gray-100);}
  .col-main{padding:18px 16px 60px;}
  .lesson-nav{flex-direction:column;}
  .lesson-nav .btn{width:100%;justify-content:center;}
  .tb-progress .mini-bar{display:none;}
  .editor{width:100%;}
  .topbar .tb-trail{display:none;}
}


/* ===== múltiplos vídeos por módulo ===== */
.video-list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.video-row{display:flex;align-items:flex-start;gap:8px;background:var(--gray-050);border:1px solid var(--gray-100);border-radius:var(--r-md);padding:10px;}
.video-row .video-num{width:24px;height:24px;border-radius:50%;background:var(--lime-100);color:var(--green-700);font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:8px;}
.video-row-fields{display:flex;flex-direction:column;gap:7px;flex:1;min-width:0;}
.video-playlist{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.video-playlist .vp-btn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--gray-200);background:#fff;border-radius:var(--r-pill);padding:7px 12px;font-size:12.5px;font-weight:800;color:var(--gray-600);}
.video-playlist .vp-btn.on{border-color:var(--lime-500);background:var(--lime-050);color:var(--green-700);}

/* ===== quiz gate + material PDF (evolução) ===== */
.gate-hint{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;color:var(--prog);background:var(--prog-bg);padding:7px 12px;border-radius:var(--r-pill);}
.gate-note{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:#8a5a06;background:var(--prog-bg);padding:9px 13px;border-radius:var(--r-md);margin-bottom:12px;}
.tab-req{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.04em;color:var(--prog);background:var(--prog-bg);padding:2px 7px;border-radius:var(--r-pill);margin-left:3px;vertical-align:middle;}
.mat-row{display:flex;align-items:center;gap:9px;margin-bottom:8px;}
.mat-ic{color:var(--lime-600);flex-shrink:0;display:flex;}
.mat-card{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 14px;border:1.5px solid var(--gray-200);border-radius:var(--r-md);margin-bottom:12px;background:#fff;}
.mat-pdf-frame{width:100%;height:500px;border:1px solid var(--gray-100);border-radius:var(--r-md);margin-top:4px;flex:1 1 100%;}


/* ===== sequência obrigatória de vídeos no módulo ===== */
.video-seq-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:10px;box-shadow:var(--shadow-sm);}
.vseq-item{display:flex;align-items:center;gap:10px;text-align:left;border:1.5px solid var(--gray-200);background:#fff;border-radius:var(--r-md);padding:10px 12px;color:var(--gray-600);transition:.13s;}
.vseq-item:hover:not(:disabled){border-color:var(--lime-500);background:var(--lime-050);}
.vseq-item.on{border-color:var(--lime-500);background:var(--lime-050);color:var(--green-700);}
.vseq-item.done{border-color:var(--done);background:var(--done-bg);color:var(--done);}
.vseq-item.locked{opacity:.55;cursor:not-allowed;background:var(--gray-050);}
.vseq-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--gray-100);flex-shrink:0;}
.vseq-item.on .vseq-num{background:var(--lime-500);color:var(--green-900);}
.vseq-item.done .vseq-num{background:var(--done);color:#fff;}
.vseq-item span:last-child{display:flex;flex-direction:column;min-width:0;}
.vseq-item b{font-size:13.5px;line-height:1.2;color:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vseq-item small{font-size:11.5px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
.vseq-item.done small{color:var(--done);}
.video-seq-action{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:12px;}
.video-seq-action span{font-size:12.5px;font-weight:800;color:var(--gray-400);}
@media (max-width:880px){.video-seq-action .btn{width:100%;}.vseq-item b{white-space:normal;}}

/* === src/css/system.css === */
/* ============================================================
   system.css — telas do sistema (shell, login, painéis).
   Usa os mesmos tokens de styles.css (cores, fontes, raios).
============================================================ */

/* ---------- LOGIN ---------- */
.login-screen{min-height:100vh;display:none;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--green-900),var(--green-700));padding:24px;}
.login-screen[style*="flex"]{display:flex;}
.login-card{background:#fff;border-radius:var(--r-xl);box-shadow:var(--shadow-lg);
  padding:38px 32px;width:100%;max-width:440px;text-align:center;}
.login-logo img{width:70px;height:70px;border-radius:18px;margin:0 auto 16px;display:block;}
.login-card h1{font-size:23px;margin-bottom:6px;}
.login-sub{color:var(--gray-400);font-size:14px;margin-bottom:24px;}
.login-users{display:flex;flex-direction:column;gap:9px;text-align:left;margin-bottom:8px;}
.login-user{display:flex;align-items:center;gap:13px;width:100%;background:#fff;border:1.5px solid var(--gray-200);
  border-radius:var(--r-md);padding:12px 14px;cursor:pointer;transition:.13s;color:var(--gray-700);}
.login-user:hover{border-color:var(--lime-500);background:var(--lime-050);}
.lu-avatar{width:40px;height:40px;border-radius:50%;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:16px;flex-shrink:0;}
.lu-info{flex:1;display:flex;flex-direction:column;min-width:0;}
.lu-info b{font-size:14.5px;color:var(--green-900);}
.lu-info span{font-size:12px;color:var(--gray-400);font-weight:700;}
.login-empty{padding:24px;color:var(--gray-400);}
.login-empty svg{margin-bottom:8px;}
.login-divider{display:flex;align-items:center;gap:12px;margin:20px 0 16px;color:var(--gray-300);
  font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--gray-100);}
.login-create{display:flex;flex-direction:column;gap:9px;}

/* ---------- SHELL ---------- */
.app-shell{display:none;min-height:100vh;}
.sidebar{width:236px;flex-shrink:0;background:var(--green-900);color:#fff;display:flex;flex-direction:column;
  padding:20px 14px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.side-logo{display:flex;align-items:center;gap:10px;padding:0 8px 16px;}
.side-logo img{width:34px;height:34px;border-radius:9px;}
.side-logo span{font-family:var(--font-display);font-weight:700;font-size:14px;line-height:1.15;}
.side-role{font-size:10.5px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  color:var(--lime-400);padding:0 10px 14px;}
.side-link{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:var(--r-md);
  color:rgba(255,255,255,.72);font-weight:700;font-size:14px;margin-bottom:3px;cursor:pointer;transition:.12s;}
.side-link:hover{background:rgba(255,255,255,.07);color:#fff;}
.side-link.active{background:var(--lime-500);color:var(--green-900);}
.side-user{display:flex;align-items:center;gap:10px;padding:10px 10px;border-top:1px solid rgba(255,255,255,.1);margin-top:8px;}
.su-av{width:32px;height:32px;border-radius:50%;background:var(--lime-500);color:var(--green-900);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.su-nm{font-size:13px;font-weight:700;color:rgba(255,255,255,.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.side-logout{color:rgba(255,255,255,.5);font-size:13px;}
.app-main{flex:1;min-width:0;display:flex;flex-direction:column;}
.screen-host{flex:1;padding:28px 32px 60px;max-width:1180px;width:100%;margin:0 auto;}
.bottom-tabs{display:none;position:sticky;bottom:0;background:#fff;border-top:1px solid var(--gray-100);
  box-shadow:0 -4px 16px rgba(0,0,0,.05);padding:6px 4px;z-index:40;}
.bottom-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--gray-400);
  font-size:10.5px;font-weight:800;padding:6px 4px;border-radius:12px;cursor:pointer;}
.bottom-tab.active{color:var(--green-700);}
.bottom-tab.active svg{color:var(--lime-600);}

/* ---------- PAGE ---------- */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:22px;}
.page-head h1{font-size:26px;}
.page-head p{color:var(--gray-400);font-size:14.5px;margin-top:4px;}
.page-actions{display:flex;gap:8px;flex-wrap:wrap;}
.home-section{margin-top:28px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-head h2{font-size:18px;}

/* KPIs */
.home-kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;}
.kpi-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);}
.kpi-ic{width:40px;height:40px;border-radius:12px;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;}
.kpi-card b{font-family:var(--font-display);font-size:28px;color:var(--green-900);display:block;line-height:1;}
.kpi-card span{font-size:12.5px;color:var(--gray-400);font-weight:700;}

/* trilha cards */
.trail-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;}
.trail-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:18px;
  box-shadow:var(--shadow-sm);cursor:pointer;transition:.14s;}
.trail-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px);}
.tc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.tc-ic{width:42px;height:42px;border-radius:12px;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;}
.tc-menu{display:flex;gap:5px;}
.trail-card h3{font-size:16px;margin-bottom:5px;}
.tc-sub{font-size:13px;color:var(--gray-400);margin-bottom:10px;min-height:18px;}
.tc-foot{font-size:12.5px;color:var(--gray-400);font-weight:700;}

/* event cards */
.event-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.event-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);}
.ev-date{font-size:12.5px;font-weight:800;color:var(--lime-600);display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.event-card h3{font-size:16px;margin-bottom:8px;}
.ev-local,.ev-desc{font-size:13px;color:var(--gray-600);margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.ev-desc{color:var(--gray-400);}
.ev-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px;}

/* cert mini */
.cert-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.cert-mini{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:20px;text-align:center;box-shadow:var(--shadow-sm);}
.cm-ic{width:54px;height:54px;border-radius:50%;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.cert-mini h3{font-size:15px;margin-bottom:4px;}
.cert-mini p{font-size:12.5px;color:var(--gray-400);margin-bottom:12px;}

/* profile */
.profile-card{display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--gray-100);
  border-radius:var(--r-lg);padding:22px;box-shadow:var(--shadow-sm);}
.pf-avatar{width:70px;height:70px;border-radius:50%;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:28px;}
.pf-info h2{font-size:21px;}
.pf-info p{font-size:14px;color:var(--gray-400);font-weight:700;}

/* tabela */
.table-wrap{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{text-align:left;font-size:12px;font-weight:800;color:var(--gray-400);text-transform:uppercase;
  letter-spacing:.04em;padding:13px 16px;border-bottom:1px solid var(--gray-100);background:var(--gray-050);}
.data-table td{padding:13px 16px;border-bottom:1px solid var(--gray-100);font-size:14px;}
.data-table tr:last-child td{border-bottom:none;}
.td-user{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--green-900);}
.td-av{width:30px;height:30px;border-radius:50%;background:var(--lime-100);color:var(--green-700);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}
.td-actions{display:flex;gap:6px;justify-content:flex-end;}
.role-badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:var(--r-pill);}
.role-rh{background:#e9eef7;color:#3a5a92;}
.role-manager{background:var(--prog-bg);color:#8a5a06;}
.role-collaborator{background:var(--lime-100);color:var(--green-700);}

/* indicadores */
.ind-list{display:flex;flex-direction:column;gap:12px;}
.ind-row{display:grid;grid-template-columns:1fr 2fr auto;align-items:center;gap:14px;background:#fff;
  border:1px solid var(--gray-100);border-radius:var(--r-md);padding:12px 16px;}
.ind-name{font-weight:700;font-size:14px;color:var(--green-900);}
.ind-pct{font-weight:800;font-size:13px;color:var(--green-700);}
.ind-inline{display:flex;align-items:center;gap:10px;}
.ind-inline .rp-bar{flex:1;min-width:80px;}
.ind-inline span{font-size:12.5px;font-weight:800;color:var(--green-700);}

/* learning bar */
.learning-bar{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.learning-bar .mode-toggle{display:flex;background:var(--gray-100);border-radius:var(--r-pill);padding:3px;}
.learning-bar .mode-toggle button{font-size:12.5px;font-weight:800;padding:6px 14px;border-radius:var(--r-pill);color:var(--gray-400);}
.learning-bar .mode-toggle button.on{background:#fff;color:var(--green-700);box-shadow:var(--shadow-sm);}
.learning-bar .tb-progress{margin-left:auto;display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:800;color:var(--gray-600);}
.learning-bar .tb-progress .mini-bar{width:90px;height:6px;border-radius:var(--r-pill);background:var(--gray-100);overflow:hidden;}
.learning-bar .tb-progress .mini-bar>span{display:block;height:100%;background:var(--lime-500);}
.trail-stage{display:grid;grid-template-columns:1fr 340px;gap:24px;align-items:start;}

/* modal genérico */
.modal-back{display:none;position:fixed;inset:0;background:rgba(16,52,26,.5);z-index:120;align-items:center;justify-content:center;padding:20px;}
.modal-back.open{display:flex;}
.modal-box{background:#fff;border-radius:var(--r-xl);padding:26px;width:100%;max-width:460px;box-shadow:var(--shadow-lg);max-height:90vh;overflow-y:auto;}
.modal-box h3{font-size:19px;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px;}
.inp-num{max-width:120px;}

/* responsivo */
@media (max-width:880px){
  .app-shell{flex-direction:column;}
  .sidebar{display:none;}
  .bottom-tabs{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;}
  .app-main{padding-bottom:72px;}
  .screen-host{padding-bottom:30px;}
  .screen-host{padding:18px 16px 30px;}
  .trail-stage{grid-template-columns:1fr;}
  .page-head h1{font-size:22px;}
}

/* ===== melhorias UX/LMS ===== */
/* busca e filtros */
.toolbar-row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.search-bar{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--gray-200);
  border-radius:var(--r-pill);padding:9px 16px;flex:1;min-width:220px;max-width:420px;color:var(--gray-400);margin-bottom:18px;}
.toolbar-row .search-bar{margin-bottom:0;}
.search-bar input{border:none;outline:none;flex:1;font-size:14px;color:var(--gray-900);background:transparent;}
.filter-pills{display:flex;gap:7px;flex-wrap:wrap;}

/* status cards (indicadores) */
.status-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;}
.status-card{border-radius:var(--r-lg);padding:18px;text-align:center;border:1px solid var(--gray-100);}
.status-card b{font-family:var(--font-display);font-size:30px;display:block;line-height:1;}
.status-card span{font-size:12.5px;font-weight:700;}
.sc-pend{background:var(--pend-bg);}.sc-pend b{color:var(--gray-600);}.sc-pend span{color:var(--gray-600);}
.sc-prog{background:var(--prog-bg);}.sc-prog b{color:#8a5a06;}.sc-prog span{color:#8a5a06;}
.sc-done{background:var(--done-bg);}.sc-done b{color:var(--done);}.sc-done span{color:var(--done);}
.alert-list{display:flex;flex-direction:column;gap:9px;}
.alert-row{display:flex;align-items:flex-start;gap:11px;background:var(--prog-bg);border-radius:var(--r-md);padding:13px 16px;font-size:14px;color:#8a5a06;}
.alert-row svg{flex-shrink:0;margin-top:1px;}
.alert-row b{color:var(--green-900);}

/* trilha RH: ações e atribuição */
.trail-card-rh{cursor:default;}
.tc-dur{display:inline-flex;align-items:center;gap:4px;color:var(--gray-400);font-weight:700;}
.tc-foot{display:flex;gap:14px;align-items:center;}
.tc-assign{font-size:12px;color:var(--gray-400);font-weight:700;display:flex;align-items:center;gap:5px;margin-top:8px;}
.tc-rh-actions{display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap;}

/* checkboxes de atribuição */
.chk-list{display:flex;flex-direction:column;gap:8px;max-height:180px;overflow-y:auto;border:1px solid var(--gray-100);border-radius:var(--r-md);padding:12px;}
.chk{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--gray-700);cursor:pointer;}
.chk input{width:16px;height:16px;accent-color:var(--lime-500);}

/* resultado do quiz */
.quiz-result{display:flex;align-items:center;gap:16px;border-radius:var(--r-lg);padding:16px 18px;border:1.5px solid;}
.qr-pass{background:var(--done-bg);border-color:var(--done);}
.qr-fail{background:#fdeceb;border-color:#d9685c;}
.qr-score{text-align:center;flex-shrink:0;}
.qr-score b{font-family:var(--font-display);font-size:30px;line-height:1;display:block;color:var(--green-900);}
.qr-score span{font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;}
.qr-meta{flex:1;font-size:14px;font-weight:700;color:var(--gray-700);}
.qr-meta .muted{font-weight:600;font-size:12.5px;margin-top:3px;}
.qr-badge{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qr-pass .qr-badge{background:var(--done);color:#fff;}
.qr-fail .qr-badge{background:#d9685c;color:#fff;}

/* fld-row e duração no editor */
.fld-row{display:flex;gap:12px;}
.fld-row .fld{margin-bottom:14px;}

/* código no certificado */
.cert-code{text-align:center;margin-top:14px;font-size:11px;color:var(--gray-400);letter-spacing:.03em;}
.cert-code b{color:var(--gray-600);font-family:monospace;}

/* botão danger */
.btn-danger{background:#d9685c;color:#fff;}
.btn-danger:hover{background:#c4564b;}

@media (max-width:880px){
  .fld-row{flex-direction:column;gap:0;}
  .fld-row .fld{width:100%!important;}
  .toolbar-row{flex-direction:column;align-items:stretch;}
  .search-bar{max-width:none;}
}

/* ===== melhorias LMS v2 ===== */
/* contador de resultados */
.results-count{font-size:13px;font-weight:700;color:var(--gray-400);align-self:center;white-space:nowrap;}

/* toolbar sticky para tela de trilhas */
.toolbar-sticky{position:sticky;top:0;z-index:10;background:var(--gray-050);padding:10px 0 4px;margin:-6px 0 6px;}

/* pill ativa com cor de categoria */
.type-pill.on.cat-pill{background:var(--lime-050);border-color:var(--lime-500);color:var(--green-700);}

/* empty state para filtro sem resultado */
.filter-empty{text-align:center;padding:40px 20px;color:var(--gray-400);}
.filter-empty svg{margin-bottom:10px;color:var(--gray-300);}
.filter-empty b{display:block;font-size:15px;color:var(--gray-600);margin-bottom:6px;}

/* badge de contagem na pill de categoria */
.cat-pill-count{font-size:10px;font-weight:800;background:var(--lime-100);color:var(--green-700);
  padding:1px 6px;border-radius:var(--r-pill);margin-left:2px;}
.type-pill.on .cat-pill-count{background:rgba(27,94,32,.15);}

/* tag de categoria no card do colaborador */
.tc-cat{font-size:11px;font-weight:800;color:var(--lime-600);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px;}

/* clear button dentro do search */
.search-clear{width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  color:var(--gray-300);border-radius:50%;cursor:pointer;transition:.12s;flex-shrink:0;}
.search-clear:hover{background:var(--gray-100);color:var(--gray-600);}

/* ===== onboarding ===== */
.onboarding{background:linear-gradient(135deg,var(--lime-050),#fff);border:1.5px solid var(--lime-100);
  border-radius:var(--r-lg);padding:18px 20px;margin-bottom:20px;}
.ob-head{display:flex;align-items:center;gap:9px;margin-bottom:14px;color:var(--green-700);}
.ob-head b{font-family:var(--font-display);font-size:16px;}
.ob-head span{font-size:12.5px;color:var(--gray-400);font-weight:700;margin-left:auto;}
.ob-step{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid var(--lime-100);}
.ob-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--gray-300);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.ob-step.done .ob-check{background:var(--done);border-color:var(--done);}
.ob-txt{flex:1;font-size:14px;font-weight:700;color:var(--gray-700);}
.ob-step.done .ob-txt{color:var(--gray-400);text-decoration:line-through;}

/* ===== settings / backup ===== */
.settings-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;border-bottom:1px solid var(--gray-100);}
.set-row:last-child{border-bottom:none;}
.set-row h3{font-size:15px;margin-bottom:3px;}
.set-row p{font-size:13px;color:var(--gray-400);max-width:440px;}
.set-stats{background:var(--gray-050);justify-content:flex-start;gap:32px;}
.set-stat{text-align:center;}
.set-stat b{font-family:var(--font-display);font-size:22px;color:var(--green-900);display:block;line-height:1;}
.set-stat span{font-size:12px;color:var(--gray-400);font-weight:700;}

/* ===== deadline + obrigatória ===== */
.tc-badges{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.sp-mand{background:#ede7f6;color:#6b46a8;}
.tc-deadline{font-size:12px;font-weight:700;display:flex;align-items:center;gap:5px;margin-top:8px;}
.dl-ok{color:var(--gray-400);}
.dl-soon{color:#8a5a06;}
.dl-late{color:#c4564b;}

/* ===== lista de validação ===== */
.val-list{list-style:none;padding:0;margin:0 0 6px;display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;}
.val-list li{display:flex;align-items:flex-start;gap:8px;font-size:13.5px;color:#8a5a06;background:var(--prog-bg);
  padding:9px 12px;border-radius:var(--r-sm);}
.val-list li svg{flex-shrink:0;margin-top:1px;color:var(--prog);}

/* ===== foco visível (acessibilidade) ===== */
.trail-card:focus-visible,.login-user:focus-visible,.side-link:focus-visible,.bottom-tab:focus-visible{
  outline:3px solid var(--lime-500);outline-offset:2px;}
.iconbtn:focus-visible,.btn:focus-visible{outline:3px solid var(--lime-400);outline-offset:2px;}

/* ===== micro-interações ===== */
.btn{transition:transform .1s ease, box-shadow .15s ease, background .15s ease;}
.btn:active{transform:translateY(1px);}
.kpi-card,.event-card,.cert-mini,.status-card{transition:transform .14s ease, box-shadow .15s ease;}
.kpi-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.toast{animation:toastIn .3s ease;}
@keyframes toastIn{from{transform:translate(-50%,20px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}
.screen-host{animation:fadeIn .25s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.modal-box{animation:modalIn .22s cubic-bezier(.2,.7,.3,1);}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px);}to{opacity:1;transform:none;}}

/* ===== mobile caprichado ===== */
@media (max-width:880px){
  .page-head{margin-bottom:16px;}
  .page-head h1{font-size:20px;}
  .page-actions{width:100%;}
  .page-actions .btn{flex:1;}
  .home-kpis{grid-template-columns:repeat(2,1fr);gap:10px;}
  .kpi-card{padding:14px;}
  .kpi-card b{font-size:22px;}
  .trail-grid{grid-template-columns:1fr;}
  .status-cards{grid-template-columns:repeat(3,1fr);gap:8px;}
  .status-card{padding:14px 8px;}
  .status-card b{font-size:22px;}
  .ind-row{grid-template-columns:1fr;gap:8px;text-align:left;}
  .ind-row .ind-pct{text-align:left;}
  .set-row{flex-direction:column;align-items:stretch;}
  .set-row .btn{width:100%;}
  .set-stats{flex-direction:row;justify-content:space-around;}
  .modal-box{max-width:none;border-radius:var(--r-lg) var(--r-lg) 0 0;position:fixed;bottom:0;left:0;right:0;
    max-height:88vh;animation:sheetIn .28s cubic-bezier(.2,.7,.3,1);}
  @keyframes sheetIn{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .modal-back{align-items:flex-end;padding:0;}
  .data-table{font-size:13px;}
  .data-table th:nth-child(2),.data-table td:nth-child(2),
  .data-table th:nth-child(5),.data-table td:nth-child(5){display:none;} /* esconde E-mail e Cargo no mobile */
  .bottom-tabs{padding-bottom:max(6px,env(safe-area-inset-bottom));}
  .cert-paper{transform:scale(1);}
  .learning-bar{flex-wrap:wrap;gap:10px;}
  .learning-bar .tb-progress{order:3;width:100%;margin-left:0;}
}
/* toque mais confortável */
@media (hover:none){
  .btn,.iconbtn,.side-link,.bottom-tab,.trail-card{-webkit-tap-highlight-color:transparent;}
  .btn-sm{min-height:40px;}
  .iconbtn.sm{width:38px;height:38px;}
}

/* ===== login: abas colaborador/RH ===== */
.login-tabs{display:flex;gap:6px;background:var(--gray-100);border-radius:var(--r-pill);padding:4px;margin-bottom:18px;}
.login-tab{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;font-size:13.5px;font-weight:800;
  padding:9px 10px;border-radius:var(--r-pill);color:var(--gray-400);transition:.13s;}
.login-tab.on{background:#fff;color:var(--green-700);box-shadow:var(--shadow-sm);}
.login-pane{text-align:left;}
.login-pane .fld{margin-bottom:14px;}
.login-err{color:#c4564b;font-size:13px;font-weight:700;margin-top:10px;text-align:center;min-height:18px;}
.login-empty span{display:block;font-size:12.5px;color:var(--gray-300);margin-top:4px;}


.ev-assign{font-size:12px;color:var(--gray-400);font-weight:700;display:flex;align-items:center;gap:5px;margin:8px 0;}

/* ===== editor: grupos e adicionar módulo (UX revisada) ===== */
.ed-group{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:16px 16px 18px;margin-bottom:14px;box-shadow:var(--shadow-sm);}
.ed-group-title{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--green-900);display:flex;align-items:center;gap:8px;margin-bottom:14px;}
.ed-group-title svg{color:var(--lime-600);}
.ed-count{background:var(--lime-100);color:var(--green-700);font-size:12px;font-weight:800;padding:1px 9px;border-radius:var(--r-pill);margin-left:6px;font-family:var(--font-body);}
.cert-switch{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:700;color:var(--gray-700);cursor:pointer;}
.cert-switch input{width:18px;height:18px;accent-color:var(--lime-500);flex-shrink:0;}
.add-module-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:var(--lime-050);border:1.5px dashed var(--lime-300,#c5e1a5);
  border-radius:var(--r-md);padding:12px;margin-bottom:14px;}
.add-module-bar-bottom{margin-top:14px;margin-bottom:0;}
.amb-label{font-size:13px;font-weight:800;color:var(--green-700);display:flex;align-items:center;gap:5px;margin-right:2px;}
.btn-add-mod{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1.5px solid var(--lime-400,#9ccc65);color:var(--green-700);
  font-weight:700;font-size:13px;padding:8px 14px;border-radius:var(--r-pill);cursor:pointer;transition:.13s;min-height:40px;}
.btn-add-mod:hover{background:var(--lime-500);color:#fff;border-color:var(--lime-500);transform:translateY(-1px);}
.btn-add-mod:active{transform:translateY(0);}
@media (max-width:880px){
  .add-module-bar{flex-direction:column;align-items:stretch;}
  .amb-label{margin-bottom:2px;}
  .btn-add-mod{width:100%;justify-content:center;}
}

/* ===== certificado (overlay + papel elegante) ===== */
.cert-back{display:none;position:fixed;inset:0;background:rgba(16,52,26,.62);z-index:130;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto;}
.cert-back.open{display:flex;}
.cert-modal{width:100%;max-width:780px;margin:auto;}
.cert-toolbar{background:#fff;border-radius:var(--r-lg);padding:14px 16px;display:flex;align-items:flex-end;gap:14px;margin-bottom:16px;box-shadow:var(--shadow-md);flex-wrap:wrap;}
.cert-name-field{flex:1;min-width:180px;}
.cert-name-field label{display:block;font-size:11.5px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.cert-actions{display:flex;gap:8px;}
.cert-preview-banner{background:var(--lime-100);color:var(--green-700);border-radius:var(--r-md);padding:11px 14px;font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:14px;}

.cert-paper{background:#fff;border-radius:6px;box-shadow:0 14px 50px rgba(0,0,0,.28);padding:14px;}
.cert-border{border:3px double var(--green-700);border-radius:4px;padding:50px 48px 42px;text-align:center;position:relative;
  background:
    radial-gradient(circle at 0 0,rgba(139,195,74,.07),transparent 38%),
    radial-gradient(circle at 100% 100%,rgba(27,94,32,.07),transparent 38%),#fff;}
.cert-border::before{content:'';position:absolute;inset:10px;border:1px solid var(--lime-400,#9ccc65);border-radius:3px;pointer-events:none;}
.cert-border::after{content:'';position:absolute;inset:16px;border:1px solid var(--lime-200,#dcedc8);border-radius:2px;pointer-events:none;}
.cert-logo img{width:76px;height:76px;border-radius:16px;margin:0 auto 14px;display:block;position:relative;}
.cert-kicker{font-size:12px;font-weight:800;letter-spacing:.22em;text-transform:uppercase;color:var(--lime-600);margin-bottom:6px;position:relative;}
.cert-title{font-family:var(--font-display);font-size:36px;line-height:1.08;color:var(--green-900);margin-bottom:26px;letter-spacing:-.01em;position:relative;}
.cert-line{font-size:14px;color:var(--gray-500);margin:0;position:relative;}
.cert-learner{font-family:var(--font-display);font-size:36px;font-weight:800;color:var(--green-700);margin:12px 0 16px;
  padding-bottom:14px;border-bottom:2px solid var(--lime-400,#9ccc65);display:inline-block;min-width:62%;letter-spacing:.01em;position:relative;}
.cert-trail{font-family:var(--font-display);font-size:22px;font-weight:700;color:var(--green-900);margin:12px auto 6px;max-width:90%;position:relative;}
.cert-desc{font-size:14px;color:var(--gray-500);max-width:82%;margin:0 auto 32px;line-height:1.55;position:relative;}
.cert-desc b{color:var(--green-700);}
.cert-foot{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:14px;position:relative;}
.cert-foot-item{flex:1;text-align:center;}
.cert-foot-line{height:1.5px;background:var(--gray-300);margin-bottom:7px;}
.cert-foot-item span{display:block;font-size:11px;color:var(--gray-400);font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.cert-foot-item b{display:block;font-size:14px;color:var(--green-900);margin-top:2px;}
.cert-seal{width:68px;height:68px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--lime-300,#c5e1a5),var(--lime-500));
  color:var(--green-900);display:flex;align-items:center;justify-content:center;flex-shrink:0;
  border:3px solid var(--green-700);box-shadow:0 2px 8px rgba(27,94,32,.25);}
.cert-code{text-align:center;margin-top:24px;font-size:11px;color:var(--gray-400);letter-spacing:.04em;position:relative;}
.cert-code b{color:var(--gray-600);font-family:monospace;letter-spacing:.06em;}

@media (max-width:880px){
  .cert-back{padding:12px;}
  .cert-border{padding:30px 22px 26px;}
  .cert-title{font-size:24px;}
  .cert-learner{font-size:23px;min-width:80%;}
  .cert-trail{font-size:17px;}
  .cert-desc{max-width:100%;font-size:13px;}
  .cert-foot{flex-direction:row;gap:10px;}
  .cert-seal{width:46px;height:46px;}
  .cert-foot-item span{font-size:9.5px;}
  .cert-foot-item b{font-size:11.5px;}
}

/* impressão: só o papel do certificado */
@media print{
  body *{visibility:hidden;}
  #certBack,#certBack *{visibility:visible;}
  #certBack{position:absolute;inset:0;background:#fff;padding:0;display:block;}
  .cert-modal{max-width:none;}
  .no-print{display:none!important;}
  .cert-paper{box-shadow:none;}
}

/* botão copiar senha */
.pass-row{display:flex;gap:8px;align-items:center;}
.pass-row .inp{flex:1;}
.btn-copy{width:42px;height:42px;border-radius:var(--r-md);border:1.5px solid var(--gray-200);background:#fff;color:var(--gray-500);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:.13s;}
.btn-copy:hover{border-color:var(--lime-500);color:var(--green-700);background:var(--lime-050);}

/* ===== cores por tipo de conteúdo ===== */
.ct-ic{display:inline-flex;}
.ct-video{color:#c62828;} /* vermelho vídeo */
.ct-pdf{color:#1565c0;}   /* azul PDF */
.ct-text{color:#6a4caf;}  /* roxo texto */
.btn-add-mod.ct-video:hover{background:#c62828;border-color:#c62828;color:#fff;}
.btn-add-mod.ct-pdf:hover{background:#1565c0;border-color:#1565c0;color:#fff;}
.btn-add-mod.ct-text:hover{background:#6a4caf;border-color:#6a4caf;color:#fff;}
.mod-tags .mt.ct-video svg{color:#c62828;}
.mod-tags .mt.ct-pdf svg{color:#1565c0;}
.mod-tags .mt.ct-text svg{color:#6a4caf;}

/* ===== categorias de trilha ===== */
.cat-group{margin-bottom:24px;}
.cat-title{display:flex;align-items:center;gap:8px;font-family:var(--font-display);font-weight:700;font-size:15px;
  color:var(--green-900);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--gray-100);}
.cat-title svg{color:var(--lime-600);}
.cat-count{background:var(--gray-100);color:var(--gray-500);font-size:11px;font-weight:800;padding:1px 8px;border-radius:var(--r-pill);font-family:var(--font-body);}
.tc-cat{display:inline-block;font-size:11px;font-weight:800;color:var(--lime-700,#558b2f);background:var(--lime-050);
  padding:2px 9px;border-radius:var(--r-pill);margin-bottom:8px;text-transform:uppercase;letter-spacing:.03em;}

/* ===== #11 cores por tipo de conteúdo ===== */
.ct-video{color:#c0392b;}      /* vídeo: vermelho */
.ct-pdf{color:#c4564b;}
.ct-doc,.ct-pdf{color:#d35400;} /* pdf: laranja */
.ct-text{color:#2e7d8a;}        /* texto: azul-petróleo */
.ct-ic{width:34px;height:34px;border-radius:9px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;}
.ct-ic.ct-video{background:#fdecea;color:#c0392b;}
.ct-ic.ct-pdf{background:#fdf0e6;color:#d35400;}
.ct-ic.ct-text{background:#e8f4f6;color:#2e7d8a;}
.btn-add-mod.ct-video:hover{background:#c0392b;border-color:#c0392b;color:#fff;}
.btn-add-mod.ct-pdf:hover{background:#d35400;border-color:#d35400;color:#fff;}
.btn-add-mod.ct-text:hover{background:#2e7d8a;border-color:#2e7d8a;color:#fff;}

/* ===================== FASE 2: dashboard, relatórios, histórico, eventos ===================== */
/* dashboard executivo */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px;}
.dash-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-sm);position:relative;}
.dash-card .dash-ic{width:34px;height:34px;border-radius:9px;background:var(--lime-050);color:var(--green-700);display:flex;align-items:center;justify-content:center;margin-bottom:10px;}
.dash-card b{font-family:var(--font-display);font-size:26px;color:var(--green-900);display:block;line-height:1;}
.dash-card span{font-size:12px;color:var(--gray-400);font-weight:700;display:block;margin-top:4px;}
.dash-card.dash-warn{background:var(--prog-bg);border-color:#f0d9a8;}
.dash-card.dash-warn .dash-ic{background:#fff;color:#8a5a06;}
.dash-card.dash-warn b{color:#8a5a06;}
.dash-rankings{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px;}
.rank-box{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-sm);}
.rank-title{font-family:var(--font-display);font-weight:700;font-size:14px;color:var(--green-900);display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.rank-row{display:flex;align-items:center;gap:10px;padding:7px 0;}
.rank-pos{width:22px;height:22px;border-radius:50%;background:var(--lime-100);color:var(--green-700);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rank-name{flex:0 0 34%;font-size:13px;font-weight:700;color:var(--gray-700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-row .rp-bar{flex:1;}
.rank-pct{font-size:13px;font-weight:800;color:var(--green-700);width:42px;text-align:right;}

/* relatórios */
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;}
.report-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:18px;box-shadow:var(--shadow-sm);display:flex;align-items:center;gap:14px;}
.report-ic{width:44px;height:44px;border-radius:11px;background:var(--lime-050);color:var(--green-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.report-body{flex:1;min-width:0;}
.report-body h3{font-size:15px;margin-bottom:3px;}
.report-body p{font-size:12.5px;color:var(--gray-400);}

/* histórico */
.hist-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;}
.hist-card{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-lg);padding:16px;box-shadow:var(--shadow-sm);cursor:pointer;transition:.14s;}
.hist-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.hist-head{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.hist-id{flex:1;min-width:0;}
.hist-id b{display:block;font-size:15px;color:var(--green-900);}
.hist-pct{text-align:center;}
.hist-pct b{font-family:var(--font-display);font-size:22px;color:var(--green-700);display:block;line-height:1;}
.hist-pct span{font-size:10px;color:var(--gray-400);font-weight:700;text-transform:uppercase;}
.hist-mini{display:flex;flex-wrap:wrap;gap:10px;font-size:12px;font-weight:700;color:var(--gray-500);}
.hist-mini span{display:inline-flex;align-items:center;gap:4px;}
.hist-pend{color:#8a5a06!important;}
.cert-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;}
.cert-mini{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-sm);}
.cert-mini-ic{width:36px;height:36px;border-radius:9px;background:var(--lime-050);color:var(--green-700);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cert-mini b{font-size:13.5px;color:var(--green-900);display:block;}

/* participantes de evento + status */
.part-list{display:flex;flex-direction:column;gap:8px;}
.part-row{background:#fff;border:1px solid var(--gray-100);border-radius:var(--r-md);padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;box-shadow:var(--shadow-sm);}
.part-info{display:flex;align-items:center;gap:11px;min-width:0;}
.part-info b{font-size:14px;color:var(--green-900);display:block;}
.part-info .muted{font-size:12px;display:block;}
.part-conf{display:block;font-size:11px;color:var(--done);font-weight:700;margin-top:2px;}
.part-actions{display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.ev-status{font-size:11.5px;font-weight:800;padding:3px 11px;border-radius:var(--r-pill);}
.st-insc{background:var(--prog-bg);color:#8a5a06;}
.st-pres{background:var(--done-bg);color:var(--done);}
.st-aus{background:#fdeceb;color:#c4564b;}
.st-canc{background:var(--gray-100);color:var(--gray-400);}
.ev-meta{display:flex;gap:8px;flex-wrap:wrap;margin:8px 0;}
.ev-chip{font-size:12px;font-weight:700;color:var(--gray-500);background:var(--gray-050);border-radius:var(--r-pill);padding:4px 10px;display:inline-flex;align-items:center;gap:5px;}
.ev-chip-rate{background:var(--done-bg);color:var(--done);}

/* próxima atividade (home colaborador) */
.next-activity{background:linear-gradient(135deg,var(--green-900),var(--green-700));border-radius:var(--r-lg);padding:18px;margin-bottom:18px;cursor:pointer;transition:.16s;box-shadow:var(--shadow-md);}
.next-activity:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.na-tag{font-size:12px;font-weight:800;color:var(--lime-300,#c5e1a5);text-transform:uppercase;letter-spacing:.04em;display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.na-body{display:flex;align-items:center;gap:14px;}
.na-ic{width:50px;height:50px;border-radius:13px;background:rgba(255,255,255,.15);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.na-info{flex:1;min-width:0;}
.na-info h3{color:#fff;font-size:17px;margin-bottom:3px;}
.na-info p{color:rgba(255,255,255,.8);font-size:13px;}
.na-info .rp-bar{background:rgba(255,255,255,.2);}
.na-info .rp-bar span{background:var(--lime-400,#9ccc65);}
.na-go{color:#fff;flex-shrink:0;opacity:.85;}
.home-pend{margin-bottom:16px;}

@media (max-width:880px){
  .dash-grid{grid-template-columns:repeat(2,1fr);}
  .dash-card b{font-size:22px;}
  .dash-rankings{grid-template-columns:1fr;}
  .report-card{flex-wrap:wrap;}
  .report-card .btn{width:100%;}
  .part-row{flex-direction:column;align-items:stretch;}
  .part-actions{justify-content:space-between;}
  .rank-name{flex-basis:28%;}
}

/* ===== badge de status da nuvem (Firebase) ===== */
.cloud-badge{font-size:11px;font-weight:800;text-align:center;padding:6px 10px;border-radius:var(--r-pill);margin:0 4px 8px;letter-spacing:.02em;}
.cb-demo{background:rgba(255,255,255,.12);color:rgba(255,255,255,.7);}
.cb-ok{background:rgba(139,195,74,.22);color:var(--lime-300,#c5e1a5);}
.cb-saving{background:rgba(255,193,7,.2);color:#ffe082;}
.cb-off{background:rgba(217,104,92,.2);color:#ffab91;}
/* na tela clara (mobile bottom area / login) */
.login-card .cloud-badge{margin-top:12px;background:var(--gray-100);color:var(--gray-500);}


/* ===== Capa das trilhas ===== */
.tc-cover{
  width:100%;
  height:128px;
  border-radius:var(--r-md);
  overflow:hidden;
  background:var(--lime-050);
  border:1px solid var(--gray-100);
  margin-bottom:12px;
  position:relative;
}
.tc-cover img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.tc-cover-empty{
  width:100%;
  height:128px;
  border-radius:var(--r-md);
  background:linear-gradient(135deg,var(--lime-100),var(--lime-050));
  border:1px solid var(--gray-100);
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--green-700);
}
.cover-preview{
  width:100%;
  height:160px;
  border-radius:var(--r-md);
  overflow:hidden;
  background:var(--lime-050);
  border:1.5px dashed var(--gray-200);
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--gray-400);
  font-weight:800;
  margin-bottom:10px;
}
.cover-preview img{
  width:100%;
  height:100%;
  object-fit:cover;
}
.cover-actions{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:8px;
}
@media (max-width:880px){
  .tc-cover,.tc-cover-empty{height:140px;}
}


/* Patch Florence: filtros clicáveis e UX de busca */
.filter-pills .cat-pill{cursor:pointer;user-select:none;position:relative;z-index:1;}
.search-clear{border:none;background:transparent;padding:0;}

</style>

/* ====================== CONTENT TYPES ====================== */
const CTYPE={
  youtube:{label:'Vídeo (YouTube)',icon:'play',cls:'ct-video'},
  mp4:{label:'Vídeo (MP4)',icon:'video',cls:'ct-video'},

};
const QKIND={
  quiz:{label:'Prova (resposta certa)',icon:'quiz',cls:'qk-quiz'},

/* ====================== DATA MODEL (vazio; localStorage) ======================
  Estrutura pronta para JSON / API:
  trail = {
    id, title, subtitle,
    modules: [
      { id, name, contentType:'youtube|mp4|pdf|text', src, fileName, text,
        materials:[{name,url}],
        quiz: null | {
          kind:'quiz|poll|truefalse',
          passThreshold: Number,        // % mínimo de acerto p/ aprovar (quiz/truefalse)
          questions: [ { q, options:[..], correct:Number|null } ]
        }
      }
    ]
  }
  progress = {
    done:[],                       // ids dos módulos concluídos
    polls:{ moduleId:{ qIdx:{optIdx:count} } }, // votos de enquete por pergunta
    passed:{ moduleId:true },       // módulos cujo quiz/prova foi aprovado
    scores:{ moduleId: Number }     // % de acerto na última tentativa aprovada
  }
  Regra de conclusão: módulo com quiz 'quiz'/'truefalse' só conclui quando o
  aluno atinge a NOTA MÍNIMA (passThreshold). Pode refazer quantas vezes quiser.
  Enquete ('poll') exige apenas responder, não bloqueia por acerto.
=============================================================================*/
const KEY='raguife_trilha_modulo';
let trail={id:'t_'+Math.random().toString(36).slice(2,8),title:'',subtitle:'',modules:[]};
let progress={done:[],polls:{},passed:{},scores:{},attempts:{},videos:{},materials:{}};
let mode='student';
let currentIdx=0;
let lessonTab='conteudo';
let quizState={answers:{},submitted:false};  // answers: { qIdx: optIdx }

const DEFAULT_THRESHOLD=70;  // nota mínima padrão (%)

/* normaliza um quiz para o novo formato (múltiplas perguntas + nota mínima),
   migrando o formato antigo { question, options, correct } se necessário. */
function normalizeQuiz(q){
  if(!q)return null;
  // formato antigo → novo
  if(q.questions===undefined && q.question!==undefined){
    q={ kind:q.kind||'quiz', passThreshold:q.passThreshold??DEFAULT_THRESHOLD,
        questions:[{ q:q.question||'', options:q.options||['',''], correct:(q.correct===undefined?0:q.correct) }] };
  }
  q.kind=q.kind||'quiz';
  q.questions=Array.isArray(q.questions)?q.questions:[];
  if(q.questions.length===0)q.questions=[{q:'',options:['',''],correct:q.kind==='poll'?null:0}];
  if(q.kind==='poll')q.passThreshold=null;
  else if(typeof q.passThreshold!=='number')q.passThreshold=DEFAULT_THRESHOLD;
  // garante coerência de cada pergunta
  q.questions.forEach(qq=>{
    qq.options=Array.isArray(qq.options)?qq.options:['',''];
    if(q.kind==='truefalse')qq.options=['Verdadeiro','Falso'];
    if(q.kind==='poll')qq.correct=null;
    else if(typeof qq.correct!=='number')qq.correct=0;
  });
  return q;
}
function normalizeTrail(t){
  if(!t)return t;
  t.modules=Array.isArray(t.modules)?t.modules:[];
  // status de publicação: 'draft' (só RH) ou 'published' (aparece p/ colaborador)
  if(t.status!=='published'&&t.status!=='draft')t.status='draft';
  // atribuição: a quem a trilha se destina
  t.assignment=t.assignment||{mode:'all',sectors:[],cargos:[],userIds:[]};
  if(typeof t.category!=='string')t.category='';        // categoria/tema (opcional)
  if(typeof t.mandatory!=='boolean')t.mandatory=false;   // trilha obrigatória?
  if(typeof t.deadline!=='string')t.deadline='';          // prazo (YYYY-MM-DD), opcional
  if(typeof t.category!=='string')t.category='';          // categoria/tema da trilha
  // configuração do certificado
  t.certificate=t.certificate||{};
  if(typeof t.certificate.enabled!=='boolean')t.certificate.enabled=true; // emite ao concluir 100%
  if(typeof t.certificate.signature!=='string')t.certificate.signature='Recursos Humanos';
  if(!['all','restricted'].includes(t.assignment.mode))t.assignment.mode='all';
  t.assignment.sectors=Array.isArray(t.assignment.sectors)?t.assignment.sectors:[];
  t.assignment.userIds=Array.isArray(t.assignment.userIds)?t.assignment.userIds:[];
  t.assignment.cargos=Array.isArray(t.assignment.cargos)?t.assignment.cargos:[];
  t.modules.forEach(m=>{
    m.materials=m.materials||[];
    if(typeof m.durationMin!=='number')m.durationMin=0; // carga horária por módulo (min)
    if(m.contentType==='youtube'||m.contentType==='mp4')moduleVideos(m); // permite mais de um vídeo por módulo
    if(m.quiz)m.quiz=normalizeQuiz(m.quiz);
  });
  return t;
}
/* carga horária total da trilha (minutos) */
function trailDurationMin(t){return (t.modules||[]).reduce((a,m)=>a+(m.durationMin||0),0);}

/* valida uma trilha antes de publicar; retorna lista de problemas (vazia = ok) */
function validateTrail(t){
  const probs=[];
  if(!t.title||!t.title.trim())probs.push('A trilha está sem título.');
  if(!t.modules||!t.modules.length){probs.push('A trilha não tem módulos.');return probs;}
  t.modules.forEach((m,i)=>{
    const n='Módulo '+(i+1)+(m.name?` ("${m.name}")`:'');
    if(m.contentType==='youtube'&&!moduleVideos(m).some(v=>(v.src||'').trim()))probs.push(`${n}: adicione ao menos 1 link de vídeo do YouTube.`);
    if(m.contentType==='pdf'&&!(m.src||'').trim())probs.push(`${n}: PDF não enviado.`);
    if(m.contentType==='text'&&!(m.text||'').trim())probs.push(`${n}: texto vazio.`);
    if(m.contentType==='mp4'&&!moduleVideos(m).some(v=>(v.src||'')||v.mp4Missing))probs.push(`${n}: adicione ao menos 1 vídeo MP4.`);
    if(m.quiz){
      const q=m.quiz;
      (q.questions||[]).forEach((qq,qi)=>{
        const qn=`${n}, pergunta ${qi+1}`;
        if(!(qq.q||'').trim())probs.push(`${qn}: sem enunciado.`);
        const opts=(qq.options||[]).filter(o=>(o||'').trim());
        if(opts.length<2)probs.push(`${qn}: precisa de ao menos 2 alternativas.`);
        if(q.kind!=='poll'&&(qq.correct===null||qq.correct===undefined||!(qq.options[qq.correct]||'').trim()))
          probs.push(`${qn}: marque a alternativa correta.`);
      });
    }
  });
  return probs;
}
function fmtDuration(min){
  if(!min)return '';
  const h=Math.floor(min/60),m=min%60;
  if(h&&m)return `${h}h${String(m).padStart(2,'0')}`;
  if(h)return `${h}h`;
  return `${m} min`;
}

function load(){
  try{const raw=localStorage.getItem(KEY);if(raw){const d=JSON.parse(raw);trail=normalizeTrail(d.trail||trail);progress=d.progress||progress;progress.done=progress.done||[];progress.polls=progress.polls||{};progress.passed=progress.passed||{};progress.scores=progress.scores||{};progress.attempts=progress.attempts||{};progress.videos=progress.videos||{};progress.materials=progress.materials||{};}}catch(e){}
}
function save(){
  try{
    if(typeof syncTrailCompletion==='function')syncTrailCompletion(currentUser&&currentUser.id,currentTrailId);
  }catch(e){}
  try{
    persistLearningStateToDb();
    if(typeof dbSave==='function')dbSave();
  }catch(e){console.warn('save/dbSave',e);}
  // mantém cache local antigo apenas como contingência
  try{
    const clone=JSON.parse(JSON.stringify({trail,progress}));
    clone.trail.modules.forEach(m=>{if(m.contentType==='mp4'&&m.mp4Blob){m.src='';m.mp4Missing=true;}});
    localStorage.setItem(KEY,JSON.stringify(clone));
  }catch(e){if(e.name==='QuotaExceededError')toast('Armazenamento cheio — PDFs grandes podem não persistir',true);}
}
function uid(){return 'm_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return (s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ytId(u){if(!u)return '';const m=u.match(/(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([A-Za-z0-9_-]{11})/);return m?m[1]:'';}
function moduleVideos(m){
  if(!m)return [];
  if(!Array.isArray(m.videos))m.videos=[];
  if((m.contentType==='youtube'||m.contentType==='mp4') && (m.src||m.fileName) && !m.videos.length){
    m.videos.push({id:uid(),title:m.fileName||'Vídeo 1',src:m.src||'',fileName:m.fileName||'',storagePath:m.storagePath||'',mp4Blob:!!m.mp4Blob,mp4Missing:!!m.mp4Missing,origem:m.origem||''});
  }
  if((m.contentType==='youtube'||m.contentType==='mp4') && !m.videos.length){
    m.videos.push({id:uid(),title:'Vídeo 1',src:'',fileName:'',storagePath:'',mp4Blob:false,mp4Missing:false,origem:''});
  }
  return m.videos;
}
function getActiveVideo(m){
  const vids=moduleVideos(m);
  let idx=Number(m.activeVideoIndex)||0;
  if(idx<0||idx>=vids.length)idx=0;
  m.activeVideoIndex=idx;
  return {video:vids[idx]||null,index:idx,videos:vids};
}
function setModuleVideo(i,j){trail.modules[i].activeVideoIndex=j;render();}

/* ===== vídeos sequenciais por módulo =====
   Mantém a estrutura existente (m.videos[]) e adiciona controle de sequência:
   Vídeo 1 -> Vídeo 2 -> ... -> Materiais/Quiz -> Próximo módulo.
*/
function isVideoModule(m){return !!(m && (m.contentType==='youtube'||m.contentType==='mp4'));}
function videoProgressBucket(m){
  progress.videos=progress.videos||{};
  if(!progress.videos[m.id])progress.videos[m.id]={};
  return progress.videos[m.id];
}
function isVideoWatched(m,j){
  if(!isVideoModule(m))return true;
  const vids=moduleVideos(m);
  if(!vids[j])return false;
  return !!videoProgressBucket(m)[vids[j].id || j];
}
function allVideosWatched(m){
  if(!isVideoModule(m))return true;
  const vids=moduleVideos(m).filter(v=>((v.src||'').trim()||v.mp4Missing||v.fileName));
  if(!vids.length)return false;
  return vids.every((v,j)=>isVideoWatched(m,j));
}
function canOpenVideo(m,j){
  if(!isVideoModule(m))return true;
  if(j<=0)return true;
  return isVideoWatched(m,j-1);
}
function firstPendingVideoIndex(m){
  const vids=moduleVideos(m);
  for(let j=0;j<vids.length;j++){
    if(((vids[j].src||'').trim()||vids[j].mp4Missing||vids[j].fileName) && !isVideoWatched(m,j))return j;
  }
  return Math.max(0,Math.min(Number(m.activeVideoIndex)||0,vids.length-1));
}
function markVideoWatched(i,j,fromEnded){
  const m=trail.modules[i];
  if(!m)return false;
  const vids=moduleVideos(m);
  const v=vids[j];
  if(!v)return false;
  videoProgressBucket(m)[v.id || j]=true;
  m.activeVideoIndex=j;
  markDirty&&markDirty();
  try{save();}catch(e){try{dbSave&&dbSave();}catch(_){}}
  if(j<vids.length-1){
    m.activeVideoIndex=j+1;
    lessonTab='conteudo';
    quizState={answers:{},submitted:false};
    render();
    setTimeout(()=>{try{document.getElementById('mediaStage')?.scrollIntoView({behavior:'smooth',block:'start'});}catch(e){}},120);
    toast(fromEnded?'Vídeo concluído. Próximo vídeo carregado.':'Próximo vídeo carregado.');
    return true;
  }
  render();
  setTimeout(()=>{try{document.getElementById('lessonBody')?.scrollIntoView({behavior:'smooth',block:'start'});}catch(e){}},160);
  toast('Todos os vídeos do módulo foram concluídos. Materiais e quiz liberados.');
  return true;
}
function resetModuleVideoSequence(m){
  if(!isVideoModule(m))return;
  if(!allVideosWatched(m))m.activeVideoIndex=firstPendingVideoIndex(m);
}
function addVideo(i){
  markDirty();
  const m=trail.modules[i];
  const vids=moduleVideos(m);
  vids.push({id:uid(),title:'Vídeo '+(vids.length+1),src:'',fileName:'',storagePath:'',mp4Blob:false,mp4Missing:false,origem:''});
  m.activeVideoIndex=vids.length-1;
  renderEditor();render();
}
function delVideo(i,j){
  markDirty();
  const m=trail.modules[i];
  const vids=moduleVideos(m);
  if(vids.length<=1){vids[0]={id:uid(),title:'Vídeo 1',src:'',fileName:'',storagePath:'',mp4Blob:false,mp4Missing:false,origem:''};}
  else vids.splice(j,1);
  m.activeVideoIndex=Math.min(Number(m.activeVideoIndex)||0,vids.length-1);
  // mantém compatibilidade com campos antigos no primeiro vídeo
  const first=vids[0]||{};m.src=first.src||'';m.fileName=first.fileName||'';m.storagePath=first.storagePath||'';m.mp4Blob=!!first.mp4Blob;m.mp4Missing=!!first.mp4Missing;
  renderEditor();render();
}

function toast(msg,warn){const t=document.getElementById('toast');t.className='toast'+(warn?' warn show':' show');t.innerHTML=`${ic(warn?'warn':'check',18)} ${esc(msg)}`;clearTimeout(window._t);window._t=setTimeout(()=>t.classList.remove('show'),2600);}
function ring(pct,size,stroke){const r=(size-stroke)/2,c=size/2,circ=2*Math.PI*r,off=circ*(1-pct/100);return `<div class="pring" style="width:${size}px;height:${size}px;"><svg width="${size}" height="${size}"><circle cx="${c}" cy="${c}" r="${r}" stroke="var(--gray-100)" stroke-width="${stroke}" fill="none"/><circle cx="${c}" cy="${c}" r="${r}" stroke="var(--lime-500)" stroke-width="${stroke}" fill="none" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${off}"/></svg><span class="pl" style="font-size:${Math.round(size*.28)}px;color:var(--green-900);">${pct}%</span></div>`;}

/* ====================== PROGRESS (somente dados reais) ====================== */
function totalModules(){return trail.modules.length;}
function doneCount(){return progress.done.filter(id=>trail.modules.some(m=>m.id===id)).length;}
function pctDone(){const t=totalModules();return t?Math.round(doneCount()/t*100):0;}
function moduleStatus(m){
  if(progress.done.includes(m.id))return 'done';
  const idx=trail.modules.indexOf(m);
  // "em andamento" = é o módulo atualmente aberto e ainda não concluído
  if(idx===currentIdx)return 'current';
  return 'pending';
}

/* ---- gate do quiz: o módulo exige aprovação antes de concluir? ---- */
// 'quiz' e 'truefalse' exigem ACERTO; 'poll' exige apenas o voto.
function moduleHasGate(m){return !!(m.quiz && (m.quiz.kind==='quiz' || m.quiz.kind==='truefalse'));}
function modulePollPending(m){return !!(m.quiz && m.quiz.kind==='poll');}
function isQuizPassed(m){return !!progress.passed[m.id];}
// pode concluir se: não tem quiz; OU é enquete já respondida; OU prova/VF aprovada
function canComplete(m){
  if(isVideoModule(m) && !allVideosWatched(m))return false;
  if(!m.quiz)return true;
  if(m.quiz.kind==='poll')return !!(progress.polls[m.id]&&Object.keys(progress.polls[m.id]).length);
  return isQuizPassed(m);
}

/* ---- avaliação por percentual (múltiplas perguntas) ---- */
// conta acertos de uma tentativa: answers = { qIdx: optIdx }
function quizCorrectCount(m,answers){
  let n=0;
  m.quiz.questions.forEach((qq,qi)=>{ if(answers[qi]===qq.correct)n++; });
  return n;
}
function quizScorePct(m,answers){
  const total=m.quiz.questions.length||1;
  return Math.round(quizCorrectCount(m,answers)/total*100);
}
function quizThreshold(m){
  return (m.quiz && typeof m.quiz.passThreshold==='number')?m.quiz.passThreshold:DEFAULT_THRESHOLD;
}
function quizAllAnswered(m,answers){
  return m.quiz.questions.every((qq,qi)=>answers[qi]!==undefined && answers[qi]!==null);
}

/* ====================== TOP BAR ====================== */
function renderTop(){
  document.getElementById('tbTrail').textContent=trail.title||'Trilha sem título';
  const tp=document.getElementById('tbProgress');
  if(totalModules()===0){tp.innerHTML='';return;}
  tp.innerHTML=`<span>${doneCount()}/${totalModules()}</span><div class="mini-bar"><span style="width:${pctDone()}%"></span></div>`;
}

      ${(m.materials&&m.materials.length)?`<button class="lesson-tab ${lessonTab==='materiais'?'on':''}" onclick="setLessonTab('materiais')">Materiais</button>`:''}
    </div>
    <div class="lesson-body" id="lessonBody">${lessonBody(m)}</div>
    <div class="lesson-nav">
      <button class="btn btn-ghost" onclick="navModule(-1)" ${currentIdx===0?'disabled':''}>${ic('prev',16)} Módulo anterior</button>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end;">
        ${completeControl(m)}
        ${(()=>{
        const cur=trail.modules[currentIdx];
        const isLast=currentIdx===totalModules()-1;
        const videoPending = cur && isVideoModule(cur) && !allVideosWatched(cur);
        const quizPending = cur && cur.quiz && !progress.done.includes(cur.id) && !(
          cur.quiz.kind==='poll'
            ? !!(progress.polls[cur.id] && Object.keys(progress.polls[cur.id]).length)
            : isQuizPassed(cur)
        );
        if(isLast) return `<button class="btn btn-dark" disabled>Próximo módulo ${ic('next',16)}</button>`;
        if(videoPending) return `<button class="btn btn-dark" disabled title="Assista todos os vídeos para avançar">Próximo módulo ${ic('next',16)}</button>`;
        if(quizPending) return `<button class="btn btn-dark" disabled title="Responda o quiz para avançar">Próximo módulo ${ic('next',16)}</button>`;
        return `<button class="btn btn-dark" onclick="navModule(1)">Próximo módulo ${ic('next',16)}</button>`;
      })()}
      </div>
    </div>`;
}

/* botão de conclusão respeitando o gate do quiz */

  if(!canComplete(m)){
    const reason = (isVideoModule(m)&&!allVideosWatched(m))
      ? 'Conclua todos os vídeos para liberar o módulo'
      : (m.quiz.kind==='poll' ? 'Responda a enquete para concluir' : 'Acerte o quiz para concluir');
    return `<div style="display:flex;align-items:center;gap:10px;">
      <span class="gate-hint">${ic('lock',15)} ${reason}</span>
      <button class="btn btn-primary" disabled>Marcar como concluído</button>

  return `<button class="btn btn-primary" onclick="__raguifeCompleteCurrentModule()">Marcar como concluído</button>`;
}

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#10341a">
<title>Universidade Raguife — Sistema</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/css/styles.css">
<link rel="stylesheet" href="src/css/system.css">
</head>
<body>

<div id="loginScreen" class="login-screen"><div id="loginBody"></div></div>

<div id="appShell" class="app-shell" style="display:none;">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="app-main">
    <img id="brandLogo" style="display:none" alt="">
    <div class="screen-host" id="screenHost"></div>
  </main>
  <nav class="bottom-tabs" id="bottomTabs"></nav>
</div>

<!-- editor drawer (RH) -->
<div class="editor-back" id="editorBack" onclick="closeEditor()"></div>
<aside class="editor" id="editor">
  <div class="editor-head">
    <h2>Editar trilha</h2>
    <button class="iconbtn sm" onclick="closeEditor()">&times;</button>
  </div>
  <div class="editor-body" id="editorBody"></div>
  <div class="editor-foot">
    <button class="btn btn-ghost btn-sm" onclick="closeEditor()">Fechar</button>
    <button class="btn btn-primary btn-sm" onclick="saveTrail()">Salvar trilha</button>
  </div>
</aside>

<div class="modal-back" id="modalBack"><div class="modal-box"></div></div>

<div class="cert-back" id="certBack" onclick="if(event.target===this)closeCertificate()">
  <div class="cert-modal" id="certModal"></div>
</div>

<div class="toast" id="toast"></div>
<input type="file" id="filePick" style="display:none">

<script src="src/js/logo.js"></script>
<script src="src/js/data.js"></script>
<script src="src/js/view.js"></script>
<script src="src/js/editor.js"></script>
<script src="src/js/firebase-config.js"></script>
<script src="src/js/store.js"></script>
<script src="src/js/firebase-sync.js"></script>
<script src="src/js/xlsx.js"></script>
<script src="src/js/app.js"></script>
<script src="src/js/screens_colab.js"></script>
<script src="src/js/screens_rh.js"></script>
<script src="src/js/bridge.js"></script>
</body>
</html>
